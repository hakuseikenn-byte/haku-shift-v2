<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Haku シフト管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#222;background:#f5f3ef;}

/* ===== PAGE SYSTEM ===== */
.page{position:fixed;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;background:#f5f3ef;}
.page.show{display:block;}
#p-login{background:linear-gradient(135deg,#2c3e50 0%,#4a6741 100%);align-items:center;justify-content:center;padding:20px;z-index:30;display:none;}
#p-login.show{display:flex!important;}
#p-cal,#p-attendance,#p-leave,#p-swap,#p-admin{top:52px;}

/* ===== HEADER ===== */
#app-header{position:fixed;top:0;left:0;right:0;height:52px;background:#2c3e50;color:#fff;display:none;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;}
#app-header.show{display:flex;}
.h-logo{font-weight:800;font-size:17px;color:#d4af7a;letter-spacing:2px;}
.h-user{font-size:11px;color:rgba(255,255,255,.6);margin-left:6px;}
.h-nav{display:flex;gap:4px;align-items:center;}
.h-btn{padding:5px 8px;background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:6px;color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;}
.h-btn.on{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.5);}
.h-out{padding:5px 6px;background:transparent;border:none;color:rgba(255,255,255,.4);font-size:11px;cursor:pointer;}

/* ===== LOGIN ===== */
.login-card{background:#fff;border-radius:18px;padding:28px 22px;width:100%;max-width:370px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.logo-wrap{text-align:center;margin-bottom:22px;}
.logo-circle{display:block;width:50px;height:50px;line-height:50px;border-radius:50%;background:#2c3e50;color:#d4af7a;font-size:22px;font-weight:800;margin:0 auto 10px;}
.logo-name{font-weight:700;font-size:15px;color:#2c3e50;display:block;}
.logo-sub{font-size:11px;color:#888;margin-top:3px;letter-spacing:2px;display:block;}
.tab-bar{display:flex;border-radius:8px;overflow:hidden;border:1px solid #e0e0e0;margin-bottom:16px;}
.tab-btn{flex:1;padding:8px 0;background:#f8f6f2;border:none;cursor:pointer;font-size:12px;color:#666;font-weight:600;}
.tab-btn.on{background:#2c3e50;color:#fff;}
.tab-pane{display:none;}
.tab-pane.on{display:block;}

/* ===== COMMON ===== */
.wrap{max-width:520px;margin:0 auto;padding:14px 12px 80px;}
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px;}
.sec-title{font-weight:800;font-size:14px;color:#2c3e50;margin-bottom:12px;}
.form-col{display:flex;flex-direction:column;gap:10px;}
input,select,textarea{padding:9px 11px;border-radius:8px;border:1px solid #d0d0d0;font-size:14px;outline:none;background:#fafafa;color:#222;width:100%;font-family:inherit;}
textarea{resize:vertical;min-height:60px;}
.btn{padding:11px 0;background:#2c3e50;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;width:100%;}
.btn-sm{padding:5px 11px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:700;}
.g{background:#2c5f2e;color:#fff;}
.r{background:#c0392b;color:#fff;}
.d{background:#2c3e50;color:#fff;}
.gr{background:#ddd;color:#555;}
.gold{background:#d4af7a;color:#2c3e50;}
.empty{text-align:center;color:#999;font-size:13px;padding:14px 0;line-height:1.8;}
.av{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.av-full{background:#2c3e50;color:#d4af7a;}
.av-part{background:#4a6741;color:#fff;}
.prog-bg{height:5px;border-radius:99px;background:#eee;overflow:hidden;margin:5px 0;}
.prog-fill{height:100%;border-radius:99px;}
.warn{background:#fef9e7;border:1px solid #f0c040;border-radius:8px;padding:6px 10px;font-size:11px;color:#7d6608;margin-top:6px;}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
.pending-b{background:#fef3cd;color:#856404;}
.approved-b{background:#d4edda;color:#155724;}
.rejected-b{background:#f8d7da;color:#721c24;}

/* ===== CALENDAR ===== */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mtitle{font-weight:800;font-size:17px;color:#2c3e50;}
.arr{background:none;border:1px solid #ddd;border-radius:6px;font-size:18px;cursor:pointer;color:#2c3e50;padding:2px 9px;line-height:1.4;}
.today-btn{padding:3px 10px;background:#d4af7a;color:#2c3e50;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:10px;}
.dh{text-align:center;font-size:10px;font-weight:700;padding:4px 0;}
.cd{border:1px solid #e8e8e8;border-radius:6px;padding:3px 2px 2px;min-height:64px;cursor:pointer;display:flex;flex-direction:column;background:#fff;overflow:hidden;}
.cd.sel{border-color:#2c3e50;box-shadow:0 0 0 2px #2c3e50;}
.cd.tod{background:#fef9e7;}
.cdn{font-size:11px;font-weight:700;line-height:1;margin-bottom:2px;}
.slot-chip{font-size:8px;padding:1px 3px;border-radius:3px;margin-bottom:1px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slot-chip.part{background:#d4edda;color:#155724;}
.slot-chip.full{background:#cce5ff;color:#004085;}
.slot-chip.filled{background:#2c5f2e;color:#fff;}
.slot-chip.mine{background:#d4af7a;color:#2c3e50;}

/* ===== DAY PANEL ===== */
.dp{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.dp-title{font-weight:800;font-size:15px;color:#2c3e50;margin-bottom:12px;padding-bottom:7px;border-bottom:2px solid #f0ede8;}

/* Slot card */
.slot-card{border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid #e0e0e0;}
.slot-card.part-slot{background:#f0fff4;border-color:#c3e6cb;}
.slot-card.full-slot{background:#f0f4ff;border-color:#b8d4f0;}
.slot-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.slot-name{font-weight:700;font-size:13px;color:#2c3e50;}
.slot-time{font-size:11px;color:#666;}
.slot-capacity{font-size:11px;color:#888;}
.slot-members{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;min-height:22px;}
.member-tag{display:flex;align-items:center;gap:4px;background:#fff;border:1px solid #ddd;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600;}
.member-tag.me-tag{background:#d4af7a;border-color:#d4af7a;color:#2c3e50;}
.empty-slot{color:#bbb;font-size:11px;font-style:italic;}
.slot-actions{display:flex;gap:6px;flex-wrap:wrap;}
.join-btn{padding:5px 14px;background:#2c5f2e;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;}
.leave-btn{padding:5px 14px;background:#c0392b;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;}
.full-badge{font-size:11px;color:#888;padding:5px 0;}

/* Clock banner */
.clock-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.clock-in-btn{padding:9px 16px;background:#2c5f2e;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;}
.clock-out-btn{padding:9px 16px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;}

/* Summary */
.sum-card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-box{background:#fff;border-radius:18px 18px 0 0;padding:22px 18px 40px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.modal-title{font-weight:800;font-size:15px;color:#2c3e50;margin-bottom:14px;}
.modal-btns{display:flex;gap:8px;margin-top:14px;}

/* Toast */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:8px;color:#fff;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none;white-space:nowrap;max-width:90vw;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#2c3e50;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
.loading{text-align:center;color:#aaa;font-size:13px;padding:30px 0;}

/* View tabs */
.vtabs{display:flex;gap:4px;margin-bottom:12px;}
.vt{flex:1;padding:7px 0;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:12px;font-weight:600;color:#666;cursor:pointer;text-align:center;}
.vt.on{background:#2c3e50;color:#fff;border-color:#2c3e50;}

/* Legend */
.legend{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555;}
.leg-dot{width:10px;height:10px;border-radius:3px;}
</style>
</head>
<body>
<div id="toast"></div>

<!-- HEADER -->
<div id="app-header">
  <div style="display:flex;align-items:center;gap:6px;">
    <span class="h-logo" style="font-size:12px;letter-spacing:1px;">Café La Petite Haku</span>
    <span class="h-user" id="h-user"></span>
  </div>
  <div class="h-nav">
    <button class="h-btn on" id="nb-cal" onclick="nav('cal')">📅</button>
    <button class="h-btn" id="nb-attendance" onclick="nav('attendance')">🕐</button>
    <button class="h-btn" id="nb-leave" onclick="nav('leave')">🌿</button>
    <button class="h-btn" id="nb-swap" onclick="nav('swap')">🔄</button>
    <button class="h-btn" id="nb-admin" style="display:none;" onclick="nav('admin')">⚙</button>
    <button class="h-out" onclick="logout()">退出</button>
  </div>
</div>

<!-- LOGIN -->
<div id="p-login" class="page show">
  <div class="login-card">
    <div class="logo-wrap">
      <span class="logo-circle">H</span>
      <span class="logo-name">Café La Petite Haku</span>
      <span class="logo-sub">シフト管理</span>
    </div>
    <div class="tab-bar">
      <button class="tab-btn on" onclick="ltab('staff')">スタッフ</button>
      <button class="tab-btn" onclick="ltab('reg')">新規登録</button>
      <button class="tab-btn" onclick="ltab('admin')">管理者</button>
    </div>
    <div id="lt-staff" class="tab-pane on">
      <div id="staff-login-area"><div class="loading"><span class="spin"></span>読み込み中…</div></div>
    </div>
    <div id="lt-reg" class="tab-pane">
      <div class="form-col">
        <input type="text" id="reg-name" placeholder="お名前"/>
        <select id="reg-type"><option value="part">アルバイト</option><option value="full">正社員</option><option value="manager">店長</option></select>
        <input type="number" id="reg-wage" placeholder="時給（円）"/>
        <input type="number" id="reg-max" placeholder="月最大時間（空白=デフォルト）"/>
        <button class="btn" onclick="registerStaff()">登録する</button>
      </div>
    </div>
    <div id="lt-admin" class="tab-pane">
      <div class="form-col">
        <input type="password" id="adm-pw" placeholder="管理者パスワード" onkeydown="if(event.key==='Enter')adminLogin()"/>
        <button class="btn" onclick="adminLogin()">ログイン</button>
      </div>
    </div>
  </div>
</div>

<!-- CAL -->
<div id="p-cal" class="page"><div class="wrap" id="cal-wrap"></div></div>
<!-- ATTENDANCE -->
<div id="p-attendance" class="page"><div class="wrap" id="att-wrap"></div></div>
<!-- LEAVE -->
<div id="p-leave" class="page"><div class="wrap" id="leave-wrap"></div></div>
<!-- SWAP -->
<div id="p-swap" class="page"><div class="wrap" id="swap-wrap"></div></div>
<!-- ADMIN -->
<div id="p-admin" class="page"><div class="wrap" id="admin-wrap"></div></div>

<!-- MODAL -->
<div id="modal-bg" class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
const SB_URL='https://hqddrswyqmammuwwrvna.supabase.co';
const SB_KEY='sb_publishable_766-Q62xxyGNiARJhTg13A_lb7YxuEQ';
const sb=supabase.createClient(SB_URL,SB_KEY);
const STORE_LAT=34.719172,STORE_LNG=135.477891,STORE_R=200;
const DAYS_JP=['日','月','火','水','木','金','土'];
const LEAVE_TYPES={paid:'有給休暇',sick:'病欠',mourning:'忌引き',unpaid:'無給休暇'};

let ADMIN_PW='haku2026';
let me=null;
let staff=[],settings={wage_per_hour:1100,max_hours_per_month:80,insurance_threshold_weekly:20};
let calY=new Date().getFullYear(),calM=new Date().getMonth(),selDay=null,calView='month',weekOff=0;
let slotsCache={},entriesCache={},attCache={};
let todayAtt=null;

// ── Toast & Modal ─────────────────────────────────────────────────────────────
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.style.background=type==='err'?'#c0392b':'#2c5f2e';el.style.display='block';clearTimeout(window._tt);window._tt=setTimeout(()=>el.style.display='none',2800);}
function openModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-bg').classList.add('show');}
function closeModal(){document.getElementById('modal-bg').classList.remove('show');}

// ── Page nav ──────────────────────────────────────────────────────────────────
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  if(name==='login'){
    document.getElementById('p-login').classList.add('show');
    document.getElementById('app-header').classList.remove('show');
  } else {
    document.getElementById('p-'+name).classList.add('show');
    document.getElementById('app-header').classList.add('show');
    document.querySelectorAll('.h-btn').forEach(b=>b.classList.remove('on'));
    const nb=document.getElementById('nb-'+name);if(nb)nb.classList.add('on');
  }
}
function nav(name){
  showPage(name);
  if(name==='cal')renderCal();
  else if(name==='attendance')renderAtt();
  else if(name==='leave')renderLeave();
  else if(name==='swap')renderSwap();
  else if(name==='admin')renderAdmin();
}
function ltab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',['staff','reg','admin'][i]===name));
  document.querySelectorAll('.tab-pane').forEach((p,i)=>p.classList.toggle('on',['lt-staff','lt-reg','lt-admin'][i]==='lt-'+name));
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function fmtTime(ts){if(!ts)return'--:--';const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function calcH(i,o){if(!i||!o)return 0;return Math.round((new Date(o)-new Date(i))/36000)/100;}
function calcHFromTime(s,e){const[sh,sm]=s.split(':').map(Number);const[eh,em]=e.split(':').map(Number);return Math.max(0,(eh*60+em-sh*60-sm)/60);}
function calcWage(h,wage,i,o){if(!i||!o||h<=0)return h*wage;let t=0;let c=new Date(i);const out=new Date(o);while(c<out){const n=new Date(Math.min(c.getTime()+3600000,out.getTime()));const hr=c.getHours();t+=(n-c)/3600000*wage*(hr>=22||hr<5?1.25:1);c=n;}return Math.round(t);}
function distM(la1,lo1,la2,lo2){const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

// ── Data loaders ──────────────────────────────────────────────────────────────
async function loadAll(){await Promise.all([loadStaff(),loadSettings()]);}
async function loadStaff(){const{data}=await sb.from('shift_staff').select('*').order('created_at');staff=data||[];renderStaffLoginArea();}
async function loadSettings(){const{data}=await sb.from('shift_settings').select('*').eq('id',1).single();if(data){settings=data;if(data.admin_password)ADMIN_PW=data.admin_password;}}

async function loadMonthData(y,m){
  const from=`${y}-${String(m+1).padStart(2,'0')}-01`,to=`${y}-${String(m+1).padStart(2,'0')}-${new Date(y,m+1,0).getDate()}`;
  const key=`${y}-${m}`;
  const[slotsRes,entriesRes,attRes]=await Promise.all([
    sb.from('shift_slots').select('*').gte('date',from).lte('date',to).order('start_time'),
    sb.from('slot_entries').select('*,shift_staff(id,name,staff_type)').gte('created_at',from+'T00:00:00').lte('created_at',to+'T23:59:59'),
    sb.from('attendance').select('*').gte('date',from).lte('date',to)
  ]);
  // slots by date
  const slotMap={};
  (slotsRes.data||[]).forEach(s=>{if(!slotMap[s.date])slotMap[s.date]=[];slotMap[s.date].push(s);});
  slotsCache[key]=slotMap;
  // entries by slot_id
  const entMap={};
  (entriesRes.data||[]).forEach(e=>{if(!entMap[e.slot_id])entMap[e.slot_id]=[];entMap[e.slot_id].push(e);});
  entriesCache[key]=entMap;
  // attendance by date+staff
  const attMap={};
  (attRes.data||[]).forEach(a=>{if(!attMap[a.date])attMap[a.date]={};attMap[a.date][a.staff_id]=a;});
  attCache[key]=attMap;
  if(me&&me.role!=='admin'){todayAtt=(attCache[key][fmtDate(new Date())]||{})[me.id]||null;}
}

function getMonthlyHours(y,m){
  const key=`${y}-${m}`,am=attCache[key]||{},res={};
  staff.forEach(s=>res[s.id]=0);
  Object.values(am).forEach(dm=>Object.entries(dm).forEach(([sid,a])=>{if(a.clock_in&&a.clock_out)res[sid]=(res[sid]||0)+calcH(a.clock_in,a.clock_out);}));
  return res;
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function renderStaffLoginArea(){
  const el=document.getElementById('staff-login-area');if(!el)return;
  if(staff.length===0){el.innerHTML='<p class="empty">まだスタッフが登録されていません。</p>';return;}
  el.innerHTML=`<div class="form-col">
    <select id="st-sel" style="font-size:14px;padding:11px;">
      <option value="">スタッフを選択…</option>
      ${staff.map(s=>`<option value="${s.id}">${s.name}${s.staff_type==='full'?' 【正社員】':''}</option>`).join('')}
    </select>
    <input type="password" id="st-pw" placeholder="パスワード（初期：0000）" onkeydown="if(event.key==='Enter')staffLogin()"/>
    <button class="btn" onclick="staffLogin()">ログイン</button>
  </div>`;
}
function staffLogin(){
  const id=document.getElementById('st-sel').value,pw=document.getElementById('st-pw').value;
  if(!id){toast('スタッフを選択してください','err');return;}
  const s=staff.find(x=>x.id===id);
  if(!s||(pw!==(s.password||'0000'))){toast('パスワードが違います','err');return;}
  const isManager=s.role==='manager';
  me={id:s.id,name:s.name,role:isManager?'manager':'staff',staffType:s.staff_type||'part',staffRole:s.role||'part'};
  const roleLabel=s.role==='manager'?' 【店長】':s.staff_type==='full'?' 【正社員】':'';
  document.getElementById('h-user').textContent=s.name+roleLabel;
  document.getElementById('nb-admin').style.display=isManager?'block':'none';
  showPage('cal');renderCal();
}
function adminLogin(){
  const pw=document.getElementById('adm-pw').value;
  if(pw!==ADMIN_PW){toast('パスワードが違います','err');return;}
  me={id:'admin',name:'管理者',role:'admin'};
  document.getElementById('h-user').textContent='管理者';
  document.getElementById('nb-admin').style.display='block';
  showPage('cal');renderCal();
}
async function registerStaff(){
  const name=document.getElementById('reg-name').value.trim();
  const stype=document.getElementById('reg-type').value;
  const wage=parseInt(document.getElementById('reg-wage').value)||settings.wage_per_hour;
  const maxH=parseInt(document.getElementById('reg-max').value)||settings.max_hours_per_month;
  if(!name){toast('名前を入力してください','err');return;}
  if(staff.find(s=>s.name===name)){toast('同じ名前が既にあります','err');return;}
  const roleVal=stype==='manager'?'manager':stype==='full'?'full':'part';
  const stypeVal=stype==='manager'?'full':stype;
  const{data,error}=await sb.from('shift_staff').insert({name,staff_type:stypeVal,role:roleVal,wage,max_hours:maxH}).select().single();

// ── CALENDAR ──────────────────────────────────────────────────────────────────
async function renderCal(){
  const wrap=document.getElementById('cal-wrap');
  wrap.innerHTML='<div class="loading"><span class="spin"></span>読み込み中…</div>';
  await loadMonthData(calY,calM);
  const key=`${calY}-${calM}`,slotMap=slotsCache[key]||{},entMap=entriesCache[key]||{},attMap=attCache[key]||{};
  const mh=getMonthlyHours(calY,calM);
  let html='';

  // Clock banner
  if(me.role!=='admin'){
    const a=todayAtt;
    if(!a||!a.clock_in){
      html+=`<div class="clock-bar"><div style="font-size:12px;color:#555;">本日未出勤</div><button class="clock-in-btn" onclick="clockIn()">出勤 🟢</button></div>`;
    } else if(!a.clock_out){
      html+=`<div class="clock-bar"><div style="font-size:12px;color:#555;">出勤中 <strong>${fmtTime(a.clock_in)}〜</strong></div><button class="clock-out-btn" onclick="clockOut()">退勤 🔴</button></div>`;
    } else {
      html+=`<div class="clock-bar"><div style="font-size:12px;color:#555;"><strong>${fmtTime(a.clock_in)}〜${fmtTime(a.clock_out)}</strong> 退勤済</div><span style="font-size:11px;color:#aaa;">お疲れ様！</span></div>`;
    }
    // Summary
    const myS=staff.find(s=>s.id===me.id);
    const myH=Math.round((mh[me.id]||0)*10)/10,max=myS?.max_hours||settings.max_hours_per_month,wage=myS?.wage||settings.wage_per_hour;
    const pct=Math.min(myH/max*100,100),fc=pct>90?'#c0392b':pct>70?'#e67e22':'#2c5f2e';
    const wkH=myH/(new Date(calY,calM+1,0).getDate()/7);
    html+=`<div class="sum-card">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:12px;color:#666;">今月の勤務時間</span><span style="font-size:13px;font-weight:600;color:#2c3e50;">${myH}h / ${max}h</span></div>
      <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${fc};"></div></div>
      <div style="display:flex;justify-content:space-between;"><span style="font-size:12px;color:#666;">推定給与</span><span style="font-size:13px;font-weight:600;color:#2c3e50;">¥${(myH*wage).toLocaleString()}</span></div>
      ${wkH>=settings.insurance_threshold_weekly*0.85?`<div class="warn">⚠ 週${wkH.toFixed(1)}h — 雇用保険加入基準（週${settings.insurance_threshold_weekly}h）に近づいています</div>`:''}
      <div style="text-align:right;margin-top:6px;"><button onclick="openSelfPwModal()" style="background:none;border:none;color:#aaa;font-size:10px;cursor:pointer;text-decoration:underline;">🔑 PW変更</button></div>
    </div>`;
  }

  // View tabs
  html+=`<div class="vtabs">
    <button class="vt${calView==='month'?' on':''}" onclick="switchView('month')">月</button>
    <button class="vt${calView==='week'?' on':''}" onclick="switchView('week')">週</button>
  </div>`;

  if(calView==='week'){
    wrap.innerHTML=html+buildWeekGrid();
    return;
  }

  // Legend
  html+=`<div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#d4edda;border:1px solid #c3e6cb;"></div>アルバイト枠</div>
    <div class="leg-item"><div class="leg-dot" style="background:#cce5ff;border:1px solid #b8d4f0;"></div>正社員枠</div>
    <div class="leg-item"><div class="leg-dot" style="background:#2c5f2e;"></div>埋まった枠</div>
    <div class="leg-item"><div class="leg-dot" style="background:#d4af7a;"></div>自分のシフト</div>
  </div>`;

  // Month nav
  const dim=new Date(calY,calM+1,0).getDate(),fdow=new Date(calY,calM,1).getDay(),todayStr=fmtDate(new Date());
  html+=`<div class="mnav">
    <button class="arr" onclick="chM(-1)">‹</button>
    <span class="mtitle" onclick="openJumpModal()" style="cursor:pointer;border-bottom:1px dashed #aaa;">${calY}年${calM+1}月</span>
    <div style="display:flex;gap:4px;"><button class="today-btn" onclick="goToday()">今日</button><button class="arr" onclick="chM(1)">›</button></div>
  </div>`;

  // Grid
  let g=DAYS_JP.map((d,i)=>`<div class="dh" style="color:${i===0?'#c0392b':i===6?'#2471a3':'#555'}">${d}</div>`).join('');
  for(let i=0;i<fdow;i++)g+='<div></div>';
  for(let day=1;day<=dim;day++){
    const dow=(fdow+day-1)%7,ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isSel=selDay===day,isToday=ds===todayStr;
    const daySlots=slotMap[ds]||[];
    let chips='';
    daySlots.forEach(slot=>{
      const ents=entMap[slot.id]||[];
      const isFull=ents.length>=slot.max_staff;
      const isMine=ents.some(e=>e.staff_id===me?.id);
      const cls=isMine?'mine':isFull?'filled':slot.staff_type==='full'?'full':'part';
      chips+=`<div class="slot-chip ${cls}">${slot.slot_name} ${ents.length}/${slot.max_staff}</div>`;
    });
    // Full-time attendance/leave
    const dayAtt=attMap[ds]||{};
    staff.filter(s=>s.staff_type==='full').forEach(s=>{
      const a=dayAtt[s.id];
      if(a&&a.status==='absent')chips+=`<div class="slot-chip" style="background:#f8d7da;color:#721c24;">${s.name[0]}休</div>`;
    });
    g+=`<button class="cd${isSel?' sel':''}${isToday?' tod':''}" onclick="selDate(${day})">
      <span class="cdn" style="color:${isSel?'#2c3e50':dow===0?'#c0392b':dow===6?'#2471a3':'#222'}">${day}</span>
      ${chips}
    </button>`;
  }
  html+=`<div class="cal-grid">${g}</div>`;

  // Day panel
  if(selDay){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(selDay).padStart(2,'0')}`;
    const daySlots=slotMap[ds]||[],dayAtt=attMap[ds]||{};
    html+=`<div class="dp"><div class="dp-title">${calM+1}月${selDay}日</div>`;

    if(daySlots.length===0&&me.role!=='admin') html+='<p class="empty">この日はシフト枠がありません</p>';

    // Part-time slots
    const partSlots=daySlots.filter(s=>s.staff_type==='part');
    const fullSlots=daySlots.filter(s=>s.staff_type==='full');

    if(partSlots.length>0){
      html+=`<div style="font-size:12px;font-weight:700;color:#2c5f2e;margin-bottom:8px;">🟩 アルバイト枠</div>`;
      partSlots.forEach(slot=>{
        const ents=entMap[slot.id]||[];
        const isFull=ents.length>=slot.max_staff;
        const myEntry=ents.find(e=>e.staff_id===me?.id);
        const members=ents.map(e=>`<span class="member-tag${e.staff_id===me?.id?' me-tag':''}">${e.shift_staff?.name||'?'}</span>`).join('');
        let acts='';
        if(me.role==='admin'||me.role==='manager'){
          acts+=`<button class="btn-sm d" onclick="openManageSlotModal('${slot.id}','${slot.slot_name}')">管理</button>`;
          acts+=` <button class="btn-sm r" onclick="deleteSlot('${slot.id}','${ds}')">削除</button>`;
        } else if(me.staffType==='part'){
          if(myEntry) acts+=`<button class="leave-btn" onclick="leaveSlot('${myEntry.id}','${slot.id}','${ds}')">キャンセル</button>`;
          else if(!isFull) acts+=`<button class="join-btn" onclick="joinSlot('${slot.id}','${ds}')">参加する</button>`;
          else acts+=`<span class="full-badge">満員</span>`;
        }
        html+=`<div class="slot-card part-slot">
          <div class="slot-header"><span class="slot-name">${slot.slot_name}</span><span class="slot-time">${slot.start_time.slice(0,5)}〜${slot.end_time.slice(0,5)}</span></div>
          <div style="font-size:11px;color:#888;margin-bottom:6px;">定員 ${slot.max_staff}人　残り ${Math.max(0,slot.max_staff-ents.length)}人</div>
          <div class="slot-members">${members||'<span class="empty-slot">まだ誰も入っていません</span>'}</div>
          <div class="slot-actions">${acts}</div>
        </div>`;
      });
    }

    if(fullSlots.length>0){
      html+=`<div style="font-size:12px;font-weight:700;color:#2471a3;margin-bottom:8px;margin-top:10px;">🟦 正社員枠</div>`;
      fullSlots.forEach(slot=>{
        const ents=entMap[slot.id]||[];
        const isFull=ents.length>=slot.max_staff;
        const myEntry=ents.find(e=>e.staff_id===me?.id);
        const members=ents.map(e=>`<span class="member-tag${e.staff_id===me?.id?' me-tag':''}">${e.shift_staff?.name||'?'}</span>`).join('');
        let acts='';
        if(me.role==='admin'||me.role==='manager'){
          acts+=`<button class="btn-sm d" onclick="openManageSlotModal('${slot.id}','${slot.slot_name}')">管理</button>`;
          acts+=` <button class="btn-sm r" onclick="deleteSlot('${slot.id}','${ds}')">削除</button>`;
        } else if(me.staffType==='full'){
          if(myEntry) acts+=`<button class="leave-btn" onclick="leaveSlot('${myEntry.id}','${slot.id}','${ds}')">キャンセル</button>`;
          else if(!isFull) acts+=`<button class="join-btn" onclick="joinSlot('${slot.id}','${ds}')">参加する</button>`;
          else acts+=`<span class="full-badge">満員</span>`;
        }
        html+=`<div class="slot-card full-slot">
          <div class="slot-header"><span class="slot-name">${slot.slot_name}</span><span class="slot-time">${slot.start_time.slice(0,5)}〜${slot.end_time.slice(0,5)}</span></div>
          <div style="font-size:11px;color:#888;margin-bottom:6px;">定員 ${slot.max_staff}人　残り ${Math.max(0,slot.max_staff-ents.length)}人</div>
          <div class="slot-members">${members||'<span class="empty-slot">まだ誰も入っていません</span>'}</div>
          <div class="slot-actions">${acts}</div>
        </div>`;
      });
    }

    // Full-time status (admin only)
    if(me.role==='admin'||me.role==='manager'){
      const fullStaff=staff.filter(s=>s.staff_type==='full');
      if(fullStaff.length>0){
        html+=`<div style="font-size:12px;font-weight:700;color:#555;margin-bottom:8px;margin-top:10px;">正社員 出勤状況</div>`;
        fullStaff.forEach(s=>{
          const a=dayAtt[s.id];
          const st=a?a.status==='absent'?'休暇':a.clock_in&&a.clock_out?`${fmtTime(a.clock_in)}〜${fmtTime(a.clock_out)}`:a.clock_in?`${fmtTime(a.clock_in)}〜出勤中`:'未打刻':'予定なし';
          html+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0ede8;font-size:13px;">
            <span class="av av-full">${s.name[0]}</span>${s.name}
            <span style="margin-left:auto;color:#555;font-size:12px;">${st}</span>
            <button class="btn-sm d" onclick="openEditAttModal('${s.id}','${s.name}','${ds}')">修正</button>
          </div>`;
        });
      }
      html+=`<div style="margin-top:12px;"><button class="btn" onclick="openAddSlotModal('${ds}')">＋ シフト枠を追加</button></div>`;
    }
    html+='</div>';
  }

  // Admin monthly summary
  if(me.role==='admin'||me.role==='manager'){
    html+=`<div class="card"><div class="sec-title">今月のスタッフ時間</div>`;
    staff.forEach(s=>{
      const h=Math.round((mh[s.id]||0)*10)/10,max=s.max_hours||settings.max_hours_per_month;
      const pct=Math.min(h/max*100,100);
      const salaryInfo=me.role==='admin'?`¥${(h*(s.wage||settings.wage_per_hour)).toLocaleString()}`:'';
      html+=`<div style="margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;margin-bottom:2px;">
          <span class="av ${s.staff_type==='full'?'av-full':'av-part'}" style="width:22px;height:22px;font-size:10px;">${s.name[0]}</span>
          ${s.name}<span style="font-size:10px;color:#888;">${s.staff_type==='full'?'正社員':'バイト'}</span>
          <span style="margin-left:auto;font-size:11px;color:#555;">${h}h${salaryInfo?' / '+salaryInfo:''}</span>
        </div>
        <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${pct>90?'#c0392b':'#2c5f2e'};"></div></div>
      </div>`;
    });
    html+='</div>';
  }

  wrap.innerHTML=html;
}

function goToday(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();selDay=n.getDate();renderCal();}

async function confirmAddSlot(ds){
  const name=document.getElementById('sl-name').value.trim();
  const stype=document.getElementById('sl-type').value;
  const start=document.getElementById('sl-s').value;
  const end=document.getElementById('sl-e').value;
  const max=parseInt(document.getElementById('sl-max').value)||2;
  const repeat=document.getElementById('sl-repeat').checked;
  if(!name){toast('枠名を入力してください','err');return;}

  let dates=[ds];
  if(repeat){
    const baseDate=new Date(ds);const dow=baseDate.getDay();
    const dim=new Date(calY,calM+1,0).getDate();
    dates=[];
    for(let d=1;d<=dim;d++){
      const dd=new Date(calY,calM,d);
      if(dd.getDay()===dow)dates.push(fmtDate(dd));
    }
  }
  const inserts=dates.map(d=>({date:d,slot_name:name,staff_type:stype,start_time:start,end_time:end,max_staff:max}));
  const{error}=await sb.from('shift_slots').insert(inserts);
  if(error){toast('追加に失敗しました','err');return;}
  toast(`${inserts.length}件追加しました`);closeModal();await loadMonthData(calY,calM);renderCal();
}

// ── Clock in/out ──────────────────────────────────────────────────────────────
async function clockIn(){
  const today=fmtDate(new Date());
  const doIn=async(lat,lng)=>{
    const{data:ex}=await sb.from('attendance').select('*').eq('staff_id',me.id).eq('date',today).single();
    if(ex&&ex.clock_in){toast('既に出勤済みです','err');return;}
    const{data,error}=await sb.from('attendance').upsert({staff_id:me.id,date:today,clock_in:new Date().toISOString(),clock_in_lat:lat,clock_in_lng:lng,status:'normal'},{onConflict:'staff_id,date'}).select().single();
    if(error){toast('打刻に失敗しました','err');return;}
    todayAtt=data;toast('出勤打刻しました 🟢');renderCal();
  };
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
    if(distM(pos.coords.latitude,pos.coords.longitude,STORE_LAT,STORE_LNG)>STORE_R){toast(`店舗から離れすぎています`,'err');return;}
    await doIn(pos.coords.latitude,pos.coords.longitude);
  }catch(e){if(e.code===1){toast('位置情報の許可が必要です','err');return;}await doIn(null,null);}
}
async function clockOut(){
  if(!todayAtt){toast('出勤記録がありません','err');return;}
  const now=new Date();
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
    await sb.from('attendance').update({clock_out:now.toISOString(),clock_out_lat:pos.coords.latitude,clock_out_lng:pos.coords.longitude}).eq('id',todayAtt.id);
  }catch{await sb.from('attendance').update({clock_out:now.toISOString()}).eq('id',todayAtt.id);}
  todayAtt={...todayAtt,clock_out:now.toISOString()};toast('退勤打刻しました 🔴');renderCal();
}

async function renderAtt(){
  const wrap=document.getElementById('att-wrap');
  wrap.innerHTML='<div class="loading"><span class="spin"></span>読み込み中…</div>';

async function attChM(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}await renderAtt();}
async function exportPDF(){

  let html=`<div style="font-weight:800;font-size:17px;color:#2c3e50;margin-bottom:12px;">🔄 換班申請</div>`;

  const key=`${calY}-${calM}`,slotMap=slotsCache[key]||{},entMap=entriesCache[key]||{};

      <textarea id="sw-reason" placeholder="理由・希望（任意）"></textarea>
      ${slotOpts?`<button class="btn" onclick="submitSwap()">申請する</button>`:''}
    </div></div>`;

  if(swaps.length===0)html+='<p class="empty">申請がありません</p>';
  else swaps.forEach(s=>{
    const sc=s.status==='pending'?'pending-b':s.status==='approved'?'approved-b':'rejected-b';

      </div>
      ${s.reason?`<div style="font-size:12px;color:#666;margin-bottom:8px;">${s.reason}</div>`:''}
      ${me.role==='admin'&&s.status==='pending'?`<div style="display:flex;gap:7px;"><button class="btn-sm g" onclick="approveSwap('${s.id}','${s.from_slot_id}','${s.staff_id}')">承認</button><button class="btn-sm r" onclick="rejectSwap('${s.id}')">却下</button></div>`:''}
    </div>`;
  });
  wrap.innerHTML=html;

async function submitSwap(){

// ── Week view ─────────────────────────────────────────────────────────────────
function buildWeekGrid(){
  const today=new Date(),sw=new Date(today);
  sw.setDate(today.getDate()-today.getDay()+weekOff*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sw);d.setDate(d.getDate()+i);return d;});
  const todayStr=fmtDate(today);
  const key=`${calY}-${calM}`,slotMap=slotsCache[key]||{},entMap=entriesCache[key]||{};
  let th=`<tr><th style="width:38px;font-size:10px;">時間</th>`;
  days.forEach((d,i)=>{
    const ds=fmtDate(d),isT=ds===todayStr;
    th+=`<th style="${isT?'background:#d4af7a;color:#2c3e50;':''}font-size:10px;">
      <div style="color:${i===0?'#f8d7da':i===6?'#cce5ff':'inherit'}">${DAYS_JP[i]}</div>
      <div style="font-size:11px;">${d.getDate()}</div>
    </th>`;
  });
  th+='</tr>';
  let tb='';
  for(let h=6;h<=23;h++){
    tb+=`<tr><td style="background:#f8f6f2;font-weight:600;color:#555;text-align:center;font-size:10px;width:38px;">${String(h).padStart(2,'0')}</td>`;
    days.forEach(d=>{
      const ds=fmtDate(d);
      const daySlots=(slotMap[ds]||[]);
      let cell='';
      daySlots.forEach(slot=>{
        const sh=parseInt(slot.start_time)||0,eh=parseInt(slot.end_time)||0;
        if(h<sh||h>=eh)return;
        const ents=entMap[slot.id]||[];
        const isMine=ents.some(e=>e.staff_id===me?.id);
        const dispEnts=me.role==='admin'||me.role==='manager'?ents:ents.filter(e=>e.staff_id===me?.id);
        const bg=isMine?'#d4af7a':slot.staff_type==='full'?'#cce5ff':'#d4edda';
        const tc=isMine?'#2c3e50':slot.staff_type==='full'?'#004085':'#155724';
        const names=dispEnts.map(e=>e.shift_staff?.name?.[0]||'?').join('');
        cell+=`<div style="background:${bg};color:${tc};border-radius:3px;padding:1px 3px;font-size:9px;font-weight:600;margin-bottom:1px;">${slot.slot_name}${names?` ${names}`:''}</div>`;
      });
      tb+=`<td style="padding:2px;border:1px solid #eee;vertical-align:top;min-width:40px;">${cell}</td>`;
    });
    tb+='</tr>';
  }
  const weekStart=fmtDate(days[0]),weekEnd=fmtDate(days[6]);
  return`<div>
    <div class="mnav">
      <button class="arr" onclick="chW(-1)">‹</button>
      <span class="mtitle" style="font-size:13px;">${weekStart}〜${weekEnd.slice(5)}</span>
      <div style="display:flex;gap:4px;">
        <button class="today-btn" onclick="weekOff=0;renderCal()">今週</button>
        <button class="arr" onclick="chW(1)">›</button>
      </div>
    </div>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
      <table style="width:100%;border-collapse:collapse;min-width:320px;"><thead>${th}</thead><tbody>${tb}</tbody></table>
    </div>
  </div>`;
}
function switchView(v){calView=v;selDay=null;renderCal();}
function chW(d){weekOff+=d;renderCal();}

// ── Jump to date ─────────────────────────────────────────────────────────────
function openJumpModal(){
  const today=fmtDate(new Date());
  openModal(`<div class="modal-title">📅 日付に移動</div>
    <div class="form-col">
      <input type="date" id="jump-date" value="${today}"/>
      <button class="btn" onclick="jumpToDate()">移動する</button>
    </div>
    <div class="modal-btns"><button class="btn-sm gr" onclick="closeModal()">キャンセル</button></div>`);
}
function jumpToDate(){
  const val=document.getElementById('jump-date').value;
  if(!val)return;
  const d=new Date(val);
  calY=d.getFullYear();calM=d.getMonth();selDay=d.getDate();
  closeModal();renderCal();
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
