<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#222;background:#f5f3ef;}

/* PAGE SYSTEM */
.page{position:fixed;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;background:#f5f3ef;}

.fcol{display:flex;flex-direction:column;gap:10px;}

.tbtn2{padding:3px 10px;background:#d4af7a;color:#2c3e50;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;}
.vtabs{display:flex;gap:4px;margin-bottom:10px;}
.vt{flex:1;padding:7px 0;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:12px;font-weight:600;color:#666;cursor:pointer;text-align:center;}

/* Month grid */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:10px;}

.wtbl{width:100%;border-collapse:collapse;min-width:320px;}

/* Slot card */
.scard{border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid #e0e0e0;}
.scard.part{background:#f0fff4;border-color:#c3e6cb;}

.mtag.me{background:#d4af7a;border-color:#d4af7a;color:#2c3e50;}
.sacts{display:flex;gap:6px;flex-wrap:wrap;}
.joinbtn{padding:5px 14px;background:#2c5f2e;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;}
.lvbtn{padding:5px 14px;background:#c0392b;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;}

/* Clock */
.clkbar{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.clinbtn{padding:9px 16px;background:#2c5f2e;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;}
.cloutbtn{padding:9px 16px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;}

/* Legend */
.leg{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}

/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.mbg.show{display:flex;}
.mbox{background:#fff;border-radius:18px 18px 0 0;padding:22px 18px 40px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.mtit{font-weight:800;font-size:15px;color:#2c3e50;margin-bottom:14px;}
.mbtns{display:flex;gap:8px;margin-top:14px;}

/* Toast */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:8px;color:#fff;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none;white-space:nowrap;max-width:90vw;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#2c3e50;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}

/* Att row */
.arow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #eee;font-size:12px;}
.arow:last-child{border-bottom:none;}
</style>
</head>
<body>

  <div class="mbox" id="mbox"></div>
</div>

<script>
const SBU='https://hqddrswyqmammuwwrvna.supabase.co';
const SBK='sb_publishable_766-Q62xxyGNiARJhTg13A_lb7YxuEQ';
const sb=supabase.createClient(SBU,SBK);
const SLAT=34.6994118,SLNG=135.510767,SR=200;
const DJP=['日','月','火','水','木','金','土'];
const LT={paid:'有給休暇',sick:'病欠',mourning:'忌引き',unpaid:'無給休暇'};

let APW='haku2026',me=null;
let staff=[],settings={wage_per_hour:1100,max_hours_per_month:80,insurance_threshold_weekly:20};
let calY=new Date().getFullYear(),calM=new Date().getMonth(),selDay=null,calView='month',wOff=0;
let SC={},EC={},AC={},todayAtt=null;

// TOAST & MODAL
function toast(m,t='ok'){const e=document.getElementById('toast');e.textContent=m;e.style.background=t==='err'?'#c0392b':'#2c5f2e';e.style.display='block';clearTimeout(window._tt);window._tt=setTimeout(()=>e.style.display='none',2800);}
function openM(h){document.getElementById('mbox').innerHTML=h;document.getElementById('mbg').classList.add('show');}
function closeM(){document.getElementById('mbg').classList.remove('show');}

// PAGE NAV
function showP(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.hbtn').forEach(b=>b.classList.remove('on'));
  if(name==='login'){
    document.getElementById('p-login').classList.add('show');
    document.getElementById('hdr').classList.remove('show');
  } else {
    document.getElementById('p-'+name).classList.add('show');
    document.getElementById('hdr').classList.add('show');
    const nb=document.getElementById('nb-'+name);if(nb)nb.classList.add('on');
  }
}
function nav(name){
  showP(name);
  if(name==='cal')renderCal();
  else if(name==='att')renderAtt();
  else if(name==='leave')renderLeave();
  else if(name==='swap')renderSwap();
  else if(name==='admin')renderAdmin();
}
function ltab(n){
  document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('on',['staff','reg','admin'][i]===n));
  document.querySelectorAll('.tpane').forEach((p,i)=>p.classList.toggle('on',['lt-staff','lt-reg','lt-admin'][i]==='lt-'+n));
}

// UTILS
function ft(ts){if(!ts)return'--:--';const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fd(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function ch(i,o){if(!i||!o)return 0;return Math.round((new Date(o)-new Date(i))/36000)/100;}
function chft(s,e){const[sh,sm]=s.split(':').map(Number);const[eh,em]=e.split(':').map(Number);return Math.max(0,(eh*60+em-sh*60-sm)/60);}
function cw(h,wage,i,o){if(!i||!o||h<=0)return h*wage;let t=0,c=new Date(i);const ou=new Date(o);while(c<ou){const n=new Date(Math.min(c.getTime()+3600000,ou.getTime()));const hr=c.getHours();t+=(n-c)/3600000*wage*(hr>=22||hr<5?1.25:1);c=n;}return Math.round(t);}
function dm(la1,lo1,la2,lo2){const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

// DATA
async function loadAll(){
  try{
    await Promise.all([loadStaff(),loadSettings()]);
  }catch(e){
    document.getElementById('slogin').innerHTML='<p style="color:red;font-size:12px;">エラー: '+e.message+'</p>';
    console.error('loadAll error:',e);
  }
}
async function loadStaff(){
  try{
    const{data,error}=await sb.from('shift_staff').select('*').order('created_at');
    if(error)throw new Error('shift_staff: '+error.message);
    staff=data||[];renderSlogin();
  }catch(e){
    document.getElementById('slogin').innerHTML='<p style="color:red;font-size:11px;">スタッフ読込エラー: '+e.message+'</p>';
  }
}
async function loadSettings(){const{data}=await sb.from('shift_settings').select('*').eq('id',1).single();if(data){settings=data;if(data.admin_password)APW=data.admin_password;GPS_REQUIRED=data.gps_required||false;}}
async function loadMonth(y,m){
  const fr=`${y}-${String(m+1).padStart(2,'0')}-01`,to=`${y}-${String(m+1).padStart(2,'0')}-${new Date(y,m+1,0).getDate()}`;
  const k=`${y}-${m}`;
  const[sr,er,ar]=await Promise.all([
    sb.from('shift_slots').select('*').gte('date',fr).lte('date',to).order('start_time'),
    sb.from('slot_entries').select('*,shift_staff(id,name,staff_type)'),
    sb.from('attendance').select('*').gte('date',fr).lte('date',to)
  ]);
  const sm={};(sr.data||[]).forEach(s=>{if(!sm[s.date])sm[s.date]=[];sm[s.date].push(s);});SC[k]=sm;
  const em={};(er.data||[]).forEach(e=>{if(!em[e.slot_id])em[e.slot_id]=[];em[e.slot_id].push(e);});EC[k]=em;
  const am={};(ar.data||[]).forEach(a=>{if(!am[a.date])am[a.date]={};am[a.date][a.staff_id]=a;});AC[k]=am;
  if(me&&me.role!=='admin'&&me.role!=='manager')todayAtt=(AC[k][fd(new Date())]||{})[me.id]||null;
}
function getMH(y,m){
  const am=AC[`${y}-${m}`]||{},sm=SC[`${y}-${m}`]||{},em=EC[`${y}-${m}`]||{},res={};
  staff.forEach(s=>res[s.id]=0);
  // Actual attendance
  Object.values(am).forEach(dm2=>Object.entries(dm2).forEach(([sid,a])=>{if(a.clock_in&&a.clock_out)res[sid]=(res[sid]||0)+ch(a.clock_in,a.clock_out);}));
  // For part-time: also count scheduled slots they joined (if no attendance record)
  Object.entries(sm).forEach(([date,slots])=>{
    slots.forEach(slot=>{
      const ents=em[slot.id]||[];
      ents.forEach(e=>{
        const hasAtt=(am[date]||{})[e.staff_id];
        if(!hasAtt){
          const h=chft(slot.start_time,slot.end_time);
          res[e.staff_id]=(res[e.staff_id]||0)+h;
        }
      });
    });
  });
  return res;
}
// Get weekly hours for a staff member
function getWeeklyH(staffId,y,m){
  const sm=SC[`${y}-${m}`]||{},em=EC[`${y}-${m}`]||{},am=AC[`${y}-${m}`]||{};
  // Get current week range
  const today=new Date();
  const weekStart=new Date(today);weekStart.setDate(today.getDate()-today.getDay());
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);
  let total=0;
  Object.entries(sm).forEach(([date,slots])=>{
    const d=new Date(date);
    if(d<weekStart||d>weekEnd)return;
    slots.forEach(slot=>{
      const ents=em[slot.id]||[];
      if(!ents.find(e=>e.staff_id===staffId))return;
      const hasAtt=(am[date]||{})[staffId];
      if(hasAtt&&hasAtt.clock_in&&hasAtt.clock_out) total+=ch(hasAtt.clock_in,hasAtt.clock_out);
      else total+=chft(slot.start_time,slot.end_time);
    });
  });
  return Math.round(total*10)/10;
}

// AUTH
function renderSlogin(){
  const el=document.getElementById('slogin');if(!el)return;
  if(staff.length===0){el.innerHTML='<p class="empty">スタッフが登録されていません</p>';return;}
  let html='<div class="fcol">';
  html+='<select id="ssel" style="font-size:14px;padding:11px;">';
  html+='<option value="">スタッフを選択…</option>';
  staff.forEach(s=>{
    const lbl=s.staff_type==='full'?' 【正社員】':'';
    html+='<option value="'+s.id+'">'+s.name+lbl+'</option>';
  });
  html+='</select>';
  html+='<input type="password" id="spw" placeholder="パスワード（初期：0000）"/>';
  html+='<button class="btn" onclick="doStaffLogin()">ログイン</button>';
  html+='</div>';
  el.innerHTML=html;
  const spwEl=document.getElementById('spw');
  if(spwEl)spwEl.addEventListener('keydown',function(e){if(e.key==='Enter')doStaffLogin();});
}

function doStaffLogin(){

async function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const stype=document.getElementById('reg-type').value;
  const isPart=stype==='part';
  const wage=isPart?(parseInt(document.getElementById('reg-wage').value)||settings.wage_per_hour):0;
  const maxWeek=isPart?(parseInt(document.getElementById('reg-week').value)||20):0;
  const salary=!isPart?(parseInt(document.getElementById('reg-salary').value)||0):0;
  const maxH=!isPart?(parseInt(document.getElementById('reg-max').value)||settings.max_hours_per_month):0;
  if(!name){toast('名前を入力してください','err');return;}
  if(staff.find(s=>s.name===name)){toast('同じ名前が既にあります','err');return;}
  const roleV=stype==='manager'?'manager':stype==='full'?'full':'part';
  const stypeV=stype==='manager'?'full':stype;
  const{data,error}=await sb.from('shift_staff').insert({name,staff_type:stypeV,role:roleV,wage,max_hours:maxH,max_hours_per_week:maxWeek,monthly_salary:salary}).select().single();
  if(error){toast('登録に失敗しました','err');return;}
  staff.push(data);renderSlogin();
  document.getElementById('reg-name').value='';toast(`${name} を登録しました`);ltab('staff');
}

// CALENDAR
async function renderCal(){

      html+=`<div class="clkbar"><div style="font-size:12px;color:#555;">本日未出勤</div><button class="clinbtn" onclick="clockIn()">出勤 🟢</button></div>`;
    } else if(!a.clock_out){
      html+=`<div class="clkbar"><div style="font-size:12px;color:#555;">出勤中 <strong>${ft(a.clock_in)}〜</strong></div><button class="cloutbtn" onclick="clockOut()">退勤 🔴</button></div>`;
    } else {
      html+=`<div class="clkbar"><div style="font-size:12px;color:#555;"><strong>${ft(a.clock_in)}〜${ft(a.clock_out)}</strong> 退勤済</div><span style="font-size:11px;color:#aaa;">お疲れ様！</span></div>`;

      html+='<div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-size:12px;color:#666;">今月の合計</span><span style="font-size:13px;font-weight:600;color:#2c3e50;">'+myH+'h</span></div>';
      html+='<div style="display:flex;justify-content:space-between;"><span style="font-size:12px;color:#666;">推定給与</span><span style="font-size:13px;font-weight:600;color:#2c3e50;">¥'+(myH*wage).toLocaleString()+'</span></div>';

      const isPart=s.staff_type==='part';

      const maxMon=s.max_hours||settings.max_hours_per_month;

      const fc=pct>90?'#c0392b':'#2c5f2e';
      const roleLabel=s.role==='manager'?'店長':s.staff_type==='full'?'正社員':'バイト';

      else if(isOwner&&!isPart) salStr=' 月給¥'+(s.monthly_salary||0).toLocaleString();

function buildDayPanel(day,sm,em,am,mh){

        if(myE)acts+=`<button class="lvbtn" onclick="leaveSlot('${myE.id}','${slot.id}','${ds}')">キャンセル</button>`;
        else if(!isFull)acts+=`<button class="joinbtn" onclick="joinSlot('${slot.id}','${ds}')">参加する</button>`;
        else acts+=`<span style="font-size:11px;color:#888;">満員</span>`;

      html+=`<div class="scard part">
        <div class="shed"><span class="sname">${slot.slot_name}</span><span class="stime">${slot.start_time.slice(0,5)}〜${slot.end_time.slice(0,5)}</span></div>
        <div style="font-size:11px;color:#888;margin-bottom:5px;">定員${slot.max_staff}人　残り${Math.max(0,slot.max_staff-ents.length)}人</div>
        <div class="smems">${mems||'<span style="color:#bbb;font-size:11px;font-style:italic;">まだ誰もいません</span>'}</div>

  if(fSlots.length>0){
    html+=`<div style="font-size:12px;font-weight:700;color:#2471a3;margin-bottom:6px;margin-top:10px;">🟦 正社員枠</div>`;
    fSlots.forEach(slot=>{
      const ents=em[slot.id]||[],isFull=ents.length>=slot.max_staff;
      const myE=ents.find(e=>e.staff_id===me?.id);
      const mems=ents.map(e=>`<span class="mtag${e.staff_id===me?.id?' me':''}">${e.shift_staff?.name||'?'}</span>`).join('');
      let acts='';
      if(isAdmin){
        acts+=`<button class="bsm bd" onclick="openManageSlot('${slot.id}','${slot.slot_name}','${ds}')">管理</button>`;
        acts+=` <button class="bsm br" onclick="delSlot('${slot.id}','${ds}')">削除</button>`;
      } else if(me.stype==='full'){
        if(myE)acts+=`<button class="lvbtn" onclick="leaveSlot('${myE.id}','${slot.id}','${ds}')">キャンセル</button>`;
        else if(!isFull)acts+=`<button class="joinbtn" onclick="joinSlot('${slot.id}','${ds}')">参加する</button>`;
        else acts+=`<span style="font-size:11px;color:#888;">満員</span>`;
      }
      html+=`<div class="scard full">
        <div class="shed"><span class="sname">${slot.slot_name}</span><span class="stime">${slot.start_time.slice(0,5)}〜${slot.end_time.slice(0,5)}</span></div>
        <div style="font-size:11px;color:#888;margin-bottom:5px;">定員${slot.max_staff}人　残り${Math.max(0,slot.max_staff-ents.length)}人</div>
        <div class="smems">${mems||'<span style="color:#bbb;font-size:11px;font-style:italic;">まだ誰もいません</span>'}</div>
        <div class="sacts">${acts}</div>
      </div>`;
    });
  }

  if(daySlots.length===0&&!isAdmin) html+=`<p class="empty">この日はシフト枠がありません</p>`;

  // Full-time status (admin/manager)
  if(isAdmin){
    const fStaff=staff.filter(s=>s.staff_type==='full');
    if(fStaff.length>0){
      html+=`<div style="font-size:12px;font-weight:700;color:#555;margin:10px 0 6px;">正社員 出勤状況</div>`;

  html+=`</div>`;
  return html;
}

function buildWeek(sm,em,am){
  const today=new Date(),sw=new Date(today);
  sw.setDate(today.getDate()-today.getDay()+wOff*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sw);d.setDate(d.getDate()+i);return d;});
  const ts=fd(today);
  // Build using divs with absolute positioning for continuous blocks
  const ws=fd(days[0]),we=fd(days[6]);
  const HOUR_H=36; // px per hour
  const START_H=6,END_H=23,TOTAL_H=END_H-START_H;
  let html=`<div>
    <div class="mnav">
      <button class="arr" onclick="chW(-1)">‹</button>
      <span class="mtitle" style="font-size:13px;">${ws}〜${we.slice(5)}</span>
      <div style="display:flex;gap:4px;"><button class="tbtn2" onclick="wOff=0;renderCal()">今週</button><button class="arr" onclick="chW(1)">›</button></div>
    </div>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
      <div style="min-width:340px;">
        <div style="display:flex;">
          <div style="width:36px;flex-shrink:0;"></div>`;
  // Day headers
  days.forEach((d,i)=>{
    const ds=fd(d),isT=ds===ts;
    html+=`<div style="flex:1;text-align:center;padding:4px 2px;font-size:10px;font-weight:700;background:${isT?'#d4af7a':'#2c3e50'};color:${isT?'#2c3e50':'#fff'};">
      <div>${DJP[i]}</div><div>${d.getDate()}</div>
    </div>`;
  });
  html+=`</div>
        <div style="display:flex;">
          <div style="width:36px;flex-shrink:0;position:relative;">`;
  // Time labels
  for(let h=START_H;h<=END_H;h++){
    html+=`<div style="position:absolute;top:${(h-START_H)*HOUR_H}px;left:0;right:0;font-size:9px;color:#888;text-align:center;border-top:1px solid #eee;padding-top:2px;">${String(h).padStart(2,'0')}</div>`;
  }
  html+=`<div style="height:${TOTAL_H*HOUR_H}px;"></div></div>`;
  // Day columns
  days.forEach(d=>{
    const ds=fd(d),daySlots=sm[ds]||[];
    html+=`<div style="flex:1;position:relative;border-left:1px solid #eee;cursor:pointer;" onclick="weekDayClick('${ds}')">`;
    // Hour lines
    for(let h=START_H;h<=END_H;h++){
      html+=`<div style="position:absolute;top:${(h-START_H)*HOUR_H}px;left:0;right:0;border-top:1px solid #f0f0f0;height:${HOUR_H}px;"></div>`;
    }
    // Slot blocks
    daySlots.forEach(slot=>{
      const[ssh,ssm]=slot.start_time.split(':').map(Number);
      const[seh,sem]=slot.end_time.split(':').map(Number);
      const startMin=(ssh+ssm/60-START_H)*HOUR_H;
      const heightMin=((seh+sem/60)-(ssh+ssm/60))*HOUR_H;
      if(startMin<0||startMin>=TOTAL_H*HOUR_H)return;
      const ents=em[slot.id]||[];
      const isMine=ents.some(e=>e.staff_id===me?.id);
      const dispE=me.role==='admin'||me.role==='manager'?ents:ents.filter(e=>e.staff_id===me?.id);
      if(me.role==='staff'&&dispE.length===0)return;
      const bg=isMine?'#d4af7a':slot.staff_type==='full'?'#cce5ff':'#d4edda';
      const tc=isMine?'#2c3e50':slot.staff_type==='full'?'#004085':'#155724';
      const border=isMine?'#c09050':slot.staff_type==='full'?'#90b8e0':'#90c8a0';
      const names=dispE.map(e=>e.shift_staff?.name?.[0]||'?').join('');
      html+=`<div style="position:absolute;top:${startMin}px;left:1px;right:1px;height:${Math.max(heightMin-2,14)}px;background:${bg};color:${tc};border-radius:4px;border-left:3px solid ${border};padding:2px 3px;overflow:hidden;font-size:9px;font-weight:700;z-index:1;cursor:pointer;" onclick="event.stopPropagation();weekSlotClick('${slot.id}','${ds}')">
        <div style="line-height:1.2;">${slot.slot_name}</div>
        ${names?`<div style="font-size:8px;opacity:.8;">${names}</div>`:''}
      </div>`;
    });
    html+=`<div style="height:${TOTAL_H*HOUR_H}px;"></div></div>`;
  });
  html+=`</div></div></div></div>`;
  return html;
}

function selD(d){selDay=selDay===d?null:d;renderCal();}
async function chM(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}selDay=null;await renderCal();}
function chW(d){wOff+=d;renderCal();}
function swView(v){calView=v;selDay=null;renderCal();}
function goToday(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();selDay=n.getDate();wOff=0;renderCal();}
function weekDayClick(ds){
  const d=new Date(ds);
  calY=d.getFullYear();calM=d.getMonth();selDay=d.getDate();
  calView='month';
  renderCal();
  setTimeout(()=>{const dp=document.querySelector('.dp');if(dp)dp.scrollIntoView({behavior:'smooth',block:'start'});},300);
}
function weekSlotClick(slotId,ds){
  const k=calY+'-'+calM;
  const em=EC[k]||{};
  let slot=null;
  Object.values(SC[k]||{}).forEach(slots=>slots.forEach(s=>{if(s.id===slotId)slot=s;}));
  if(!slot)return;
  const ents=em[slotId]||[];
  const isFull=ents.length>=slot.max_staff;

// CLOCK
async function clockIn(){
  const today=fd(new Date());
  const doIn=async(lat,lng)=>{
    const{data:ex}=await sb.from('attendance').select('*').eq('staff_id',me.id).eq('date',today).single();
    if(ex&&ex.clock_in){toast('既に出勤済みです','err');return;}
    const{data,error}=await sb.from('attendance').upsert({staff_id:me.id,date:today,clock_in:new Date().toISOString(),clock_in_lat:lat,clock_in_lng:lng,status:'normal'},{onConflict:'staff_id,date'}).select().single();
    if(error){toast('打刻に失敗しました','err');return;}
    todayAtt=data;toast('出勤打刻しました 🟢');renderCal();
  };
  if(!GPS_REQUIRED){
    await doIn(null,null);return;
  }
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
    if(dm(pos.coords.latitude,pos.coords.longitude,SLAT,SLNG)>SR){toast('店舗から離れすぎています','err');return;}
    await doIn(pos.coords.latitude,pos.coords.longitude);
  }catch(e){if(e.code===1){toast('位置情報の許可が必要です','err');return;}await doIn(null,null);}
}
async function clockOut(){
  if(!todayAtt){toast('出勤記録がありません','err');return;}
  const now=new Date();
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
    await sb.from('attendance').update({clock_out:now.toISOString(),clock_out_lat:pos.coords.latitude,clock_out_lng:pos.coords.longitude}).eq('id',todayAtt.id);
  }catch{await sb.from('attendance').update({clock_out:now.toISOString()}).eq('id',todayAtt.id);}
  todayAtt={...todayAtt,clock_out:now.toISOString()};toast('退勤打刻しました 🔴');renderCal();
}

    html+='<div class="card"><div class="stitle">⚙ グローバル設定</div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;"><span style="font-size:13px;color:#555;">デフォルト時給（円）</span><input type="number" style="width:110px;" id="swage" value="'+settings.wage_per_hour+'"/></div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;"><span style="font-size:13px;color:#555;">月最大時間</span><input type="number" style="width:110px;" id="smax" value="'+settings.max_hours_per_month+'"/></div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;"><span style="font-size:13px;color:#555;">雇用保険警告（週h）</span><input type="number" style="width:110px;" id="sins" value="'+settings.insurance_threshold_weekly+'"/></div>';
    html+='<p style="font-size:11px;color:#888;">※法定：週20h以上で雇用保険加入義務</p>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;margin-bottom:10px;">';
    html+='<span style="font-size:13px;color:#555;">GPS打刻 '+(GPS_REQUIRED?'🟢 ON':'⚫ OFF')+'</span>';
    html+='<button class="btn-sm '+(GPS_REQUIRED?'br':'bg')+'" onclick="toggleGPS()">'+(GPS_REQUIRED?'OFFにする':'ONにする')+'</button>';
    html+='</div>';
    html+='<button class="btn" onclick="saveSettings()">設定を保存</button></div>';

    html+='<div class="card"><div class="stitle">🔑 管理者パスワード変更</div>';
    html+='<div class="fcol">';
    html+='<input type="password" id="pwcur" placeholder="現在のパスワード"/>';
    html+='<input type="password" id="pwnew" placeholder="新しいパスワード"/>';
    html+='<input type="password" id="pwcnf" placeholder="確認"/>';
    html+='<button class="btn" onclick="changeAdminPW()">変更する</button></div></div>';

    html+='<div class="card"><div class="stitle">＋ スタッフ追加</div>';
    html+='<div class="fcol">';
    html+='<input type="text" id="aname" placeholder="名前"/>';
    html+='<select id="atype" onchange="toggleAdminFields(this.value)">';
    html+='<option value="part">アルバイト</option>';
    html+='<option value="full">正社員</option>';
    html+='<option value="manager">店長</option></select>';
    html+='<div id="admin-part-fields" style="display:flex;flex-direction:column;gap:10px;">';
    html+='<input type="number" id="awage" placeholder="時給（円）"/>';
    html+='<input type="number" id="awkh" placeholder="週最大時間（デフォルト：20h）"/></div>';
    html+='<div id="admin-full-fields" style="display:none;flex-direction:column;gap:10px;">';
    html+='<input type="number" id="asal" placeholder="月給（円）"/>';
    html+='<input type="number" id="amax" placeholder="月最大時間"/></div>';
    html+='<button class="btn" onclick="adminAddStaff()">追加する</button>';
    html+='</div></div>';
  }

  html+='<div class="card"><div class="stitle">👥 スタッフ一覧</div>';
  if(staff.length===0){
    html+='<p class="empty">スタッフがいません</p>';
  } else {
    staff.forEach(s=>{
      const h=Math.round((mh[s.id]||0)*10)/10;
      const isPart=s.staff_type==='part';
      const wkH=isPart?getWeeklyH(s.id,calY,calM):0;
      const maxWk=s.max_hours_per_week||20;
      const maxMon=s.max_hours||settings.max_hours_per_month;
      const pct=isPart?Math.min(wkH/maxWk*100,100):Math.min(h/maxMon*100,100);
      const fc=pct>90?'#c0392b':'#2c5f2e';
      const roleLabel=isPart?'バイト':'正社員';
      const avClass=isPart?'avp':'avf';
      let info1='',info2='';
      if(isOwner){
        if(isPart){
          info1='時給¥'+s.wage+'　週最大'+(s.max_hours_per_week||20)+'h　PW:'+(s.password||'0000');
          info2='今週:'+wkH+'h　今月:'+h+'h　¥'+(h*s.wage).toLocaleString();
        } else {
          info1='月給¥'+(s.monthly_salary||0).toLocaleString()+'　月最大'+(s.max_hours||0)+'h　PW:'+(s.password||'0000');
          info2='今月:'+h+'h';
        }
      } else {
        info1=isPart?('週最大'+(s.max_hours_per_week||20)+'h　今週:'+wkH+'h'):'月給制';
        info2='今月:'+h+'h';
      }
      html+='<div style="background:#f8f6f2;border-radius:10px;padding:10px 12px;margin-bottom:8px;">';
      html+='<div style="display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px;margin-bottom:3px;">';
      html+='<span class="av '+avClass+'">'+s.name[0]+'</span>'+s.name;
      html+='<span style="font-size:10px;color:#888;">'+roleLabel+'</span></div>';
      html+='<div style="font-size:11px;color:#777;margin-bottom:2px;">'+info1+'</div>';
      html+='<div style="font-size:11px;color:#555;margin-bottom:6px;">'+info2+'</div>';
      if(isPart){
        html+='<div class="prog"><div class="progf" style="width:'+pct+'%;background:'+fc+';"></div></div>';
      }
      html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">';
      if(isOwner){
        html+='<button class="bsm bd" onclick="openEditStaff(&quot;'+s.id+'&quot;)">編集</button>';
        html+='<button class="bsm bgold" onclick="openSetPW(&quot;'+s.id+'&quot;,&quot;'+s.name+'&quot;)">PW設定</button>';
        html+='<button class="bsm br" onclick="delStaff(&quot;'+s.id+'&quot;,&quot;'+s.name+'&quot;)">削除</button>';
      } else {
        html+='<span style="font-size:11px;color:#aaa;">（編集はオーナーのみ）</span>';
      }
      html+='</div></div>';
    });
  }
  html+='</div>';
  wrap.innerHTML=html;
}

async function toggleGPS(){
  GPS_REQUIRED=!GPS_REQUIRED;
  await sb.from('shift_settings').update({gps_required:GPS_REQUIRED}).eq('id',1);
  toast('GPS打刻を'+(GPS_REQUIRED?'ON':'OFF')+'にしました');
  renderAdmin();
}
async function saveSettings(){
  const wage=parseInt(document.getElementById('swage').value)||1100,max=parseInt(document.getElementById('smax').value)||80,ins=parseInt(document.getElementById('sins').value)||20;
  await sb.from('shift_settings').upsert({id:1,wage_per_hour:wage,max_hours_per_month:max,insurance_threshold_weekly:ins,admin_password:APW});
  settings={...settings,wage_per_hour:wage,max_hours_per_month:max,insurance_threshold_weekly:ins};toast('保存しました');
}
async function changeAdminPW(){
  const cur=document.getElementById('pwcur').value,nw=document.getElementById('pwnew').value,cnf=document.getElementById('pwcnf').value;
  if(cur!==APW){toast('現在のパスワードが違います','err');return;}
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_settings').update({admin_password:nw}).eq('id',1);
  APW=nw;['pwcur','pwnew','pwcnf'].forEach(id=>document.getElementById(id).value='');toast('変更しました');
}
async function adminAddStaff(){
  const name=document.getElementById('aname').value.trim(),stype=document.getElementById('atype').value;
  if(!name){toast('名前を入力してください','err');return;}
  if(staff.find(s=>s.name===name)){toast('同じ名前が既にあります','err');return;}
  const roleV=stype==='manager'?'manager':stype==='full'?'full':'part';
  const stypeV=stype==='manager'?'full':stype;
  const isPart=stype==='part';
  const wage=isPart?parseInt(document.getElementById('awage').value)||settings.wage_per_hour:0;
  const maxWeek=isPart?parseInt(document.getElementById('awkh').value)||20:0;
  const salary=!isPart?parseInt(document.getElementById('asal').value)||0:0;
  const maxH=!isPart?parseInt(document.getElementById('amax').value)||settings.max_hours_per_month:0;
  const{data,error}=await sb.from('shift_staff').insert({name,staff_type:stypeV,role:roleV,wage,max_hours:maxH,max_hours_per_week:maxWeek,monthly_salary:salary}).select().single();
  if(error){toast('追加に失敗しました','err');return;}
  staff.push(data);toast(`${name} を追加しました`);renderAdmin();
}
function openEditStaff(id){
  const s=staff.find(x=>x.id===id);if(!s)return;
  const isPart=s.staff_type==='part';
  openM(`<div class="mtit">${s.name} の編集</div>
    <div class="fcol">
      <input type="text" id="esn" value="${s.name}"/>
      <select id="est" onchange="toggleEditFields(this.value)">
        <option value="part"${s.role==='part'?' selected':''}>アルバイト</option>
        <option value="full"${s.role==='full'?' selected':''}>正社員</option>
        <option value="manager"${s.role==='manager'?' selected':''}>店長</option>
      </select>
      <div id="edit-part" style="${isPart?'':`display:none;`}">
        <input type="number" id="esw" value="${s.wage}" placeholder="時給（円）"/>
        <input type="number" id="eswk" value="${s.max_hours_per_week||20}" placeholder="週最大時間"/>
      </div>
      <div id="edit-full" style="${!isPart?'':`display:none;`}">
        <input type="number" id="esal" value="${s.monthly_salary||0}" placeholder="月給（円）"/>
        <input type="number" id="esm" value="${s.max_hours}" placeholder="月最大時間"/>
      </div>
    </div>
    <div class="mbtns"><button class="bsm bg" onclick="doEditStaff('${id}')">保存</button><button class="bsm bgr" onclick="closeM()">キャンセル</button></div>`);
}
function toggleEditFields(val){
  const isPart=val==='part';
  document.getElementById('edit-part').style.display=isPart?'block':'none';
  document.getElementById('edit-full').style.display=isPart?'none':'block';
}
async function doEditStaff(id){
  const name=document.getElementById('esn').value.trim(),stype=document.getElementById('est').value;
  if(!name){toast('名前を入力してください','err');return;}
  const roleV=stype==='manager'?'manager':stype==='full'?'full':'part';
  const stypeV=stype==='manager'?'full':stype;
  const isPart=stype==='part';
  const wage=isPart?parseInt(document.getElementById('esw').value)||0:0;
  const maxWeek=isPart?parseInt(document.getElementById('eswk').value)||20:0;
  const salary=!isPart?parseInt(document.getElementById('esal').value)||0:0;
  const maxH=!isPart?parseInt(document.getElementById('esm').value)||settings.max_hours_per_month:0;
  await sb.from('shift_staff').update({name,staff_type:stypeV,role:roleV,wage,max_hours:maxH,max_hours_per_week:maxWeek,monthly_salary:salary}).eq('id',id);
  staff=staff.map(s=>s.id===id?{...s,name,staff_type:stypeV,role:roleV,wage,max_hours:maxH,max_hours_per_week:maxWeek,monthly_salary:salary}:s);
  closeM();toast('更新しました');renderAdmin();
}
async function delStaff(id,name){
  if(!confirm(`${name} を削除しますか？`))return;
  await sb.from('shift_staff').delete().eq('id',id);
  staff=staff.filter(s=>s.id!==id);toast(`${name} を削除しました`);renderAdmin();
}
function openSetPW(id,name){
  openM(`<div class="mtit">${name} のPW設定</div>
    <div class="fcol"><input type="password" id="spn" placeholder="新しいパスワード"/><input type="password" id="spc" placeholder="確認"/></div>
    <div class="mbtns"><button class="bsm bg" onclick="doSetPW('${id}')">設定</button><button class="bsm bgr" onclick="closeM()">キャンセル</button></div>`);
}
async function doSetPW(id){
  const nw=document.getElementById('spn').value,cnf=document.getElementById('spc').value;
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_staff').update({password:nw}).eq('id',id);
  staff=staff.map(s=>s.id===id?{...s,password:nw}:s);closeM();toast('設定しました');renderAdmin();
}
function openSelfPW(){
  openM(`<div class="mtit">パスワード変更</div>
    <div class="fcol"><input type="password" id="mpc" placeholder="現在のPW"/><input type="password" id="mpn" placeholder="新しいPW"/><input type="password" id="mpcf" placeholder="確認"/></div>
    <div class="mbtns"><button class="bsm bg" onclick="doSelfPW()">変更</button><button class="bsm bgr" onclick="closeM()">キャンセル</button></div>`);
}
async function doSelfPW(){
  const cur=document.getElementById('mpc').value,nw=document.getElementById('mpn').value,cnf=document.getElementById('mpcf').value;
  const myS=staff.find(s=>s.id===me.id);
  if(cur!==(myS?.password||'0000')){toast('現在のPWが違います','err');return;}
  if(!nw||nw!==cnf){toast('PWが一致しません','err');return;}
  await sb.from('shift_staff').update({password:nw}).eq('id',me.id);
  staff=staff.map(s=>s.id===me.id?{...s,password:nw}:s);closeM();toast('変更しました');
}

loadAll();
</script>
</body>
