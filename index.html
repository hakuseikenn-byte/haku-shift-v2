<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Haku シフト管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#222;background:#f5f3ef;}

/* ===== PAGE SYSTEM ===== */
/* Each page is fullscreen fixed. Only one shows at a time. */
.page{
  position:fixed;top:0;left:0;right:0;bottom:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:none;
}
.page.show{display:block;}

/* Login page */
#p-login{
  background:linear-gradient(135deg,#2c3e50 0%,#4a6741 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
#p-login.show{display:flex;}

/* App pages sit below header */
#p-cal,#p-attendance,#p-leave,#p-admin{
  top:52px;background:#f5f3ef;padding:14px 12px 80px;
}

/* ===== HEADER ===== */
#app-header{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:#2c3e50;color:#fff;
  display:none;align-items:center;justify-content:space-between;
  padding:0 14px;z-index:100;
}
#app-header.show{display:flex;}
.h-logo{font-weight:800;font-size:18px;color:#d4af7a;letter-spacing:2px;}
.h-user{font-size:12px;color:rgba(255,255,255,.6);margin-left:8px;}
.h-nav{display:flex;gap:5px;align-items:center;}
.h-btn{padding:5px 10px;background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:6px;color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;}
.h-btn.on{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.5);}
.h-out{padding:5px 8px;background:transparent;border:none;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;}

/* ===== LOGIN CARD ===== */
.login-card{background:#fff;border-radius:18px;padding:30px 24px;width:100%;max-width:370px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.logo-wrap{text-align:center;margin-bottom:24px;}
.logo-circle{display:block;width:52px;height:52px;line-height:52px;border-radius:50%;background:#2c3e50;color:#d4af7a;font-size:24px;font-weight:800;margin:0 auto 10px;}
.logo-name{font-weight:700;font-size:16px;color:#2c3e50;letter-spacing:1px;display:block;}
.logo-sub{font-size:12px;color:#888;margin-top:4px;letter-spacing:2px;display:block;}
.tab-bar{display:flex;border-radius:8px;overflow:hidden;border:1px solid #e0e0e0;margin-bottom:18px;}
.tab-btn{flex:1;padding:9px 0;background:#f8f6f2;border:none;cursor:pointer;font-size:13px;color:#666;font-weight:600;}
.tab-btn.on{background:#2c3e50;color:#fff;}
.tab-pane{display:none;}
.tab-pane.on{display:block;}

/* ===== COMMON ===== */
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px;}
.sec-title{font-weight:800;font-size:15px;color:#2c3e50;margin-bottom:13px;}
.form-col{display:flex;flex-direction:column;gap:11px;}
input,select,textarea{padding:10px 12px;border-radius:8px;border:1px solid #d0d0d0;font-size:14px;outline:none;background:#fafafa;color:#222;width:100%;font-family:inherit;}
textarea{resize:vertical;min-height:70px;}
.btn{padding:12px 0;background:#2c3e50;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;width:100%;}
.btn-sm{padding:5px 13px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:700;}
.g{background:#2c5f2e;color:#fff;}
.r{background:#c0392b;color:#fff;}
.d{background:#2c3e50;color:#fff;}
.gr{background:#ddd;color:#555;}
.gold{background:#d4af7a;color:#2c3e50;}
.empty{text-align:center;color:#999;font-size:13px;padding:16px 0;line-height:1.8;}

/* Progress */
.prog-bg{height:6px;border-radius:99px;background:#eee;overflow:hidden;margin:6px 0;}
.prog-fill{height:100%;border-radius:99px;transition:width .4s;}

/* Avatar */
.av{width:34px;height:34px;border-radius:50%;background:#2c3e50;color:#d4af7a;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;}
.av.sm{width:26px;height:26px;font-size:12px;}

/* Clock banner */
.clock-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
.clock-in-btn{padding:10px 18px;background:#2c5f2e;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;}
.clock-out-btn{padding:10px 18px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;}

/* View tabs */
.view-tabs{display:flex;gap:4px;margin-bottom:14px;}
.vt{flex:1;padding:8px 0;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:13px;font-weight:600;color:#666;cursor:pointer;text-align:center;}
.vt.on{background:#2c3e50;color:#fff;border-color:#2c3e50;}

/* Month nav */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.mtitle{font-weight:800;font-size:18px;color:#2c3e50;}
.arr{background:none;border:1px solid #ddd;border-radius:6px;font-size:20px;cursor:pointer;color:#2c3e50;padding:2px 10px;line-height:1.4;}
.today-btn{padding:4px 12px;background:#d4af7a;color:#2c3e50;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;}

/* Calendar grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px;}
.dh{text-align:center;font-size:11px;font-weight:700;padding:5px 0;}
.cd{border:1px solid #e8e8e8;border-radius:6px;padding:4px 3px 3px;min-height:58px;cursor:pointer;display:flex;flex-direction:column;background:#fff;}
.cd.sel{border-color:#2c3e50;box-shadow:0 0 0 2px #2c3e50;}
.cd.tod{background:#fef9e7;}
.cdn{font-size:12px;font-weight:700;line-height:1;margin-bottom:2px;}
.chip{font-size:9px;padding:1px 3px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;margin-bottom:1px;}

/* Day panel */
.dp-title{font-weight:800;font-size:16px;color:#2c3e50;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #f0ede8;}
.sr{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f0ede8;}
.sr:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.sn{display:flex;align-items:center;gap:7px;font-weight:600;font-size:14px;color:#2c3e50;margin-bottom:7px;}
.sbadge{display:inline-flex;align-items:center;gap:6px;border-radius:6px;padding:4px 10px;font-size:13px;font-weight:600;}
.add-btn{background:none;border:1px dashed #bbb;border-radius:7px;color:#777;padding:5px 12px;font-size:13px;cursor:pointer;}

/* Week */
.wk-grid{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.wk-table{width:100%;border-collapse:collapse;min-width:480px;font-size:12px;}
.wk-table th{background:#2c3e50;color:#fff;padding:6px 4px;text-align:center;font-weight:600;border:1px solid #3d5166;}
.wk-table td{padding:4px;border:1px solid #e8e8e8;vertical-align:top;min-width:55px;background:#fff;}
.wk-tc{background:#f8f6f2!important;font-weight:600;color:#555;text-align:center;font-size:11px;width:40px;}
.wk-chip{border-radius:4px;padding:2px 4px;font-size:10px;font-weight:600;display:block;margin-bottom:1px;text-align:center;}

/* Attendance */
.att-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee;font-size:13px;}
.att-row:last-child{border-bottom:none;}

/* Warning */
.warn{background:#fef9e7;border:1px solid #f0c040;border-radius:8px;padding:7px 10px;font-size:12px;color:#7d6608;margin-top:4px;}

/* Leave */
.lv-card{background:#f8f6f2;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.lv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.lv-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;}
.pending{background:#fef3cd;color:#856404;}
.approved{background:#d4edda;color:#155724;}
.rejected{background:#f8d7da;color:#721c24;}

/* Staff card */
.staff-card{background:#f8f6f2;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.staff-card:last-child{margin-bottom:0;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-box{background:#fff;border-radius:18px 18px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.modal-title{font-weight:800;font-size:16px;color:#2c3e50;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}

/* Toast */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:8px;color:#fff;font-size:14px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none;white-space:nowrap;max-width:90vw;}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#2c3e50;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
.loading{text-align:center;color:#aaa;font-size:13px;padding:30px 0;}

/* Setting row */
.s-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.s-label{font-size:13px;color:#555;}
.s-input{width:110px;}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ===== HEADER ===== -->
<div id="app-header">
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="h-logo">Haku</span>
    <span class="h-user" id="h-user"></span>
  </div>
  <div class="h-nav">
    <button class="h-btn on" id="nb-cal" onclick="nav('cal')">📅</button>
    <button class="h-btn" id="nb-attendance" onclick="nav('attendance')">🕐</button>
    <button class="h-btn" id="nb-leave" onclick="nav('leave')">📋</button>
    <button class="h-btn" id="nb-admin" style="display:none;" onclick="nav('admin')">⚙</button>
    <button class="h-out" onclick="logout()">退出</button>
  </div>
</div>

<!-- ===== LOGIN PAGE ===== -->
<div id="p-login" class="page show">
  <div class="login-card">
    <div class="logo-wrap">
      <span class="logo-circle">H</span>
      <span class="logo-name">Café La Petite Haku</span>
      <span class="logo-sub">シフト管理</span>
    </div>
    <div class="tab-bar">
      <button class="tab-btn on" onclick="ltab('staff')">スタッフ</button>
      <button class="tab-btn" onclick="ltab('reg')">新規登録</button>
      <button class="tab-btn" onclick="ltab('admin')">管理者</button>
    </div>
    <div id="lt-staff" class="tab-pane on">
      <div id="staff-login-area"><div class="loading"><span class="spin"></span>読み込み中…</div></div>
    </div>
    <div id="lt-reg" class="tab-pane">
      <div class="form-col">
        <input type="text" id="reg-name" placeholder="お名前"/>
        <input type="number" id="reg-wage" placeholder="時給（円）"/>
        <input type="number" id="reg-max" placeholder="月最大時間（空白=デフォルト）"/>
        <button class="btn" onclick="registerStaff()">登録する</button>
      </div>
    </div>
    <div id="lt-admin" class="tab-pane">
      <div class="form-col">
        <input type="password" id="adm-pw" placeholder="管理者パスワード" onkeydown="if(event.key==='Enter')adminLogin()"/>
        <button class="btn" onclick="adminLogin()">ログイン</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== CAL PAGE ===== -->
<div id="p-cal" class="page"></div>

<!-- ===== ATTENDANCE PAGE ===== -->
<div id="p-attendance" class="page"></div>

<!-- ===== LEAVE PAGE ===== -->
<div id="p-leave" class="page"></div>

<!-- ===== ADMIN PAGE ===== -->
<div id="p-admin" class="page"></div>

<!-- ===== MODAL ===== -->
<div id="modal-bg" class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const SB_URL='https://hqddrswyqmammuwwrvna.supabase.co';
const SB_KEY='sb_publishable_766-Q62xxyGNiARJhTg13A_lb7YxuEQ';
const sb=supabase.createClient(SB_URL,SB_KEY);
const STORE_LAT=34.719172,STORE_LNG=135.477891,STORE_R=200;
const CHIP_COLORS=['#2c5f2e','#2471a3','#7d3c98','#c0392b','#d4af7a','#1a5276'];
const DAYS_JP=['日','月','火','水','木','金','土'];
const LEAVE_TYPES={paid:'有給休暇',sick:'病欠',mourning:'忌引き',unpaid:'無給休暇'};

// ── State ─────────────────────────────────────────────────────────────────────
let ADMIN_PW='haku2026';
let me=null; // {id,name,role}
let staff=[],shiftTypes=[],settings={wage_per_hour:1100,max_hours_per_month:80,insurance_threshold_weekly:20};
let calY=new Date().getFullYear(),calM=new Date().getMonth();
let calView='month',selDay=null,weekOff=0;
let schedCache={},attCache={};
let todayAtt=null;
let curPage='login';

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=type==='err'?'#c0392b':'#2c5f2e';
  el.style.display='block';clearTimeout(window._tt);
  window._tt=setTimeout(()=>el.style.display='none',2800);
}

// ── Page navigation ───────────────────────────────────────────────────────────
function showPage(name){
  // Hide all pages
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  if(name==='login'){
    document.getElementById('p-login').classList.add('show');
    document.getElementById('app-header').classList.remove('show');
  } else {
    document.getElementById('p-'+name).classList.add('show');
    document.getElementById('app-header').classList.add('show');
    document.querySelectorAll('.h-btn').forEach(b=>b.classList.remove('on'));
    const nb=document.getElementById('nb-'+name);
    if(nb)nb.classList.add('on');
  }
  curPage=name;
}

function nav(name){
  showPage(name);
  if(name==='cal')renderCal();
  else if(name==='attendance')renderAttendance();
  else if(name==='leave')renderLeave();
  else if(name==='admin')renderAdmin();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-bg').classList.add('show');}
function closeModal(){document.getElementById('modal-bg').classList.remove('show');}

// ── Utils ─────────────────────────────────────────────────────────────────────
function fmtTime(ts){if(!ts)return'--:--';const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function calcH(i,o){if(!i||!o)return 0;return Math.round((new Date(o)-new Date(i))/36000)/100;}
function calcHFromTime(s,e){const[sh,sm]=s.split(':').map(Number);const[eh,em]=e.split(':').map(Number);return Math.max(0,(eh*60+em-sh*60-sm)/60);}
function calcWage(h,wage,i,o){
  if(!i||!o||h<=0)return h*wage;
  let total=0;let cur=new Date(i);const out=new Date(o);
  while(cur<out){const next=new Date(Math.min(cur.getTime()+3600000,out.getTime()));const hr=cur.getHours();total+=(next-cur)/3600000*wage*(hr>=22||hr<5?1.25:1);cur=next;}
  return Math.round(total);
}
function dist(la1,lo1,la2,lo2){const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadAll(){await Promise.all([loadStaff(),loadSettings(),loadShiftTypes()]);}
async function loadStaff(){const{data}=await sb.from('shift_staff').select('*').order('created_at');staff=data||[];renderStaffLoginArea();}
async function loadSettings(){const{data}=await sb.from('shift_settings').select('*').eq('id',1).single();if(data){settings=data;if(data.admin_password)ADMIN_PW=data.admin_password;}}
async function loadShiftTypes(){const{data}=await sb.from('shift_types').select('*').order('start_time');shiftTypes=data||[];}
async function loadSched(y,m){
  const from=`${y}-${String(m+1).padStart(2,'0')}-01`,to=`${y}-${String(m+1).padStart(2,'0')}-${new Date(y,m+1,0).getDate()}`;
  const{data}=await sb.from('schedules').select('*').gte('date',from).lte('date',to);
  const map={};(data||[]).forEach(r=>{if(!map[r.date])map[r.date]={};map[r.date][r.staff_id]=r;});
  schedCache[`${y}-${m}`]=map;
}
async function loadAtt(y,m){
  const from=`${y}-${String(m+1).padStart(2,'0')}-01`,to=`${y}-${String(m+1).padStart(2,'0')}-${new Date(y,m+1,0).getDate()}`;
  const{data}=await sb.from('attendance').select('*').gte('date',from).lte('date',to);
  const map={};(data||[]).forEach(r=>{if(!map[r.date])map[r.date]={};map[r.date][r.staff_id]=r;});
  attCache[`${y}-${m}`]=map;
  if(me&&me.role==='staff'){todayAtt=(attCache[`${y}-${m}`][fmtDate(new Date())]||{})[me.id]||null;}
}

function getMonthlyHours(y,m){
  const sm=schedCache[`${y}-${m}`]||{},am=attCache[`${y}-${m}`]||{};
  const res={};staff.forEach(s=>res[s.id]=0);
  Object.entries(am).forEach(([date,dm])=>Object.entries(dm).forEach(([sid,a])=>{if(a.clock_in&&a.clock_out)res[sid]=(res[sid]||0)+calcH(a.clock_in,a.clock_out);}));
  Object.entries(sm).forEach(([date,dm])=>Object.entries(dm).forEach(([sid,sc])=>{if(!(am[date]||{})[sid]){const st=shiftTypes.find(t=>t.id===sc.shift_type_id);const h=sc.custom_start&&sc.custom_end?calcHFromTime(sc.custom_start,sc.custom_end):st?calcHFromTime(st.start_time,st.end_time):0;res[sid]=(res[sid]||0)+h;}}));
  return res;
}

// ── Login tab ─────────────────────────────────────────────────────────────────
function ltab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',['staff','reg','admin'][i]===name));
  document.querySelectorAll('.tab-pane').forEach((p,i)=>p.classList.toggle('on',['lt-staff','lt-reg','lt-admin'][i]==='lt-'+name));
}
function renderStaffLoginArea(){
  const el=document.getElementById('staff-login-area');if(!el)return;
  if(staff.length===0){el.innerHTML='<p class="empty">まだスタッフが登録されていません。<br>「新規登録」から追加してください。</p>';return;}
  el.innerHTML=`<div class="form-col">
    <select id="st-sel" style="font-size:15px;padding:12px;">
      <option value="">スタッフを選択…</option>
      ${staff.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
    </select>
    <input type="password" id="st-pw" placeholder="パスワード（初期：0000）" onkeydown="if(event.key==='Enter')staffLogin()"/>
    <button class="btn" onclick="staffLogin()">ログイン</button>
  </div>`;
}
function staffLogin(){
  const id=document.getElementById('st-sel').value;
  const pw=document.getElementById('st-pw').value;
  if(!id){toast('スタッフを選択してください','err');return;}
  const s=staff.find(x=>x.id===id);
  if(!s){toast('スタッフが見つかりません','err');return;}
  if(pw!==(s.password||'0000')){toast('パスワードが違います','err');return;}
  me={id:s.id,name:s.name,role:'staff'};
  document.getElementById('h-user').textContent=s.name;
  document.getElementById('nb-admin').style.display='none';
  showPage('cal');renderCal();
}
function adminLogin(){
  const pw=document.getElementById('adm-pw').value;
  if(pw!==ADMIN_PW){toast('パスワードが違います','err');return;}
  me={id:'admin',name:'管理者',role:'admin'};
  document.getElementById('h-user').textContent='管理者';
  document.getElementById('nb-admin').style.display='block';
  showPage('cal');renderCal();
}
async function registerStaff(){
  const name=document.getElementById('reg-name').value.trim();
  const wage=parseInt(document.getElementById('reg-wage').value)||settings.wage_per_hour;
  const maxH=parseInt(document.getElementById('reg-max').value)||settings.max_hours_per_month;
  if(!name){toast('名前を入力してください','err');return;}
  if(staff.find(s=>s.name===name)){toast('同じ名前が既にあります','err');return;}
  const{data,error}=await sb.from('shift_staff').insert({name,wage,max_hours:maxH}).select().single();
  if(error){toast('登録に失敗しました','err');return;}
  staff.push(data);renderStaffLoginArea();
  document.getElementById('reg-name').value='';toast(`${name} を登録しました`);ltab('staff');
}
function logout(){
  me=null;selDay=null;

// ── CALENDAR ──────────────────────────────────────────────────────────────────
async function renderCal(){
  const el=document.getElementById('p-cal');
  el.innerHTML='<div class="loading"><span class="spin"></span>読み込み中…</div>';
  await Promise.all([loadSched(calY,calM),loadAtt(calY,calM)]);
  const mh=getMonthlyHours(calY,calM);
  let html='';

  // Clock banner (staff only)
  if(me.role==='staff'){
    const a=todayAtt;
    if(!a||!a.clock_in){
      html+=`<div class="clock-bar card"><div style="font-size:13px;color:#555;">本日未出勤</div><button class="clock-in-btn" onclick="clockIn()">出勤 🟢</button></div>`;
    } else if(!a.clock_out){
      html+=`<div class="clock-bar card"><div style="font-size:13px;color:#555;">出勤中 <strong style="color:#2c3e50">${fmtTime(a.clock_in)}〜</strong></div><button class="clock-out-btn" onclick="clockOut()">退勤 🔴</button></div>`;
    } else {
      html+=`<div class="clock-bar card"><div style="font-size:13px;color:#555;">本日 <strong style="color:#2c3e50">${fmtTime(a.clock_in)}〜${fmtTime(a.clock_out)}</strong></div><span style="font-size:12px;color:#888;">退勤済み</span></div>`;
    }
    // Hours summary
    const myS=staff.find(s=>s.id===me.id);
    const myH=Math.round((mh[me.id]||0)*10)/10;
    const max=myS?.max_hours||settings.max_hours_per_month;
    const wage=myS?.wage||settings.wage_per_hour;
    const pct=Math.min(myH/max*100,100);
    const fc=pct>90?'#c0392b':pct>70?'#e67e22':'#2c5f2e';
    const wkH=myH/(new Date(calY,calM+1,0).getDate()/7);
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:13px;color:#666;">今月の勤務時間</span><span style="font-size:14px;font-weight:600;color:#2c3e50;">${myH}h / ${max}h</span></div>
      <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${fc};"></div></div>
      <div style="display:flex;justify-content:space-between;"><span style="font-size:13px;color:#666;">推定給与</span><span style="font-size:14px;font-weight:600;color:#2c3e50;">¥${(myH*wage).toLocaleString()}</span></div>
      ${wkH>=settings.insurance_threshold_weekly*0.85?`<div class="warn" style="margin-top:8px;">⚠ 週${wkH.toFixed(1)}h — 雇用保険加入基準（週${settings.insurance_threshold_weekly}h）に近づいています</div>`:''}
      <div style="text-align:right;margin-top:8px;"><button onclick="openSelfPwModal()" style="background:none;border:none;color:#aaa;font-size:11px;cursor:pointer;text-decoration:underline;">🔑 パスワード変更</button></div>
    </div>`;
  }

  // View tabs
  html+=`<div class="view-tabs">
    <button class="vt${calView==='month'?' on':''}" onclick="switchView('month')">月</button>
    <button class="vt${calView==='week'?' on':''}" onclick="switchView('week')">週</button>
  </div>`;

  // Calendar
  if(calView==='month') html+=buildMonthGrid(mh);
  else html+=buildWeekGrid();

  // Day panel
  if(calView==='month'&&selDay) html+=buildDayPanel(selDay,mh);

  // Admin summary
  if(me.role==='admin'){
    html+=`<div class="card"><div class="sec-title">今月のスタッフ時間</div>`;
    staff.forEach(s=>{
      const h=Math.round((mh[s.id]||0)*10)/10,max=s.max_hours||settings.max_hours_per_month;
      const pct=Math.min(h/max*100,100);
      html+=`<div style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:7px;font-weight:600;font-size:13px;margin-bottom:3px;"><span class="av sm">${s.name[0]}</span>${s.name}</div>
        <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${pct>90?'#c0392b':'#2c5f2e'};"></div></div>
        <div style="font-size:12px;color:#555;">${h}h / ${max}h　¥${(h*(s.wage||settings.wage_per_hour)).toLocaleString()}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  el.innerHTML=html;
}

function buildMonthGrid(mh){
  const dim=new Date(calY,calM+1,0).getDate(),fdow=new Date(calY,calM,1).getDay();
  const todayStr=fmtDate(new Date()),key=`${calY}-${calM}`;
  const sm=schedCache[key]||{},am=attCache[key]||{};
  let g=DAYS_JP.map((d,i)=>`<div class="dh" style="color:${i===0?'#c0392b':i===6?'#2471a3':'#555'}">${d}</div>`).join('');
  for(let i=0;i<fdow;i++)g+='<div></div>';
  for(let day=1;day<=dim;day++){
    const dow=(fdow+day-1)%7;
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isSel=selDay===day,isToday=ds===todayStr;
    const dispStaff=me.role==='admin'?staff:staff.filter(s=>s.id===me.id);
    let chips='';
    dispStaff.forEach((s,idx)=>{
      const sc=(sm[ds]||{})[s.id],at=(am[ds]||{})[s.id];
      if(!sc&&!at)return;
      const st=sc?shiftTypes.find(t=>t.id===sc.shift_type_id):null;
      const startT=at?.clock_in?fmtTime(at.clock_in):sc?.custom_start||st?.start_time||'';
      const endT=at?.clock_out?fmtTime(at.clock_out):sc?.custom_end||st?.end_time||'';
      const color=CHIP_COLORS[idx%CHIP_COLORS.length];
      const label=me.role==='admin'?`${s.name[0]} ${startT.slice(0,5)}`:`${startT.slice(0,5)}〜${endT.slice(0,5)}`;
      chips+=`<div class="chip" style="background:${color};color:#fff;">${label}</div>`;
    });
    g+=`<button class="cd${isSel?' sel':''}${isToday?' tod':''}" onclick="selDate(${day})">
      <span class="cdn" style="color:${isSel?'#2c3e50':dow===0?'#c0392b':dow===6?'#2471a3':'#222'}">${day}</span>
      ${chips}
    </button>`;
  }
  return`<div>
    <div class="mnav">
      <button class="arr" onclick="chM(-1)">‹</button>
      <span class="mtitle">${calY}年${calM+1}月</span>
      <div style="display:flex;gap:4px;">
        <button class="today-btn" onclick="goToday()">今日</button>
        <button class="arr" onclick="chM(1)">›</button>
      </div>
    </div>
    <div class="cal-grid">${g}</div>
  </div>`;
}

function buildWeekGrid(){
  const today=new Date(),sw=new Date(today);
  sw.setDate(today.getDate()-today.getDay()+weekOff*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sw);d.setDate(d.getDate()+i);return d;});
  const todayStr=fmtDate(today),key=`${calY}-${calM}`;
  const sm=schedCache[key]||{},am=attCache[key]||{};
  let th=`<tr><th style="width:40px;">時間</th>`;
  days.forEach((d,i)=>{const ds=fmtDate(d),isT=ds===todayStr;th+=`<th style="${isT?'background:#d4af7a;color:#2c3e50;':''}"><div style="font-size:10px;">${DAYS_JP[i]}</div><div>${d.getDate()}</div></th>`;});
  th+='</tr>';
  let tb='';
  for(let h=6;h<=23;h++){
    tb+=`<tr><td class="wk-tc">${String(h).padStart(2,'0')}</td>`;
    days.forEach(d=>{
      const ds=fmtDate(d),dsc=sm[ds]||{},dac=am[ds]||{};
      let cell='';
      const dispStaff=me.role==='admin'?staff:staff.filter(s=>s.id===me.id);
      dispStaff.forEach((s,idx)=>{
        const sc=dsc[s.id],at=dac[s.id];
        if(!sc&&!at)return;
        const st=sc?shiftTypes.find(t=>t.id===sc.shift_type_id):null;
        const sT=at?.clock_in?fmtTime(at.clock_in):sc?.custom_start||st?.start_time||'';
        const eT=at?.clock_out?fmtTime(at.clock_out):sc?.custom_end||st?.end_time||'';
        const sh=parseInt(sT)||0,eh=parseInt(eT)||0;
        if(h>=sh&&h<eh)cell+=`<span class="wk-chip" style="background:${CHIP_COLORS[idx%CHIP_COLORS.length]};color:#fff;">${s.name[0]}</span>`;
      });
      tb+=`<td>${cell}</td>`;
    });
    tb+='</tr>';
  }
  return`<div>
    <div class="mnav">
      <button class="arr" onclick="chW(-1)">‹</button>
      <span class="mtitle" style="font-size:14px;">${fmtDate(days[0])} 〜 ${fmtDate(days[6])}</span>
      <div style="display:flex;gap:4px;">
        <button class="today-btn" onclick="weekOff=0;renderCal()">今週</button>
        <button class="arr" onclick="chW(1)">›</button>
      </div>
    </div>
    <div class="wk-grid"><table class="wk-table"><thead>${th}</thead><tbody>${tb}</tbody></table></div>
  </div>`;
}

function buildDayPanel(day,mh){
  const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`,key=`${calY}-${calM}`;
  const dsc=(schedCache[key]||{})[ds]||{},dac=(attCache[key]||{})[ds]||{};
  const dispStaff=me.role==='admin'?staff:staff.filter(s=>s.id===me.id);
  let rows=dispStaff.map(s=>{
    const sc=dsc[s.id],at=dac[s.id],canEdit=me.role==='admin'||me.id===s.id;
    const h=Math.round((mh[s.id]||0)*10)/10,max=s.max_hours||settings.max_hours_per_month;
    const st=sc?shiftTypes.find(t=>t.id===sc.shift_type_id):null;
    let sInfo='',aInfo='',acts='';
    if(sc){const lbl=sc.custom_start?`${sc.custom_start}〜${sc.custom_end}`:st?`${st.name} ${st.start_time}〜${st.end_time}`:'';sInfo=`<span class="sbadge" style="background:#eaf4e8;color:#2c5f2e;margin-right:6px;">📅 ${lbl}</span>`;}
    if(at&&at.clock_in){const st2=at.status==='late'?'⚠遅刻':at.status==='early_leave'?'⚠早退':'';aInfo=`<span class="sbadge" style="background:#e8f4fd;color:#2471a3;">🕐 ${fmtTime(at.clock_in)}〜${at.clock_out?fmtTime(at.clock_out):'退勤待'} ${st2}</span>`;}
    if(canEdit&&!sc)acts+=`<button class="add-btn" onclick="openAddSched('${s.id}','${ds}')">＋ シフト追加</button>`;
    if(canEdit&&sc)acts+=`<button class="btn-sm gr" onclick="delSched('${sc.id}','${ds}')">削除</button>`;
    if(me.role==='admin'&&at)acts+=` <button class="btn-sm d" onclick="openEditAtt('${at.id}','${s.name}')">出勤修正</button>`;
    return`<div class="sr">
      <div class="sn"><span class="av sm">${s.name[0]}</span>${s.name}<span style="font-size:11px;color:#888;margin-left:3px;">${h}h/${max}h</span></div>
      <div style="margin-bottom:6px;">${sInfo}${aInfo||(!sc?'<span style="color:#bbb;font-size:12px;">シフトなし</span>':'')}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">${acts}</div>
    </div>`;
  }).join('');
  return`<div class="card"><div class="dp-title">${calM+1}月${day}日</div>${rows}</div>`;
}

function selDate(d){selDay=selDay===d?null:d;renderCal();}
async function chM(delta){calM+=delta;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}selDay=null;await renderCal();}
function chW(d){weekOff+=d;renderCal();}
function switchView(v){calView=v;selDay=null;renderCal();}
function goToday(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();selDay=n.getDate();weekOff=0;renderCal();}

// ── Shift schedule ────────────────────────────────────────────────────────────
function openAddSched(staffId,ds){
  const opts=shiftTypes.map(t=>`<option value="${t.id}">${t.name} ${t.start_time}〜${t.end_time}</option>`).join('');
  openModal(`<div class="modal-title">シフト追加</div>
    <div class="form-col">
      <select id="ms-type"><option value="custom">カスタム時間</option>${opts}</select>
      <div id="ms-custom">
        <div style="display:flex;gap:8px;"><input type="time" id="ms-s" value="09:00"/><span style="align-self:center;">〜</span><input type="time" id="ms-e" value="17:00"/></div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-sm g" onclick="confirmSched('${staffId}','${ds}')">追加</button>
      <button class="btn-sm gr" onclick="closeModal()">キャンセル</button>
    </div>`);
  document.getElementById('ms-type').addEventListener('change',function(){
    document.getElementById('ms-custom').style.display=this.value==='custom'?'block':'none';
  });
  document.getElementById('ms-custom').style.display='block';
}
async function confirmSched(sid,ds){
  const tv=document.getElementById('ms-type').value;
  let payload={staff_id:sid,date:ds,status:'scheduled'};
  if(tv==='custom'){payload.custom_start=document.getElementById('ms-s').value;payload.custom_end=document.getElementById('ms-e').value;}
  else payload.shift_type_id=tv;
  const{error}=await sb.from('schedules').upsert(payload,{onConflict:'staff_id,date'});
  if(error){toast('追加に失敗しました','err');return;}
  toast('シフトを追加しました');closeModal();await loadSched(calY,calM);renderCal();
}
async function delSched(id,ds){
  if(!confirm('シフトを削除しますか？'))return;
  await sb.from('schedules').delete().eq('id',id);
  toast('削除しました');await loadSched(calY,calM);renderCal();
}

  const today=fmtDate(new Date());
  const{error}=await sb.from('attendance').update({clock_in:inT?`${today}T${inT}:00+09:00`:null,clock_out:outT?`${today}T${outT}:00+09:00`:null,status,admin_note:note}).eq('id',id);

// ── Clock in/out ──────────────────────────────────────────────────────────────
async function clockIn(){
  const today=fmtDate(new Date());
  const doClockIn=async(lat,lng)=>{
    const{data:ex}=await sb.from('attendance').select('*').eq('staff_id',me.id).eq('date',today).single();
    if(ex&&ex.clock_in){toast('既に出勤済みです','err');return;}
    const{data,error}=await sb.from('attendance').upsert({staff_id:me.id,date:today,clock_in:new Date().toISOString(),clock_in_lat:lat,clock_in_lng:lng,status:'normal'},{onConflict:'staff_id,date'}).select().single();
    if(error){toast('打刻に失敗しました','err');return;}
    todayAtt=data;toast('出勤打刻しました 🟢');renderCal();
  };
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
    const d=dist(pos.coords.latitude,pos.coords.longitude,STORE_LAT,STORE_LNG);
    if(d>STORE_R){toast(`店舗から${Math.round(d)}m離れています（上限${STORE_R}m）`,'err');return;}
    await doClockIn(pos.coords.latitude,pos.coords.longitude);
  }catch(e){
    if(e.code===1){toast('位置情報の許可が必要です','err');return;}
    await doClockIn(null,null);toast('出勤打刻しました（GPS取得失敗）');
  }
}
async function clockOut(){
  if(!todayAtt){toast('出勤記録がありません','err');return;}
  const now=new Date(),today=fmtDate(now);
  let status='normal';
  const sc=(schedCache[`${calY}-${calM}`]||{})[today]?.[me.id];
  if(sc){
    const st=shiftTypes.find(t=>t.id===sc.shift_type_id);
    const endT=sc.custom_end||st?.end_time;
    if(endT){const[eh,em]=endT.split(':').map(Number);const exp=new Date(now);exp.setHours(eh,em,0);if(now<exp)status='early_leave';}
    const startT=sc.custom_start||st?.start_time;
    if(startT&&todayAtt.clock_in){const[sh,sm2]=startT.split(':').map(Number);const exp=new Date(now);exp.setHours(sh,sm2,0);if(new Date(todayAtt.clock_in)>new Date(exp.getTime()+5*60000))status='late';}
  }
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
    await sb.from('attendance').update({clock_out:now.toISOString(),clock_out_lat:pos.coords.latitude,clock_out_lng:pos.coords.longitude,status}).eq('id',todayAtt.id);
  }catch{
    await sb.from('attendance').update({clock_out:now.toISOString(),status}).eq('id',todayAtt.id);
  }
  todayAtt={...todayAtt,clock_out:now.toISOString(),status};
  toast('退勤打刻しました 🔴');renderCal();
}

// ── ATTENDANCE ────────────────────────────────────────────────────────────────
async function renderAttendance(){
  const el=document.getElementById('p-attendance');
  el.innerHTML='<div class="loading"><span class="spin"></span>読み込み中…</div>';
  await loadAtt(calY,calM);
  const am=attCache[`${calY}-${calM}`]||{};
  const dispStaff=me.role==='admin'?staff:staff.filter(s=>s.id===me.id);
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <span style="font-weight:800;font-size:18px;color:#2c3e50;">${calY}年${calM+1}月 出勤記録</span>
    <div style="display:flex;gap:6px;"><button class="arr" onclick="attChM(-1)">‹</button><button class="arr" onclick="attChM(1)">›</button></div>
  </div>`;
  dispStaff.forEach(s=>{
    const rows=Object.entries(am).filter(([,dm])=>dm[s.id]).map(([date,dm])=>{
      const a=dm[s.id],h=calcH(a.clock_in,a.clock_out),w=calcWage(h,s.wage||settings.wage_per_hour,a.clock_in,a.clock_out);
      const sl=a.status==='late'?'<span style="color:#e67e22;font-size:11px;"> 遅刻</span>':a.status==='early_leave'?'<span style="color:#e67e22;font-size:11px;"> 早退</span>':'';
      return`<div class="att-row"><span>${date.slice(5)}${sl}</span><span>${fmtTime(a.clock_in)}〜${fmtTime(a.clock_out)}</span><span style="font-weight:600;">${h}h</span>${me.role==='admin'?`<span>¥${w.toLocaleString()}</span>`:''}</div>`;
    }).join('');
    const totalH=Math.round(Object.values(am).reduce((sum,dm)=>{const a=dm[s.id];return a?sum+calcH(a.clock_in,a.clock_out):sum;},0)*10)/10;
    html+=`<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><span class="av sm">${s.name[0]}</span><strong>${s.name}</strong><span style="margin-left:auto;font-size:13px;color:#555;">${totalH}h</span></div>${rows||'<p class="empty" style="padding:8px 0;">記録なし</p>'}</div>`;
  });
  if(me.role==='admin'){
    html+=`<div class="card"><div class="sec-title">📄 PDF出力</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div style="display:flex;gap:8px;align-items:center;"><span style="font-size:13px;color:#555;white-space:nowrap;">期間：</span><input type="date" id="pdf-from" style="flex:1;"/> <span>〜</span> <input type="date" id="pdf-to" style="flex:1;"/></div>
        <button class="btn" onclick="exportPDF()">PDFを出力</button>
      </div></div>`;
  }
  el.innerHTML=html;
}
async function attChM(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}await renderAttendance();}
async function exportPDF(){
  const from=document.getElementById('pdf-from').value,to=document.getElementById('pdf-to').value;
  if(!from||!to){toast('期間を指定してください','err');return;}
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFontSize(16);doc.text('Cafe La Petite Haku - Attendance',14,20);
  doc.setFontSize(11);doc.text(`${from} to ${to}`,14,30);let y=42;
  const{data}=await sb.from('attendance').select('*,shift_staff(name,wage)').gte('date',from).lte('date',to).order('date');
  (data||[]).forEach(r=>{if(y>270){doc.addPage();y=20;}const h=calcH(r.clock_in,r.clock_out);const w=calcWage(h,r.shift_staff?.wage||settings.wage_per_hour,r.clock_in,r.clock_out);doc.text(`${r.date}  ${r.shift_staff?.name||''}  ${fmtTime(r.clock_in)}-${fmtTime(r.clock_out)}  ${h}h  ¥${w.toLocaleString()}`,14,y);y+=8;});
  doc.save(`haku-att-${from}-${to}.pdf`);toast('PDFを出力しました');
}

async function renderLeave(){

  let html=`<div style="font-weight:800;font-size:18px;color:#2c3e50;margin-bottom:14px;">休暇申請</div>
  <div class="card"><div class="sec-title">＋ 申請する</div>
    <div class="form-col">
      <input type="date" id="lv-date"/>
      <select id="lv-type">${Object.entries(LEAVE_TYPES).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select>
      <textarea id="lv-reason" placeholder="理由（任意）"></textarea>
      <button class="btn" onclick="submitLeave()">申請する</button>
    </div></div>`;
  if(leaves.length===0)html+='<p class="empty">申請がありません</p>';
  else leaves.forEach(l=>{
    const sc=l.status==='pending'?'pending':l.status==='approved'?'approved':'rejected';
    const sl=l.status==='pending'?'審査中':l.status==='approved'?'承認済':'却下';
    html+=`<div class="lv-card">
      <div class="lv-top"><div><div style="font-weight:700;color:#2c3e50;">${l.date}</div><div style="font-size:13px;color:#555;margin-top:2px;">${LEAVE_TYPES[l.leave_type]||l.leave_type}</div>${me.role==='admin'?`<div style="font-size:12px;color:#888;">${l.shift_staff?.name||''}</div>`:''}</div><span class="lv-badge ${sc}">${sl}</span></div>
      ${l.reason?`<div style="font-size:12px;color:#666;margin-bottom:8px;">${l.reason}</div>`:''}
      ${me.role==='admin'&&l.status==='pending'?`<div style="display:flex;gap:8px;"><button class="btn-sm g" onclick="approveLeave('${l.id}')">承認</button><button class="btn-sm r" onclick="rejectLeave('${l.id}')">却下</button></div>`:''}
    </div>`;
  });
  el.innerHTML=html;
}
async function submitLeave(){
  const date=document.getElementById('lv-date').value,type=document.getElementById('lv-type').value,reason=document.getElementById('lv-reason').value;
  if(!date){toast('日付を選択してください','err');return;}
  const{error}=await sb.from('leave_requests').insert({staff_id:me.id,date,leave_type:type,reason,status:'pending'});
  if(error){toast('申請に失敗しました','err');return;}
  toast('申請しました');renderLeave();
}
async function approveLeave(id){await sb.from('leave_requests').update({status:'approved',approved_by:'admin',approved_at:new Date().toISOString()}).eq('id',id);toast('承認しました');renderLeave();}
async function rejectLeave(id){await sb.from('leave_requests').update({status:'rejected'}).eq('id',id);toast('却下しました');renderLeave();}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
async function renderAdmin(){
  const el=document.getElementById('p-admin');
  const mh=getMonthlyHours(calY,calM);
  let html=`
  <div class="card"><div class="sec-title">⚙ グローバル設定</div>
    <div class="s-row"><span class="s-label">デフォルト時給（円）</span><input type="number" class="s-input" id="s-wage" value="${settings.wage_per_hour}"/></div>
    <div class="s-row"><span class="s-label">月最大時間</span><input type="number" class="s-input" id="s-max" value="${settings.max_hours_per_month}"/></div>
    <div class="s-row"><span class="s-label">雇用保険警告（週h）</span><input type="number" class="s-input" id="s-ins" value="${settings.insurance_threshold_weekly}"/></div>
    <p style="font-size:11px;color:#888;margin-top:4px;">※法定：週20h以上で雇用保険加入義務</p>
    <button class="btn" style="margin-top:12px;" onclick="saveSettings()">設定を保存</button>
  </div>

  <div class="card"><div class="sec-title">🔑 管理者パスワード変更</div>
    <div class="form-col">
      <input type="password" id="pw-cur" placeholder="現在のパスワード"/>
      <input type="password" id="pw-new" placeholder="新しいパスワード"/>
      <input type="password" id="pw-cnf" placeholder="確認"/>
      <button class="btn" onclick="changeAdminPw()">変更する</button>
    </div></div>

  <div class="card"><div class="sec-title">⏰ 班型設定</div>
    ${shiftTypes.map(t=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="flex:1;font-size:14px;font-weight:600;">${t.name}</span>
      <input type="time" value="${t.start_time}" onchange="updST('${t.id}','start_time',this.value)" style="width:95px;padding:5px;font-size:12px;"/>
      <span>〜</span>
      <input type="time" value="${t.end_time}" onchange="updST('${t.id}','end_time',this.value)" style="width:95px;padding:5px;font-size:12px;"/>
    </div>`).join('')}
    <button class="btn-sm d" style="margin-top:8px;" onclick="openAddSTModal()">＋ 班型追加</button>
  </div>

  <div class="card"><div class="sec-title">＋ スタッフ追加</div>
    <div class="form-col">
      <input type="text" id="a-name" placeholder="名前"/>
      <input type="number" id="a-wage" placeholder="時給（円）"/>
      <input type="number" id="a-max" placeholder="月最大時間"/>
      <button class="btn" onclick="adminAddStaff()">追加する</button>
    </div></div>

  <div class="card"><div class="sec-title">👥 スタッフ一覧</div>
    ${staff.length===0?'<p class="empty">スタッフがいません</p>':staff.map(s=>{
      const h=Math.round((mh[s.id]||0)*10)/10;
      return`<div class="staff-card">
        <div style="display:flex;align-items:center;gap:8px;font-weight:600;margin-bottom:4px;"><span class="av sm">${s.name[0]}</span>${s.name}</div>
        <div style="font-size:12px;color:#777;margin-bottom:2px;">時給 ¥${s.wage}　月最大 ${s.max_hours}h　初期PW: ${s.password||'0000'}</div>
        <div style="font-size:12px;color:#555;margin-bottom:8px;">今月: ${h}h　¥${(h*s.wage).toLocaleString()}</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap;">
          <button class="btn-sm d" onclick="openEditStaff('${s.id}')">編集</button>
          <button class="btn-sm gold" onclick="openSetPwModal('${s.id}','${s.name}')">PW設定</button>
          <button class="btn-sm r" onclick="delStaff('${s.id}','${s.name}')">削除</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
  el.innerHTML=html;
}

async function saveSettings(){
  const wage=parseInt(document.getElementById('s-wage').value)||1100;
  const max=parseInt(document.getElementById('s-max').value)||80;
  const ins=parseInt(document.getElementById('s-ins').value)||20;
  await sb.from('shift_settings').upsert({id:1,wage_per_hour:wage,max_hours_per_month:max,insurance_threshold_weekly:ins,admin_password:ADMIN_PW});
  settings={...settings,wage_per_hour:wage,max_hours_per_month:max,insurance_threshold_weekly:ins};
  toast('設定を保存しました');
}
async function changeAdminPw(){
  const cur=document.getElementById('pw-cur').value,nw=document.getElementById('pw-new').value,cnf=document.getElementById('pw-cnf').value;
  if(cur!==ADMIN_PW){toast('現在のパスワードが違います','err');return;}
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_settings').update({admin_password:nw}).eq('id',1);
  ADMIN_PW=nw;['pw-cur','pw-new','pw-cnf'].forEach(id=>document.getElementById(id).value='');
  toast('パスワードを変更しました');
}
async function updST(id,field,val){await sb.from('shift_types').update({[field]:val}).eq('id',id);await loadShiftTypes();toast('更新しました');}
function openAddSTModal(){
  openModal(`<div class="modal-title">班型追加</div>
    <div class="form-col">
      <input type="text" id="st-n" placeholder="名前（例：夜番）"/>
      <div style="display:flex;gap:8px;"><input type="time" id="st-s" value="18:00"/><span style="align-self:center;">〜</span><input type="time" id="st-e" value="22:00"/></div>
    </div>
    <div class="modal-btns"><button class="btn-sm g" onclick="addST()">追加</button><button class="btn-sm gr" onclick="closeModal()">キャンセル</button></div>`);
}
async function addST(){
  const name=document.getElementById('st-n').value.trim();
  if(!name){toast('名前を入力してください','err');return;}
  await sb.from('shift_types').insert({name,start_time:document.getElementById('st-s').value,end_time:document.getElementById('st-e').value});
  await loadShiftTypes();closeModal();toast('班型を追加しました');renderAdmin();
}
function openEditStaff(id){
  const s=staff.find(x=>x.id===id);if(!s)return;
  openModal(`<div class="modal-title">${s.name} の編集</div>
    <div class="form-col">
      <input type="text" id="es-n" value="${s.name}"/>
      <input type="number" id="es-w" value="${s.wage}" placeholder="時給"/>
      <input type="number" id="es-m" value="${s.max_hours}" placeholder="月最大時間"/>
    </div>
    <div class="modal-btns"><button class="btn-sm g" onclick="saveEditStaff('${id}')">保存</button><button class="btn-sm gr" onclick="closeModal()">キャンセル</button></div>`);
}
async function saveEditStaff(id){
  const name=document.getElementById('es-n').value.trim(),wage=parseInt(document.getElementById('es-w').value),maxH=parseInt(document.getElementById('es-m').value);
  if(!name){toast('名前を入力してください','err');return;}
  await sb.from('shift_staff').update({name,wage,max_hours:maxH}).eq('id',id);
  staff=staff.map(s=>s.id===id?{...s,name,wage,max_hours:maxH}:s);
  closeModal();toast('更新しました');renderAdmin();
}
async function adminAddStaff(){
  const name=document.getElementById('a-name').value.trim(),wage=parseInt(document.getElementById('a-wage').value)||settings.wage_per_hour,maxH=parseInt(document.getElementById('a-max').value)||settings.max_hours_per_month;
  if(!name){toast('名前を入力してください','err');return;}
  if(staff.find(s=>s.name===name)){toast('同じ名前が既にあります','err');return;}
  const{data,error}=await sb.from('shift_staff').insert({name,wage,max_hours:maxH}).select().single();
  if(error){toast('追加に失敗しました','err');return;}
  staff.push(data);toast(`${name} を追加しました`);renderAdmin();
}
async function delStaff(id,name){
  if(!confirm(`${name} を削除しますか？`))return;
  await sb.from('shift_staff').delete().eq('id',id);
  staff=staff.filter(s=>s.id!==id);toast(`${name} を削除しました`);renderAdmin();
}

// ── Password management ───────────────────────────────────────────────────────
function openSetPwModal(id,name){
  openModal(`<div class="modal-title">${name} のパスワード設定</div>
    <div class="form-col">
      <input type="password" id="sp-n" placeholder="新しいパスワード"/>
      <input type="password" id="sp-c" placeholder="確認"/>
    </div>
    <div class="modal-btns"><button class="btn-sm g" onclick="saveStaffPw('${id}')">設定</button><button class="btn-sm gr" onclick="closeModal()">キャンセル</button></div>`);
}
async function saveStaffPw(id){
  const nw=document.getElementById('sp-n').value,cnf=document.getElementById('sp-c').value;
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_staff').update({password:nw}).eq('id',id);
  staff=staff.map(s=>s.id===id?{...s,password:nw}:s);
  closeModal();toast('パスワードを設定しました');renderAdmin();
}
function openSelfPwModal(){
  openModal(`<div class="modal-title">パスワード変更</div>
    <div class="form-col">
      <input type="password" id="mp-c" placeholder="現在のパスワード"/>
      <input type="password" id="mp-n" placeholder="新しいパスワード"/>
      <input type="password" id="mp-cf" placeholder="確認"/>
    </div>
    <div class="modal-btns"><button class="btn-sm g" onclick="saveSelfPw()">変更</button><button class="btn-sm gr" onclick="closeModal()">キャンセル</button></div>`);
}
async function saveSelfPw(){
  const cur=document.getElementById('mp-c').value,nw=document.getElementById('mp-n').value,cnf=document.getElementById('mp-cf').value;
  const myStaff=staff.find(s=>s.id===me.id);
  if(cur!==(myStaff?.password||'0000')){toast('現在のパスワードが違います','err');return;}
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_staff').update({password:nw}).eq('id',me.id);
  staff=staff.map(s=>s.id===me.id?{...s,password:nw}:s);
  closeModal();toast('パスワードを変更しました');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
