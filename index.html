<style>

#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:8px;color:#fff;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none;white-space:nowrap;max-width:90vw;}

/* Week view */
.wk-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:12px;}

<body>

<div id="mbg" class="mbg" onclick="if(event.target===this)closeM()">
  <div class="mbox" id="mbox"></div>
</div>

<script>
const SBU='https://hqddrswyqmammuwwrvna.supabase.co';
const SBK='sb_publishable_766-Q62xxyGNiARJhTg13A_lb7YxuEQ';
const sb=supabase.createClient(SBU,SBK);
const SLAT=34.6994118,SLNG=135.510767,SR=200;
const DJP=['日','月','火','水','木','金','土'];
const LT={paid:'有給休暇',sick:'病欠',mourning:'忌引き',unpaid:'無給休暇'};

let APW='haku2026',GPS_GLOBAL=false;
let me=null;
let staff=[],settings={wage_per_hour:1100,max_hours_per_month:80,insurance_threshold_weekly:20};
let calY=new Date().getFullYear(),calM=new Date().getMonth(),selDay=null,calView='month',wOff=0;
let SC={},EC={},AC={},todayAtt=null;

// ── Toast & Modal ──────────────────────────────────────────────────────────────
function toast(m,t='ok'){
  const e=document.getElementById('toast');
  e.textContent=m;e.style.background=t==='err'?'#c0392b':'#2c5f2e';
  e.style.display='block';clearTimeout(window._tt);
  window._tt=setTimeout(()=>e.style.display='none',2800);
}
function openM(h){document.getElementById('mbox').innerHTML=h;document.getElementById('mbg').classList.add('show');}
function closeM(){document.getElementById('mbg').classList.remove('show');}

// ── Page nav ───────────────────────────────────────────────────────────────────
function showP(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.hbtn').forEach(b=>b.classList.remove('on'));
  if(name==='login'){
    document.getElementById('p-login').classList.add('show');
    document.getElementById('hdr').classList.remove('show');
  } else {
    document.getElementById('p-'+name).classList.add('show');
    document.getElementById('hdr').classList.add('show');
    const nb=document.getElementById('nb-'+name);if(nb)nb.classList.add('on');
  }
}
function nav(name){
  showP(name);
  if(name==='cal')renderCal();
  else if(name==='att')renderAtt();
  else if(name==='leave')renderLeave();
  else if(name==='swap')renderSwap();
  else if(name==='admin')renderAdmin();
}
function ltab(n){
  document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('on',['staff','reg','admin'][i]===n));
  document.querySelectorAll('.tpane').forEach((p,i)=>p.classList.toggle('on',['lt-staff','lt-reg','lt-admin'][i]==='lt-'+n));
}
function toggleRegFields(v){
  const ip=v==='part';
  document.getElementById('reg-part-f').style.display=ip?'flex':'none';
  document.getElementById('reg-full-f').style.display=ip?'none':'flex';
}

// ── Utils ──────────────────────────────────────────────────────────────────────
function ft(ts){if(!ts)return'--:--';const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function ch(i,o){if(!i||!o)return 0;return Math.round((new Date(o)-new Date(i))/36000)/100;}
function chft(s,e){const[sh,sm]=s.split(':').map(Number);const[eh,em]=e.split(':').map(Number);return Math.max(0,(eh*60+em-sh*60-sm)/60);}
function cw(h,wage,i,o){
  if(!i||!o||h<=0)return h*wage;
  let t=0,c=new Date(i);const ou=new Date(o);
  while(c<ou){const n=new Date(Math.min(c.getTime()+3600000,ou.getTime()));const hr=c.getHours();t+=(n-c)/3600000*wage*(hr>=22||hr<5?1.25:1);c=n;}
  return Math.round(t);
}
function distM(la1,lo1,la2,lo2){
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── Data ───────────────────────────────────────────────────────────────────────
async function loadAll(){
  await Promise.all([loadStaff(),loadSettings()]);
}
async function loadStaff(){
  const{data,error}=await sb.from('shift_staff').select('*').order('created_at');
  if(error){document.getElementById('slogin').innerHTML='<p style="color:red;font-size:12px;">読込エラー: '+error.message+'</p>';return;}
  staff=data||[];
  renderSlogin();
}
async function loadSettings(){
  const{data}=await sb.from('shift_settings').select('*').eq('id',1).single();
  if(data){settings=data;if(data.admin_password)APW=data.admin_password;GPS_GLOBAL=data.gps_required||false;}
}
async function loadMonth(y,m){
  const from=y+'-'+String(m+1).padStart(2,'0')+'-01';
  const to=y+'-'+String(m+1).padStart(2,'0')+'-'+new Date(y,m+1,0).getDate();
  const k=y+'-'+m;
  const[sr,er,ar]=await Promise.all([
    sb.from('shift_slots').select('*').gte('date',from).lte('date',to).order('start_time'),
    sb.from('slot_entries').select('*,shift_staff(id,name,staff_type)'),
    sb.from('attendance').select('*').gte('date',from).lte('date',to)
  ]);
  // SC: {date: [slots]}
  const sm={};(sr.data||[]).forEach(s=>{if(!sm[s.date])sm[s.date]=[];sm[s.date].push(s);});
  SC[k]=sm;
  // EC: {slot_id: [entries]}
  const em={};(er.data||[]).forEach(e=>{if(!em[e.slot_id])em[e.slot_id]=[];em[e.slot_id].push(e);});
  EC[k]=em;
  // AC: {date: {staff_id: attendance}}
  const am={};(ar.data||[]).forEach(a=>{if(!am[a.date])am[a.date]={};am[a.date][a.staff_id]=a;});
  AC[k]=am;
  if(me&&me.id!=='admin'){todayAtt=(AC[k][fd(new Date())]||{})[me.id]||null;}
}
function getMonthlyH(y,m){
  const k=y+'-'+m,am=AC[k]||{},sm=SC[k]||{},em=EC[k]||{},res={};
  staff.forEach(s=>res[s.id]=0);
  Object.values(am).forEach(dm=>Object.entries(dm).forEach(([sid,a])=>{if(a.clock_in&&a.clock_out)res[sid]=(res[sid]||0)+ch(a.clock_in,a.clock_out);}));
  Object.entries(sm).forEach(([date,slots])=>slots.forEach(slot=>{
    (em[slot.id]||[]).forEach(e=>{
      if(!(am[date]||{})[e.staff_id])res[e.staff_id]=(res[e.staff_id]||0)+chft(slot.start_time,slot.end_time);
    });
  }));
  return res;
}
function getWeeklyH(staffId,y,m){
  const k=y+'-'+m,sm=SC[k]||{},em=EC[k]||{},am=AC[k]||{};
  const today=new Date();
  const ws=new Date(today);ws.setDate(today.getDate()-today.getDay()+wOff*7);ws.setHours(0,0,0,0);
  const we=new Date(ws);we.setDate(ws.getDate()+6);we.setHours(23,59,59,999);
  let total=0;
  Object.entries(sm).forEach(([date,slots])=>{
    const d=new Date(date);if(d<ws||d>we)return;
    slots.forEach(slot=>{
      if(!(em[slot.id]||[]).find(e=>e.staff_id===staffId))return;
      const att=(am[date]||{})[staffId];
      if(att&&att.clock_in&&att.clock_out)total+=ch(att.clock_in,att.clock_out);
      else total+=chft(slot.start_time,slot.end_time);
    });
  });
  return Math.round(total*10)/10;
}

// ── Auth ───────────────────────────────────────────────────────────────────────
function renderSlogin(){
  const el=document.getElementById('slogin');if(!el)return;
  if(staff.length===0){el.innerHTML='<p class="empty">スタッフが登録されていません</p>';return;}
  let html='<div class="fcol">';
  html+='<select id="ssel" style="font-size:14px;padding:11px;"><option value="">スタッフを選択…</option>';
  staff.forEach(s=>{
    const lbl=s.role==='owner'?' 【オーナー】':s.role==='manager'?' 【店長】':s.staff_type==='full'?' 【正社員】':'';
    html+='<option value="'+s.id+'">'+s.name+lbl+'</option>';
  });
  html+='</select>';
  html+='<input type="password" id="spw" placeholder="パスワード（初期：0000）"/>';
  html+='<button class="btn" onclick="doStaffLogin()">ログイン</button></div>';
  el.innerHTML=html;
  const spwEl=document.getElementById('spw');
  if(spwEl)spwEl.addEventListener('keydown',function(e){if(e.key==='Enter')doStaffLogin();});
}
function doStaffLogin(){
  const id=document.getElementById('ssel').value,pw=document.getElementById('spw').value;
  if(!id){toast('スタッフを選択してください','err');return;}
  const s=staff.find(x=>x.id===id);
  if(!s||pw!==(s.password||'0000')){toast('パスワードが違います','err');return;}
  const isOwnerRole=s.role==='owner';
  const isManagerRole=s.role==='manager';
  const canManage=s.can_manage_shift||isManagerRole||isOwnerRole;
  let myRole='staff';
  if(isOwnerRole)myRole='admin';
  else if(isManagerRole||canManage)myRole='manager';
  const salaryVisible=isOwnerRole||isManagerRole;
  me={id:s.id,name:s.name,role:myRole,stype:s.staff_type||'part',srole:s.role||'part',
      canManage,salaryVisible,gpsReq:s.gps_required!==false};
  const roleDisp=isOwnerRole?' 【オーナー】':isManagerRole?' 【店長】':s.staff_type==='full'?' 【正社員】':'';
  document.getElementById('huser').textContent=s.name+roleDisp;
  document.getElementById('nb-admin').style.display=canManage?'block':'none';
  showP('cal');renderCal();
}
function doAdminLogin(){
  const pw=document.getElementById('admpw').value;
  if(pw!==APW){toast('パスワードが違います','err');return;}
  me={id:'admin',name:'管理者',role:'admin',stype:'full',srole:'owner',canManage:true,salaryVisible:true,gpsReq:false};
  document.getElementById('huser').textContent='管理者';
  document.getElementById('nb-admin').style.display='block';
  showP('cal');renderCal();
}
async function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const stype=document.getElementById('reg-type').value;
  if(!name){toast('名前を入力してください','err');return;}
  if(staff.find(s=>s.name===name)){toast('同じ名前が既にあります','err');return;}
  const isPart=stype==='part';
  const wage=isPart?(parseInt(document.getElementById('reg-wage').value)||settings.wage_per_hour):0;
  const maxWeek=isPart?(parseInt(document.getElementById('reg-week').value)||20):0;
  const salary=!isPart?(parseInt(document.getElementById('reg-salary').value)||0):0;
  const maxH=!isPart?(parseInt(document.getElementById('reg-max').value)||settings.max_hours_per_month):0;
  const roleV=stype==='owner'?'owner':stype==='manager'?'manager':stype==='full'?'full':'part';
  const stypeV=(stype==='manager'||stype==='owner')?'full':stype;
  const{data,error}=await sb.from('shift_staff').insert({name,staff_type:stypeV,role:roleV,wage,max_hours:maxH,max_hours_per_week:maxWeek,monthly_salary:salary}).select().single();
  if(error){toast('登録に失敗しました','err');return;}
  staff.push(data);renderSlogin();
  document.getElementById('reg-name').value='';toast(name+' を登録しました');ltab('staff');
}
function logout(){me=null;selDay=null;document.getElementById('admpw').value='';renderSlogin();showP('login');}

// ── Calendar ───────────────────────────────────────────────────────────────────
async function renderCal(){
  const wrap=document.getElementById('wcal');
  wrap.innerHTML='<div class="loading"><span class="spin"></span>読み込み中…</div>';
  await loadMonth(calY,calM);
  const k=calY+'-'+calM,sm=SC[k]||{},em=EC[k]||{},am=AC[k]||{};
  const mh=getMonthlyH(calY,calM);
  let html='';

  // Clock banner (all staff who logged in as staff, not admin login)
  if(me.id!=='admin'){
    const a=todayAtt;
    if(!a||!a.clock_in){
      html+='<div class="clkbar"><div style="font-size:12px;color:#555;">本日未出勤</div><button class="clinbtn" onclick="clockIn()">出勤 🟢</button></div>';
    } else if(!a.clock_out){
      html+='<div class="clkbar"><div style="font-size:12px;color:#555;">出勤中 <strong>'+ft(a.clock_in)+'〜</strong></div><button class="cloutbtn" onclick="clockOut()">退勤 🔴</button></div>';
    } else {
      html+='<div class="clkbar"><div style="font-size:12px;color:#555;"><strong>'+ft(a.clock_in)+'〜'+ft(a.clock_out)+'</strong> 退勤済</div><span style="font-size:11px;color:#aaa;">お疲れ様！</span></div>';
    }
    const myS=staff.find(s=>s.id===me.id);
    const isPart=myS?.staff_type==='part';
    const myH=Math.round((mh[me.id]||0)*10)/10;
    const wkH=isPart?getWeeklyH(me.id,calY,calM):0;
    const maxWk=myS?.max_hours_per_week||20;
    const maxMon=myS?.max_hours||settings.max_hours_per_month;
    const wage=myS?.wage||settings.wage_per_hour;
    const wkLabel=wOff===0?'今週':wOff===1?'来週':wOff===-1?'先週':(wOff>0?wOff+'週後':Math.abs(wOff)+'週前');
    if(isPart){
      const pct=Math.min(wkH/maxWk*100,100);
      const fc=pct>90?'#c0392b':pct>70?'#e67e22':'#2c5f2e';
      html+='<div class="card">';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-size:12px;color:#666;">'+wkLabel+'の勤務時間</span><span style="font-size:13px;font-weight:600;color:#2c3e50;">'+wkH+'h / '+maxWk+'h</span></div>';
      html+='<div class="prog"><div class="progf" style="width:'+pct+'%;background:'+fc+';"></div></div>';
      html+='<div style="display:flex;justify-content:space-between;"><span style="font-size:12px;color:#666;">今月の合計 / 推定給与</span><span style="font-size:13px;font-weight:600;color:#2c3e50;">'+myH+'h　¥'+(myH*wage).toLocaleString()+'</span></div>';
      if(wkH>=settings.insurance_threshold_weekly*0.85){
        html+='<div class="warn">⚠ 今週'+wkH+'h — 雇用保険加入基準（週'+settings.insurance_threshold_weekly+'h）に近づいています</div>';
      }
      html+='<div style="text-align:right;margin-top:6px;"><button onclick="openSelfPW()" style="background:none;border:none;color:#aaa;font-size:10px;cursor:pointer;text-decoration:underline;">🔑 PW変更</button></div></div>';
    } else {
      const sal=myS?.monthly_salary||0;
      html+='<div class="card">';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-size:12px;color:#666;">今月の勤務時間</span><span style="font-size:13px;font-weight:600;color:#2c3e50;">'+myH+'h / '+maxMon+'h</span></div>';
      html+='<div style="display:flex;justify-content:space-between;"><span style="font-size:12px;color:#666;">月給</span><span style="font-size:13px;font-weight:600;color:#2c3e50;">¥'+sal.toLocaleString()+'</span></div>';
      html+='<div style="text-align:right;margin-top:6px;"><button onclick="openSelfPW()" style="background:none;border:none;color:#aaa;font-size:10px;cursor:pointer;text-decoration:underline;">🔑 PW変更</button></div></div>';

    html+=buildWeek(sm,em,am);
    wrap.innerHTML=html;
    return;
  }

  // Legend
  html+='<div class="leg">';
  html+='<div class="legitem"><div class="legdot" style="background:#d4edda;border:1px solid #c3e6cb;"></div>バイト枠</div>';
  html+='<div class="legitem"><div class="legdot" style="background:#cce5ff;border:1px solid #b8d4f0;"></div>正社員枠</div>';
  html+='<div class="legitem"><div class="legdot" style="background:#e74c3c;"></div>満員</div>';
  html+='<div class="legitem"><div class="legdot" style="background:#d4af7a;"></div>自分</div>';
  html+='</div>';

  // Month nav
  html+='<div class="mnav"><button class="arr" onclick="chM(-1)">‹</button>';
  html+='<span class="mtitle" onclick="openJump()">'+calY+'年'+(calM+1)+'月</span>';
  html+='<div style="display:flex;gap:4px;"><button class="tbtn2" onclick="goToday()">今日</button><button class="arr" onclick="chM(1)">›</button></div></div>';

  // Grid
  const dim=new Date(calY,calM+1,0).getDate(),fdow=new Date(calY,calM,1).getDay(),ts=fd(new Date());
  let g=DJP.map((d,i)=>'<div class="dh" style="color:'+(i===0?'#c0392b':i===6?'#2471a3':'#555')+'">'+d+'</div>').join('');
  for(let i=0;i<fdow;i++)g+='<div></div>';
  for(let day=1;day<=dim;day++){
    const dow=(fdow+day-1)%7;
    const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const isSel=selDay===day,isToday=ds===ts;
    const daySlots=sm[ds]||[];
    let chips='';
    daySlots.forEach(slot=>{
      const ents=em[slot.id]||[];
      const isFull=ents.length>=slot.max_staff;
      const isMine=ents.some(e=>e.staff_id===me?.id);
      let bg=isMine?'#d4af7a':isFull?'#e74c3c':slot.staff_type==='full'?'#cce5ff':'#d4edda';
      let tc=isMine?'#2c3e50':isFull?'#fff':slot.staff_type==='full'?'#004085':'#155724';
      chips+='<div class="chip" style="background:'+bg+';color:'+tc+';">'+slot.slot_name+' '+ents.length+'/'+slot.max_staff+'</div>';
    });
    g+='<button class="cd'+(isSel?' sel':'')+(isToday?' tod':'')+'" onclick="selD('+day+')">';
    g+='<span class="cdn" style="color:'+(isSel?'#2c3e50':dow===0?'#c0392b':dow===6?'#2471a3':'#222')+'">'+day+'</span>';
    g+=chips+'</button>';

  html+='<div class="cgrid">'+g+'</div>';

  // Day panel
  if(selDay)html+=buildDayPanel(selDay,sm,em,am,mh);

  // Summary (admin/manager)
  if(me.canManage){
    html+='<div class="card"><div class="stitle">今月のスタッフ時間</div>';
    staff.forEach(s=>{
      const h=Math.round((mh[s.id]||0)*10)/10;
      const isPart=s.staff_type==='part';
      const wkH=isPart?getWeeklyH(s.id,calY,calM):0;
      const maxWk=s.max_hours_per_week||20;
      const pct=isPart?Math.min(wkH/maxWk*100,100):0;
      const fc=pct>90?'#c0392b':'#2c5f2e';
      const roleLabel=s.role==='owner'?'オーナー':s.role==='manager'?'店長':isPart?'バイト':'正社員';
      const avClass=isPart?'avp':'avf';
      let timeStr=isPart?'今週'+wkH+'h / 今月'+h+'h':'今月'+h+'h';
      let salStr='';
      if(me.salaryVisible){
        if(isPart)salStr=' ¥'+(h*(s.wage||settings.wage_per_hour)).toLocaleString();
        else salStr=' 月給¥'+(s.monthly_salary||0).toLocaleString();
      }
      html+='<div style="margin-bottom:8px;">';
      html+='<div style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;margin-bottom:2px;">';
      html+='<span class="av '+avClass+'">'+s.name[0]+'</span>'+s.name;
      html+='<span style="font-size:10px;color:#888;margin-left:2px;">'+roleLabel+'</span>';
      html+='<span style="margin-left:auto;font-size:11px;color:#555;">'+timeStr+salStr+'</span></div>';
      if(isPart)html+='<div class="prog"><div class="progf" style="width:'+pct+'%;background:'+fc+';"></div></div>';
      html+='</div>';
    });
    html+='</div>';
  }
  wrap.innerHTML=html;
}

function buildDayPanel(day,sm,em,am,mh){
  const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  const daySlots=sm[ds]||[],dayAtt=am[ds]||{};
  const isAdmin=me.canManage;
  let html='<div class="dp"><div class="dptitle">'+(calM+1)+'月'+day+'日</div>';
  const pSlots=daySlots.filter(s=>s.staff_type==='part');
  const fSlots=daySlots.filter(s=>s.staff_type==='full');

  function buildSlotCard(slot,typeClass){
    const ents=em[slot.id]||[],isFull=ents.length>=slot.max_staff;
    const myE=ents.find(e=>e.staff_id===me?.id);
    const mems=ents.map(e=>'<span class="mtag'+(e.staff_id===me?.id?' me':'')+'">'+(e.shift_staff?.name||'?')+'</span>').join('');
    let acts='';
    if(isAdmin){
      acts+='<button class="bsm bd" onclick="openManageSlot(\''+slot.id+'\',\''+slot.slot_name+'\',\''+ds+'\')">管理</button> ';
      acts+='<button class="bsm bg" onclick="openEditSlot(\''+slot.id+'\')">編集</button> ';
      acts+='<button class="bsm br" onclick="delSlot(\''+slot.id+'\',\''+ds+'\')">削除</button>';
    } else {
      const canJoin=(slot.staff_type==='part'&&me.stype==='part')||(slot.staff_type==='full'&&me.stype==='full');
      if(canJoin){
        if(myE)acts='<button class="lvbtn" onclick="leaveSlot(\''+myE.id+'\',\''+slot.id+'\',\''+ds+'\')">キャンセル</button>';
        else if(!isFull)acts='<button class="joinbtn" onclick="joinSlot(\''+slot.id+'\',\''+ds+'\')">参加する</button>';
        else acts='<span style="font-size:11px;color:#888;">満員</span>';
      }
    }
    return '<div class="scard '+typeClass+'">'
      +'<div class="shed"><span class="sname">'+slot.slot_name+'</span><span class="stime">'+slot.start_time.slice(0,5)+'〜'+slot.end_time.slice(0,5)+'</span></div>'
      +'<div style="font-size:11px;color:#888;margin-bottom:5px;">定員'+slot.max_staff+'人　残り'+Math.max(0,slot.max_staff-ents.length)+'人</div>'
      +'<div class="smems">'+(mems||'<span style="color:#bbb;font-size:11px;font-style:italic;">まだ誰もいません</span>')+'</div>'
      +'<div class="sacts">'+acts+'</div></div>';
  }

  if(pSlots.length>0){
    html+='<div style="font-size:12px;font-weight:700;color:#2c5f2e;margin-bottom:6px;">🟩 アルバイト枠</div>';
    pSlots.forEach(s=>html+=buildSlotCard(s,'part-s'));
  }
  if(fSlots.length>0){
    html+='<div style="font-size:12px;font-weight:700;color:#2471a3;margin-bottom:6px;margin-top:10px;">🟦 正社員枠</div>';
    fSlots.forEach(s=>html+=buildSlotCard(s,'full-s'));
  }
  if(daySlots.length===0&&!isAdmin)html+='<p class="empty">この日はシフト枠がありません</p>';

  if(isAdmin){
    const fStaff=staff.filter(s=>s.staff_type==='full');
    if(fStaff.length>0){
      html+='<div style="font-size:12px;font-weight:700;color:#555;margin:10px 0 6px;">正社員 出勤状況</div>';
      fStaff.forEach(s=>{
        const a=dayAtt[s.id];
        const st=a?a.status==='absent'?'休暇':a.clock_in&&a.clock_out?ft(a.clock_in)+'〜'+ft(a.clock_out):a.clock_in?ft(a.clock_in)+'〜出勤中':'未打刻':'予定なし';
        html+='<div style="display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid #f0ede8;font-size:13px;">';
        html+='<span class="av avf">'+s.name[0]+'</span>'+s.name;
        html+='<span style="margin-left:auto;color:#555;font-size:12px;">'+st+'</span>';
        html+='<button class="bsm bd" onclick="openEditAtt(\''+s.id+'\',\''+s.name+'\',\''+ds+'\')">修正</button></div>';
      });
    }
    html+='<div style="margin-top:12px;"><button class="btn" onclick="openAddSlot(\''+ds+'\')">＋ シフト枠を追加</button></div>';
  }
  html+='</div>';
  return html;
}

// ── Week view ──────────────────────────────────────────────────────────────────
function buildWeek(sm,em,am){
  const today=new Date(),sw=new Date(today);
  sw.setDate(today.getDate()-today.getDay()+wOff*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sw);d.setDate(d.getDate()+i);return d;});
  const ts=fd(today);
  const START_H=6,END_H=23;

  // Get all unique staff who have slots this week
  const weekStaff=[];
  const dispStaff=me.canManage?staff:staff.filter(s=>s.id===me.id);

  let html='<div class="mnav">';
  html+='<button class="arr" onclick="chW(-1)">‹</button>';
  html+='<span class="mtitle" style="font-size:13px;">'+fd(days[0]).slice(5)+' 〜 '+fd(days[6]).slice(5)+'</span>';
  html+='<div style="display:flex;gap:4px;"><button class="tbtn2" onclick="wOff=0;renderCal()">今週</button><button class="arr" onclick="chW(1)">›</button></div></div>';

  html+='<div class="wk-wrap"><table class="wk-table"><thead><tr>';
  html+='<th style="width:32px;">時間</th>';
  days.forEach((d,i)=>{
    const isT=fd(d)===ts;
    const dc=i===0?'#f8d7da':i===6?'#cce5ff':'#fff';
    html+='<th style="'+(isT?'background:#d4af7a;color:#2c3e50;':'')+'">';
    html+='<div style="font-size:9px;color:'+(isT?'#2c3e50':dc)+';">'+DJP[i]+'</div><div>'+d.getDate()+'</div></th>';
  });
  html+='</tr></thead><tbody>';

  for(let h=START_H;h<=END_H;h++){
    html+='<tr><td class="wk-time">'+String(h).padStart(2,'0')+'</td>';
    days.forEach(d=>{
      const ds=fd(d);
      const daySlots=(sm[ds]||[]).filter(slot=>{
        const sh=parseInt(slot.start_time)||0,eh=parseInt(slot.end_time)||0;
        return h>=sh&&h<eh;
      });

      // Collect people in this cell
      const people=[];
      daySlots.forEach(slot=>{
        const ents=em[slot.id]||[];
        const isFull=ents.length>=slot.max_staff;
        if(ents.length===0&&me.canManage){
          // Empty slot - show slot name
          people.push({name:slot.slot_name[0],bg:slot.staff_type==='full'?'#cce5ff':'#d4edda',tc:slot.staff_type==='full'?'#004085':'#155724',slotId:slot.id,ds});
        } else {
          const shownEnts=me.canManage?ents:ents.filter(e=>e.staff_id===me.id);
          shownEnts.forEach(e=>{
            const isMine=e.staff_id===me.id;
            people.push({
              name:e.shift_staff?.name?.[0]||'?',
              bg:isMine?'#d4af7a':isFull?'#e74c3c':slot.staff_type==='full'?'#cce5ff':'#d4edda',
              tc:isMine?'#2c3e50':isFull?'#fff':slot.staff_type==='full'?'#004085':'#155724',
              slotId:slot.id,ds
            });
          });
        }
      });

      if(people.length===0){
        html+='<td><div class="wk-cell" onclick="wkDayClick(\''+ds+'\')"></div></td>';
      } else {
        html+='<td><div class="wk-cell">';
        people.forEach(p=>{
          html+='<div class="wk-person" style="background:'+p.bg+';color:'+p.tc+';" onclick="wkSlotClick(\''+p.slotId+'\',\''+p.ds+'\')">'+p.name+'</div>';
        });
        html+='</div></td>';
      }
    });
    html+='</tr>';
  }
  html+='</tbody></table></div>';
  return html;
}

function wkDayClick(ds){
  const d=new Date(ds);calY=d.getFullYear();calM=d.getMonth();selDay=d.getDate();
  calView='month';renderCal();
  setTimeout(()=>{const dp=document.querySelector('.dp');if(dp)dp.scrollIntoView({behavior:'smooth',block:'start'});},300);
}

  const isFull=ents.length>=slot.max_staff;
  const myE=ents.find(e=>e.staff_id===me?.id);
  const mems=ents.map(e=>'<span class="mtag'+(e.staff_id===me?.id?' me':'')+'">'+(e.shift_staff?.name||'?')+'</span>').join('');
  const typeLabel=slot.staff_type==='full'?'🟦 正社員枠':'🟩 アルバイト枠';
  let acts='';
  if(me.canManage){
    acts='<button class="bsm bd" onclick="closeM();openManageSlot(\''+slotId+'\',\''+slot.slot_name+'\',\''+ds+'\')">管理</button> ';
    acts+='<button class="bsm bg" onclick="closeM();openEditSlot(\''+slotId+'\')">編集</button>';
  } else {
    const canJoin=(slot.staff_type==='part'&&me.stype==='part')||(slot.staff_type==='full'&&me.stype==='full');

      if(myE)acts='<button class="lvbtn" onclick="closeM();leaveSlot(\''+myE.id+'\',\''+slotId+'\',\''+ds+'\')">キャンセル</button>';
      else if(!isFull)acts='<button class="joinbtn" onclick="closeM();joinSlot(\''+slotId+'\',\''+ds+'\')">参加する</button>';

  }
  openM('<div class="mtit">'+ds.slice(5)+' '+slot.slot_name+'</div>'
    +'<div style="font-size:13px;color:#555;margin-bottom:6px;">'+typeLabel+'　'+slot.start_time.slice(0,5)+'〜'+slot.end_time.slice(0,5)+'</div>'
    +'<div style="font-size:12px;color:#888;margin-bottom:10px;">定員'+slot.max_staff+'人　残り'+Math.max(0,slot.max_staff-ents.length)+'人</div>'
    +'<div class="smems" style="margin-bottom:12px;">'+(mems||'<span style="color:#bbb;font-size:12px;">まだ誰もいません</span>')+'</div>'

// ── Clock in/out ───────────────────────────────────────────────────────────────
async function clockIn(){
  const today=fd(new Date());
  const doIn=async(lat,lng)=>{
    const{data:ex}=await sb.from('attendance').select('*').eq('staff_id',me.id).eq('date',today).single();
    if(ex&&ex.clock_in){toast('既に出勤済みです','err');return;}
    const{data,error}=await sb.from('attendance').upsert({staff_id:me.id,date:today,clock_in:new Date().toISOString(),clock_in_lat:lat,clock_in_lng:lng,status:'normal'},{onConflict:'staff_id,date'}).select().single();
    if(error){toast('打刻に失敗しました','err');return;}
    todayAtt=data;toast('出勤打刻しました 🟢');renderCal();
  };
  const useGPS=me.gpsReq&&GPS_GLOBAL;
  if(!useGPS){await doIn(null,null);return;}
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
    if(distM(pos.coords.latitude,pos.coords.longitude,SLAT,SLNG)>SR){toast('店舗から離れすぎています','err');return;}
    await doIn(pos.coords.latitude,pos.coords.longitude);
  }catch(e){if(e.code===1){toast('位置情報の許可が必要です','err');return;}await doIn(null,null);}
}
async function clockOut(){
  if(!todayAtt){toast('出勤記録がありません','err');return;}
  const now=new Date();
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
    await sb.from('attendance').update({clock_out:now.toISOString(),clock_out_lat:pos.coords.latitude,clock_out_lng:pos.coords.longitude}).eq('id',todayAtt.id);
  }catch{await sb.from('attendance').update({clock_out:now.toISOString()}).eq('id',todayAtt.id);}
  todayAtt={...todayAtt,clock_out:now.toISOString()};toast('退勤打刻しました 🔴');renderCal();
}

    // Global settings
    html+='<div class="card"><div class="stitle">⚙ グローバル設定</div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;"><span style="font-size:13px;color:#555;">デフォルト時給（円）</span><input type="number" style="width:110px;" id="swage" value="'+settings.wage_per_hour+'"/></div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;"><span style="font-size:13px;color:#555;">月最大時間</span><input type="number" style="width:110px;" id="smax" value="'+settings.max_hours_per_month+'"/></div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;"><span style="font-size:13px;color:#555;">雇用保険警告（週h）</span><input type="number" style="width:110px;" id="sins" value="'+settings.insurance_threshold_weekly+'"/></div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;"><span style="font-size:13px;color:#555;">GPS打刻（全体）</span><button class="bsm '+(GPS_GLOBAL?'br':'bg')+'" onclick="toggleGPS()">'+(GPS_GLOBAL?'OFF':'ON')+'にする</button></div>';
    html+='<p style="font-size:11px;color:#888;">※法定：週20h以上で雇用保険加入義務</p>';
    html+='<button class="btn" style="margin-top:10px;" onclick="saveSettings()">設定を保存</button></div>';
    // PW change
    html+='<div class="card"><div class="stitle">🔑 管理者パスワード変更</div><div class="fcol"><input type="password" id="pwcur" placeholder="現在のパスワード"/><input type="password" id="pwnew" placeholder="新しいパスワード"/><input type="password" id="pwcnf" placeholder="確認"/><button class="btn" onclick="changeAdminPW()">変更する</button></div></div>';
    // Add staff
    html+='<div class="card"><div class="stitle">＋ スタッフ追加</div><div class="fcol">';
    html+='<input type="text" id="aname" placeholder="名前"/>';
    html+='<select id="atype" onchange="toggleAdminFields(this.value)"><option value="part">アルバイト</option><option value="full">正社員</option><option value="manager">店長</option><option value="owner">オーナー</option></select>';
    html+='<div id="adm-part-f" style="display:flex;flex-direction:column;gap:8px;"><input type="number" id="awage" placeholder="時給（円）"/><input type="number" id="awkh" placeholder="週最大時間"/></div>';
    html+='<div id="adm-full-f" style="display:none;flex-direction:column;gap:8px;"><input type="number" id="asal" placeholder="月給（円）"/><input type="number" id="amax" placeholder="月最大時間"/></div>';
    html+='<button class="btn" onclick="adminAddStaff()">追加する</button></div></div>';
  }

  // Staff list
  html+='<div class="card"><div class="stitle">👥 スタッフ一覧</div>';
  if(staff.length===0)html+='<p class="empty">スタッフがいません</p>';
  staff.forEach(s=>{
    const h=Math.round((mh[s.id]||0)*10)/10;
    const isPart=s.staff_type==='part';
    const wkH=isPart?getWeeklyH(s.id,calY,calM):0;
    const roleLabel=s.role==='owner'?'オーナー':s.role==='manager'?'店長':isPart?'バイト':'正社員';
    const avClass=isPart?'avp':'avf';
    let info='';
    if(me.salaryVisible){
      if(isPart)info='時給¥'+s.wage+'　週最大'+(s.max_hours_per_week||20)+'h';
      else info='月給¥'+(s.monthly_salary||0).toLocaleString()+'　月最大'+(s.max_hours||0)+'h';
      if(isOwner)info+='　PW:'+(s.password||'0000');
    } else {
      info=isPart?'週最大'+(s.max_hours_per_week||20)+'h':'月給制';
    }
    const timeStr=isPart?'今週'+wkH+'h / 今月'+h+'h':'今月'+h+'h';
    html+='<div style="background:#f8f6f2;border-radius:10px;padding:10px 12px;margin-bottom:8px;">';
    html+='<div style="display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px;margin-bottom:3px;"><span class="av '+avClass+'">'+s.name[0]+'</span>'+s.name+'<span style="font-size:10px;color:#888;">'+roleLabel+'</span></div>';
    html+='<div style="font-size:11px;color:#777;margin-bottom:2px;">'+info+'</div>';
    html+='<div style="font-size:11px;color:#555;margin-bottom:6px;">'+timeStr+(me.salaryVisible&&isPart?' ¥'+(h*s.wage).toLocaleString():'')+'</div>';
    // Permission badges
    html+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;">';
    html+='<span class="perm-badge '+(s.can_manage_shift?'perm-on':'perm-off')+'">排班管理 '+(s.can_manage_shift?'✅':'❌')+'</span>';
    html+='<span class="perm-badge '+(s.gps_required!==false?'perm-on':'perm-off')+'">GPS打刻 '+(s.gps_required!==false?'✅':'❌')+'</span>';
    html+='</div>';
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap;">';
    if(isOwner){
      html+='<button class="bsm bd" onclick="openEditStaff(\''+s.id+'\')">編集</button>';
      html+='<button class="bsm bgold" onclick="openSetPW(\''+s.id+'\',\''+s.name+'\')">PW</button>';
      html+='<button class="bsm '+(s.can_manage_shift?'br':'bg')+'" onclick="togglePerm(\''+s.id+'\',\'shift\','+(s.can_manage_shift?'false':'true')+')">排班'+(s.can_manage_shift?'OFF':'ON')+'</button>';
      html+='<button class="bsm '+(s.gps_required!==false?'br':'bg')+'" onclick="togglePerm(\''+s.id+'\',\'gps\','+(s.gps_required!==false?'false':'true')+')">GPS'+(s.gps_required!==false?'OFF':'ON')+'</button>';
      html+='<button class="bsm br" onclick="delStaff(\''+s.id+'\',\''+s.name+'\')">削除</button>';
    }
    html+='</div></div>';
  });
  html+='</div>';
  wrap.innerHTML=html;
}

function toggleAdminFields(v){
  const ip=v==='part';
  document.getElementById('adm-part-f').style.display=ip?'flex':'none';
  document.getElementById('adm-full-f').style.display=ip?'none':'flex';
}
async function toggleGPS(){
  GPS_GLOBAL=!GPS_GLOBAL;
  await sb.from('shift_settings').update({gps_required:GPS_GLOBAL}).eq('id',1);
  toast('GPS打刻を'+(GPS_GLOBAL?'ON':'OFF')+'にしました');renderAdmin();
}
async function togglePerm(staffId,type,val){
  val=val==='true'||val===true;
  const update=type==='shift'?{can_manage_shift:val}:{gps_required:val};
  const{error}=await sb.from('shift_staff').update(update).eq('id',staffId);
  if(error){toast('更新に失敗しました','err');return;}
  staff=staff.map(s=>s.id===staffId?{...s,...update}:s);
  toast('権限を更新しました');renderAdmin();
}
async function saveSettings(){
  const wage=parseInt(document.getElementById('swage').value)||1100;
  const max=parseInt(document.getElementById('smax').value)||80;
  const ins=parseInt(document.getElementById('sins').value)||20;
  await sb.from('shift_settings').upsert({id:1,wage_per_hour:wage,max_hours_per_month:max,insurance_threshold_weekly:ins,admin_password:APW,gps_required:GPS_GLOBAL});
  settings={...settings,wage_per_hour:wage,max_hours_per_month:max,insurance_threshold_weekly:ins};
  toast('保存しました');
}
async function changeAdminPW(){
  const cur=document.getElementById('pwcur').value,nw=document.getElementById('pwnew').value,cnf=document.getElementById('pwcnf').value;
  if(cur!==APW){toast('現在のパスワードが違います','err');return;}
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_settings').update({admin_password:nw}).eq('id',1);
  APW=nw;['pwcur','pwnew','pwcnf'].forEach(id=>document.getElementById(id).value='');toast('変更しました');
}
async function adminAddStaff(){
  const name=document.getElementById('aname').value.trim(),stype=document.getElementById('atype').value;
  if(!name){toast('名前を入力してください','err');return;}
  if(staff.find(s=>s.name===name)){toast('同じ名前が既にあります','err');return;}
  const isPart=stype==='part';
  const wage=isPart?parseInt(document.getElementById('awage').value)||settings.wage_per_hour:0;
  const maxWeek=isPart?parseInt(document.getElementById('awkh').value)||20:0;
  const salary=!isPart?parseInt(document.getElementById('asal').value)||0:0;
  const maxH=!isPart?parseInt(document.getElementById('amax').value)||settings.max_hours_per_month:0;
  const roleV=stype==='owner'?'owner':stype==='manager'?'manager':stype==='full'?'full':'part';
  const stypeV=(stype==='manager'||stype==='owner')?'full':stype;
  const{data,error}=await sb.from('shift_staff').insert({name,staff_type:stypeV,role:roleV,wage,max_hours:maxH,max_hours_per_week:maxWeek,monthly_salary:salary}).select().single();
  if(error){toast('追加に失敗しました','err');return;}
  staff.push(data);toast(name+' を追加しました');renderAdmin();
}
function openEditStaff(id){
  const s=staff.find(x=>x.id===id);if(!s)return;
  const isPart=s.staff_type==='part';
  openM('<div class="mtit">'+s.name+' の編集</div><div class="fcol">'
    +'<input type="text" id="esn" value="'+s.name+'"/>'
    +'<select id="est" onchange="toggleEditF(this.value)"><option value="part"'+(s.role==='part'?' selected':'')+'>アルバイト</option><option value="full"'+(s.role==='full'?' selected':'')+'>正社員</option><option value="manager"'+(s.role==='manager'?' selected':'')+'>店長</option><option value="owner"'+(s.role==='owner'?' selected':'')+'>オーナー</option></select>'
    +'<div id="es-part" style="'+(isPart?'':'display:none;')+'display:flex;flex-direction:column;gap:8px;"><input type="number" id="esw" value="'+s.wage+'" placeholder="時給"/><input type="number" id="eswk" value="'+(s.max_hours_per_week||20)+'" placeholder="週最大時間"/></div>'
    +'<div id="es-full" style="'+(!isPart?'':'display:none;')+'display:flex;flex-direction:column;gap:8px;"><input type="number" id="esal" value="'+(s.monthly_salary||0)+'" placeholder="月給（円）"/><input type="number" id="esm" value="'+s.max_hours+'" placeholder="月最大時間"/></div>'
    +'</div><div class="mbtns"><button class="bsm bg" onclick="doEditStaff(\''+id+'\')">保存</button><button class="bsm bgr" onclick="closeM()">キャンセル</button></div>');
}
function toggleEditF(v){
  const ip=v==='part';
  document.getElementById('es-part').style.display=ip?'flex':'none';
  document.getElementById('es-full').style.display=ip?'none':'flex';
}
async function doEditStaff(id){
  const name=document.getElementById('esn').value.trim(),stype=document.getElementById('est').value;
  if(!name){toast('名前を入力してください','err');return;}
  const roleV=stype==='owner'?'owner':stype==='manager'?'manager':stype==='full'?'full':'part';
  const stypeV=(stype==='manager'||stype==='owner')?'full':stype;
  const isPart=stype==='part';
  const wage=isPart?parseInt(document.getElementById('esw').value)||0:0;
  const maxWeek=isPart?parseInt(document.getElementById('eswk').value)||20:0;
  const salary=!isPart?parseInt(document.getElementById('esal').value)||0:0;
  const maxH=!isPart?parseInt(document.getElementById('esm').value)||settings.max_hours_per_month:0;
  await sb.from('shift_staff').update({name,staff_type:stypeV,role:roleV,wage,max_hours:maxH,max_hours_per_week:maxWeek,monthly_salary:salary}).eq('id',id);
  staff=staff.map(s=>s.id===id?{...s,name,staff_type:stypeV,role:roleV,wage,max_hours:maxH,max_hours_per_week:maxWeek,monthly_salary:salary}:s);
  closeM();toast('更新しました');renderAdmin();
}
async function delStaff(id,name){
  if(!confirm(name+' を削除しますか？'))return;
  await sb.from('shift_staff').delete().eq('id',id);
  staff=staff.filter(s=>s.id!==id);toast(name+' を削除しました');renderAdmin();
}
function openSetPW(id,name){
  openM('<div class="mtit">'+name+' のPW設定</div><div class="fcol"><input type="password" id="spn" placeholder="新しいパスワード"/><input type="password" id="spc" placeholder="確認"/></div><div class="mbtns"><button class="bsm bg" onclick="doSetPW(\''+id+'\')">設定</button><button class="bsm bgr" onclick="closeM()">キャンセル</button></div>');
}
async function doSetPW(id){
  const nw=document.getElementById('spn').value,cnf=document.getElementById('spc').value;
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_staff').update({password:nw}).eq('id',id);
  staff=staff.map(s=>s.id===id?{...s,password:nw}:s);closeM();toast('設定しました');renderAdmin();
}
function openSelfPW(){
  openM('<div class="mtit">パスワード変更</div><div class="fcol"><input type="password" id="mpc" placeholder="現在のPW"/><input type="password" id="mpn" placeholder="新しいPW"/><input type="password" id="mpcf" placeholder="確認"/></div><div class="mbtns"><button class="bsm bg" onclick="doSelfPW()">変更</button><button class="bsm bgr" onclick="closeM()">キャンセル</button></div>');
}
async function doSelfPW(){
  const cur=document.getElementById('mpc').value,nw=document.getElementById('mpn').value,cnf=document.getElementById('mpcf').value;
  const myS=staff.find(s=>s.id===me.id);
  if(cur!==(myS?.password||'0000')){toast('現在のPWが違います','err');return;}
  if(!nw||nw!==cnf){toast('PWが一致しません','err');return;}
  await sb.from('shift_staff').update({password:nw}).eq('id',me.id);
  staff=staff.map(s=>s.id===me.id?{...s,password:nw}:s);closeM();toast('変更しました');
}

// ── Init ───────────────────────────────────────────────────────────────────────
document.getElementById('admpw').addEventListener('keydown',function(e){if(e.key==='Enter')doAdminLogin();});
loadAll();
</script>
