<script>
// ── 設定 ──
const SBU='https://hqddrswyqmammuwwrvna.supabase.co';
const SBK='sb_publishable_766-Q62xxyGNiARJhTg13A_lb7YxuEQ';
const sb=supabase.createClient(SBU,SBK);
const STAFF_COLORS=['#7a8b73','#6e8a9a','#9a7d8c','#a8847a','#8a9a7d','#7d8a9a',
  '#8c9a8a','#9a8c7d','#7a7d8c','#9a8a9a','#6b8a82','#a8927d','#82967a',
  '#8a7d9a','#7d8a82','#6b8278','#8a7a82','#7a8278','#82887a','#788290'];
const DJP_MON=['月','火','水','木','金','土','日'];
const LT={paid:'有給休暇',sick:'病欠',mourning:'忌引き',unpaid:'無給休暇'};
const DUR={full:'全日',half_am:'午前半休',half_pm:'午後半休',custom:'時間指定'};

// ── 状態 ──
let APW='haku2026';
let me=null;
let staff=[],allStaff=[],settings={insurance_threshold_weekly:20};
let calY=new Date().getFullYear(),calM=new Date().getMonth(),selDay=null,calView='month',wOff=0;
let SC={},EC={};
let staffColorMap={};
let pendingCount=0;

// ── ユーティリティ ──
function toast(m,t='ok'){
  const e=document.getElementById('toast');
  e.textContent=m;e.style.background=t==='err'?'#a8584a':'#6b8268';
  e.style.display='block';clearTimeout(window._tt);
  window._tt=setTimeout(()=>e.style.display='none',2800);
}
function openM(h){document.getElementById('mbox').innerHTML=h;document.getElementById('mbg').classList.add('show');}
function closeM(){document.getElementById('mbg').classList.remove('show');}
function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function chft(s,e){const[sh,sm]=s.split(':').map(Number);const[eh,em]=e.split(':').map(Number);return Math.max(0,(eh*60+em-sh*60-sm)/60);}
function roleLabel(s){return s.role==='owner'?'オーナー':s.role==='manager'?'店長':s.staff_type==='full'?'正社員':'アルバイト';}
function buildStaffColorMap(){staffColorMap={};(allStaff.length?allStaff:staff).forEach((s,i)=>staffColorMap[s.id]=STAFF_COLORS[i%STAFF_COLORS.length]);}

// ── ページナビ ──
function showP(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.hbtn').forEach(b=>b.classList.remove('on'));
  if(name==='login'){
    document.getElementById('p-login').classList.add('show');
    document.getElementById('hdr').classList.remove('show');
  } else {
    document.getElementById('p-'+name).classList.add('show');
    document.getElementById('hdr').classList.add('show');
    const nb=document.getElementById('nb-'+name);if(nb)nb.classList.add('on');
  }
}
function nav(name){
  showP(name);
  if(name==='cal')renderCal();
  else if(name==='leave')renderLeave();
  else if(name==='mycancel'){renderMyCancel();setTimeout(refreshPendingCount,500);}
  else if(name==='requests')renderRequests();
  else if(name==='admin')renderAdmin();
}
function ltab(n){
  document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('on',['staff','admin'][i]===n));
  document.querySelectorAll('.tpane').forEach(p=>p.classList.remove('on'));
  document.getElementById('lt-'+n).classList.add('on');
}

// ── データ読み込み ──
async function loadAll(){
  const{data,error}=await sb.from('shift_staff').select('*').order('created_at');
  if(error){document.getElementById('slogin').innerHTML='<p style="color:red;font-size:12px;padding:10px;">読み込みエラー: '+error.message+'</p>';return;}
  allStaff=data||[];
  // 現役のみ（is_active が false でない人）
  staff=allStaff.filter(s=>s.is_active!==false);
  buildStaffColorMap();
  renderSlogin();
  const{data:sd}=await sb.from('shift_settings').select('*').eq('id',1).single();
  if(sd){settings=sd;if(sd.admin_password)APW=sd.admin_password;}
}

async function loadMonth(y,m){
  const from=y+'-'+String(m+1).padStart(2,'0')+'-01';
  const to=y+'-'+String(m+1).padStart(2,'0')+'-'+new Date(y,m+1,0).getDate();
  const k=y+'-'+m;
  const[sr,er]=await Promise.all([
    sb.from('shift_slots').select('*').gte('date',from).lte('date',to).order('start_time'),
    sb.from('slot_entries').select('*,shift_staff(id,name,staff_type,role)')
  ]);
  const sm={};(sr.data||[]).forEach(s=>{if(!sm[s.date])sm[s.date]=[];sm[s.date].push(s);});
  SC[k]=sm;
  const em={};(er.data||[]).forEach(e=>{
    if(!em[e.slot_id])em[e.slot_id]=[];
    // 同一スタッフの重複エントリを除外
    if(!em[e.slot_id].some(x=>x.staff_id===e.staff_id))em[e.slot_id].push(e);
  });
  EC[k]=em;
}

// 週合計時数（月曜始まり）
function getWeeklyH(staffId){
  const k=calY+'-'+calM,sm=SC[k]||{},em=EC[k]||{};
  const today=new Date();
  const diffToMon=(today.getDay()+6)%7;
  const ws=new Date(today);ws.setDate(today.getDate()-diffToMon+wOff*7);ws.setHours(0,0,0,0);
  const we=new Date(ws);we.setDate(ws.getDate()+6);we.setHours(23,59,59,999);
  let total=0;
  Object.entries(sm).forEach(([date,slots])=>{
    const d=new Date(date+'T00:00:00');if(d<ws||d>we)return;
    // 同日・同時間帯の重複を防ぐ
    const counted=new Set();
    slots.forEach(slot=>{
      if(!(em[slot.id]||[]).find(e=>e.staff_id===staffId))return;
      const key=date+'_'+slot.start_time+'_'+slot.end_time;
      if(counted.has(key))return;
      counted.add(key);
      total+=chft(slot.start_time,slot.end_time);
    });
  });
  return Math.round(total*10)/10;
}
// 月合計時数
function getMonthlyH(staffId){
  const k=calY+'-'+calM,sm=SC[k]||{};
  let total=0;
  Object.entries(sm).forEach(([date,slots])=>{
    const counted=new Set();
    slots.forEach(slot=>{
      if(!(EC[k]?.[slot.id]||[]).find(e=>e.staff_id===staffId))return;
      const key=date+'_'+slot.start_time+'_'+slot.end_time;
      if(counted.has(key))return;
      counted.add(key);
      total+=chft(slot.start_time,slot.end_time);
    });
  });
  return Math.round(total*10)/10;
}

// 監査ログ記録
async function logAction(action,targetDate,detail){
  if(!me)return;
  await sb.from('audit_log').insert({
    actor_id:me.id==='admin'?null:me.id,
    actor_name:me.name,
    actor_role:me.srole==='owner'?'Owner':'Manager',
    action,target_date:targetDate||null,detail
  });
}

// ── 認証 ──
function renderSlogin(){
  const el=document.getElementById('slogin');if(!el)return;
  if(staff.length===0){el.innerHTML='<p class="empty">スタッフが登録されていません<br>管理者がスタッフを追加してください</p>';return;}
  let html='<div class="fcol">';
  html+='<select id="ssel" style="font-size:14px;padding:11px;"><option value="">スタッフを選択…</option>';
  staff.forEach(s=>{
    const lbl=s.role==='owner'?' 【オーナー】':s.role==='manager'?' 【店長】':s.staff_type==='full'?' 【正社員】':'';
    html+='<option value="'+s.id+'">'+s.name+lbl+'</option>';
  });
  html+='</select><input type="password" id="spw" placeholder="パスワード（初期：0000）"/>';
  html+='<button class="btn" onclick="doStaffLogin()">ログイン</button></div>';
  el.innerHTML=html;
  const spwEl=document.getElementById('spw');
  if(spwEl)spwEl.addEventListener('keydown',e=>{if(e.key==='Enter')doStaffLogin();});
}

function doStaffLogin(){
  const id=document.getElementById('ssel').value,pw=document.getElementById('spw').value;
  if(!id){toast('スタッフを選択してください','err');return;}
  const s=staff.find(x=>x.id===id);
  if(!s||pw!==(s.password||'0000')){toast('パスワードが違います','err');return;}
  const isOwnerRole=s.role==='owner';
  const isManagerRole=s.role==='manager';
  const canManage=s.can_manage_shift||isManagerRole||isOwnerRole;
  const _isPart=s.staff_type==='part';
  me={id:s.id,name:s.name,stype:s.staff_type||'part',srole:s.role||'part',
      canManage,isPart:_isPart};
  const roleDisp=isOwnerRole?'・オーナー':isManagerRole?'・店長':s.staff_type==='full'?'・正社員':'・バイト';
  document.getElementById('huser').textContent=s.name+roleDisp;
  applyNav();
  showP('cal');renderCal();
  refreshPendingCount();
}

function doAdminLogin(){
  const pw=document.getElementById('admpw').value;
  if(pw!==APW){toast('パスワードが違います','err');return;}
  me={id:'admin',name:'管理者',stype:'full',srole:'owner',canManage:true,isPart:false};
  document.getElementById('huser').textContent='管理者';
  applyNav();
  showP('cal');renderCal();

// ナビ表示制御：管理権限者は全員と同じ画面＋申請確認
function applyNav(){
  document.getElementById('nb-admin').style.display=me.canManage?'block':'none';
  document.getElementById('nb-requests').style.display=me.canManage?'block':'none';
  // 休暇申請：正社員のみ（管理者でない一般正社員も）。アルバイトは表示しない
  document.getElementById('nb-leave').style.display=(!me.isPart&&me.id!=='admin')?'block':'none';
  // 申請状況（取消・代班）：管理者ログイン以外の全員
  document.getElementById('nb-mycancel').style.display=(me.id!=='admin')?'block':'none';
}

function logout(){
  me=null;selDay=null;
  document.getElementById('admpw').value='';
  ltab('staff');renderSlogin();showP('login');
}

async function refreshPendingCount(){
  if(!me)return;
  // 代班依頼バッジは全員チェック（canManageでなくても）
  if(!me.canManage){
    if(me.id!=='admin'){
      const{data:myReq}=await sb.from('swap_requests').select('id').eq('target_id',me.id).eq('status','waiting_b');
      const sd=document.getElementById('myswapdot');
      if(sd){const n=(myReq||[]).length;if(n>0){sd.style.display='flex';sd.textContent=n;}else sd.style.display='none';}
    }
    return;
  }
  const[lr,cr,sr]=await Promise.all([
    sb.from('leave_requests').select('id').eq('status','pending'),
    sb.from('cancel_requests').select('id').eq('status','pending'),
    sb.from('swap_requests').select('id').eq('status','waiting_admin')
  ]);
  pendingCount=((lr.data||[]).length)+((cr.data||[]).length)+((sr.data||[]).length);
  const dot=document.getElementById('reqdot');
  if(dot){
    if(pendingCount>0){dot.style.display='flex';dot.textContent=pendingCount;}
    else dot.style.display='none';
  }
  // 自分宛ての代班依頼バッジ（全員）
  if(me&&me.id!=='admin'){
    const{data:myReq}=await sb.from('swap_requests').select('id').eq('target_id',me.id).eq('status','waiting_b');
    const sd=document.getElementById('myswapdot');
    if(sd){
      const n=(myReq||[]).length;
      if(n>0){sd.style.display='flex';sd.textContent=n;}else sd.style.display='none';
    }
  }
}

async function renderCal(){
  const wrap=document.getElementById('wcal');
  wrap.innerHTML='<div class="loading"><span class="spin"></span>読み込み中…</div>';
  await loadMonth(calY,calM);
  const k=calY+'-'+calM,sm=SC[k]||{},em=EC[k]||{};
  let html='';

  // 自分のサマリー（管理者ログイン以外）
  if(me.id!=='admin'){
    const myMH=getMonthlyH(me.id);
    if(me.isPart){
      const wkH=getWeeklyH(me.id);
      const myS=staff.find(s=>s.id===me.id);
      const maxWk=myS?.max_hours_per_week||settings.insurance_threshold_weekly||20;
      const pct=Math.min(wkH/maxWk*100,100);
      const over=wkH>=maxWk;
      const near=wkH>=maxWk*0.85;
      const fc=over?'#a8584a':near?'#c08552':'#6b8268';
      const wkLabel=wOff===0?'今週':wOff===1?'来週':wOff===-1?'先週':(wOff>0?wOff+'週後':Math.abs(wOff)+'週前');
      html+='<div class="card">';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:12px;color:#666;">'+wkLabel+'のシフト時間</span><span style="font-size:13px;font-weight:700;color:'+fc+';">'+wkH+'h / '+maxWk+'h</span></div>';
      html+='<div class="prog"><div class="progf" style="width:'+pct+'%;background:'+fc+';"></div></div>';
      html+='<div style="display:flex;justify-content:space-between;"><span style="font-size:12px;color:#666;">今月のシフト合計</span><span style="font-size:13px;font-weight:600;color:#5a6b7a;">'+myMH+'h</span></div>';
      // 警告はアルバイト本人には表示しない（管理者のみスタッフ一覧で確認）
      html+='<div style="text-align:right;margin-top:6px;"><button onclick="openSelfPW()" style="background:none;border:none;color:#aaa;font-size:10px;cursor:pointer;text-decoration:underline;">🔑 パスワード変更</button></div>';
      html+='</div>';
    } else {
      const myFS=staff.find(s=>s.id===me.id);
      const wkH40=getWeeklyH(me.id);
      const maxMon=(myFS?.max_hours)||160;
      html+='<div class="card">';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:12px;color:#666;">今週のシフト時間</span><span style="font-size:13px;font-weight:700;color:'+(wkH40>40?'#a8584a':'#5a6b7a')+';">'+wkH40+'h / 40h</span></div>';
      const pctW=Math.min(wkH40/40*100,100);
      html+='<div class="prog"><div class="progf" style="width:'+pctW+'%;background:'+(wkH40>40?'#a8584a':'#7a8b73')+';"></div></div>';
      html+='<div style="display:flex;justify-content:space-between;"><span style="font-size:12px;color:#666;">今月のシフト合計</span><span style="font-size:13px;font-weight:600;color:#5a6b7a;">'+myMH+'h / '+maxMon+'h</span></div>';
      html+='<div style="text-align:right;margin-top:6px;"><button onclick="openSelfPW()" style="background:none;border:none;color:#aaa;font-size:10px;cursor:pointer;text-decoration:underline;">🔑 パスワード変更</button></div>';
      html+='</div>';
    }
  }

  // ビュー切替
  html+='<div class="vtabs"><button class="vt'+(calView==='month'?' on':'')+'" onclick="swView(\'month\')">月表示</button><button class="vt'+(calView==='week'?' on':'')+'" onclick="swView(\'week\')">週表示</button></div>';

  if(calView==='week'){html+=buildWeek(sm,em);wrap.innerHTML=html;return;}

  // 凡例
  html+='<div class="leg">';
  html+='<div class="legitem"><div class="legdot" style="background:#cdd9c8;border:1px solid #b5c4b0;"></div>アルバイト枠</div>';
  html+='<div class="legitem"><div class="legdot" style="background:#c4d0db;border:1px solid #aebccb;"></div>正社員枠</div>';
  html+='<div class="legitem"><div class="legdot" style="background:#b5654a;"></div>満員</div>';
  html+='</div>';

  // 月ナビ
  html+='<div class="mnav"><button class="arr" onclick="chM(-1)">‹</button>';
  html+='<span class="mtitle" onclick="openJump()">'+calY+'年'+(calM+1)+'月</span>';
  html+='<div style="display:flex;gap:4px;"><button class="tbtn2" onclick="goToday()">今日</button><button class="arr" onclick="chM(1)">›</button></div></div>';

  // グリッド（月曜始まり）
  const dim=new Date(calY,calM+1,0).getDate();
  const fdow=new Date(calY,calM,1).getDay();
  const fdowMon=(fdow+6)%7;
  const ts=fd(new Date());
  let g=DJP_MON.map((d,i)=>'<div class="dh" style="color:'+(i===5?'#2471a3':i===6?'#a8584a':'#555')+'">'+d+'</div>').join('');
  for(let i=0;i<fdowMon;i++)g+='<div></div>';
  for(let day=1;day<=dim;day++){
    const thisDate=new Date(calY,calM,day);
    const dow=thisDate.getDay();
    const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const isSel=selDay===day,isToday=ds===ts;
    const daySlots=sm[ds]||[];
    let chips='';
    daySlots.forEach(slot=>{
      const ents=em[slot.id]||[];
      const isFull=ents.length>=slot.max_staff;
      const isMine=ents.some(e=>e.staff_id===me?.id);
      let bg=isMine?(staffColorMap[me.id]||'#c9b896'):isFull?'#b5654a':slot.staff_type==='full'?'#7d92a8':'#8aa085';
      chips+='<div class="chip" style="background:'+bg+';">'+slot.slot_name+' '+ents.length+'/'+slot.max_staff+'</div>';
    });
    const numColor=dow===6?'#a8584a':dow===0?'#2471a3':'#222';
    g+='<button class="cd'+(isSel?' sel':'')+(isToday?' tod':'')+'" onclick="selD('+day+')">';
    g+='<span class="cdn" style="color:'+(isSel?'#5a6b7a':numColor)+'">'+day+'</span>';
    g+=chips+'</button>';
  }
  html+='<div class="cgrid">'+g+'</div>';

  if(selDay)html+=buildDayPanel(selDay,sm,em);

  // 管理者・店長：スタッフ時間一覧
  if(me.canManage){
    html+='<div class="card"><div class="stitle">今月のスタッフ時間</div>';
    staff.forEach(s=>{
      const h=getMonthlyH(s.id);
      const isPart=s.staff_type==='part';
      const wkH=isPart?getWeeklyH(s.id):0;
      const maxWk=s.max_hours_per_week||settings.insurance_threshold_weekly||20;
      const sc=staffColorMap[s.id]||'#5a6b7a';
      const over=isPart&&wkH>=maxWk;
      let timeStr=isPart?'今週'+wkH+'h / 今月'+h+'h':'今月'+h+'h';
      html+='<div style="margin-bottom:9px;">';
      html+='<div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;">';
      html+='<span class="av" style="background:'+sc+';">'+s.name[0]+'</span>'+s.name;
      html+='<span style="font-size:10px;color:#888;">'+roleLabel(s)+'</span>';
      html+='<span style="margin-left:auto;font-size:11px;color:'+(over?'#a8584a':'#555')+';font-weight:'+(over?'700':'400')+';">'+timeStr+(over?' ⚠':'')+'</span></div>';
      if(isPart){const pct=Math.min(wkH/maxWk*100,100);html+='<div class="prog" style="margin-top:3px;"><div class="progf" style="width:'+pct+'%;background:'+(over?'#a8584a':'#6b8268')+';"></div></div>';}
      html+='</div>';
    });
    html+='</div>';
    // PDF出力
    html+='<div class="card"><div class="stitle">📄 週シフト表 画像出力</div>';
    html+='<p class="hint" style="margin-bottom:10px;">現在表示中の週を横向きの画像で出力します（LINE共有・掲示用）。週表示で見たい週に移動してから出力してください。</p>';
    html+='<button class="btn" onclick="exportWeekImage()">今表示中の週のシフト表を画像で出力</button></div>';
  }
  wrap.innerHTML=html;
}

function buildDayPanel(day,sm,em){
  const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  const daySlots=sm[ds]||[];
  const isAdmin=me.canManage;
  const dateObj=new Date(calY,calM,day);
  const dowName=DJP_MON[(dateObj.getDay()+6)%7];
  let html='<div class="dp"><div class="dptitle">'+(calM+1)+'月'+day+'日（'+dowName+'）</div>';
  const pSlots=daySlots.filter(s=>s.staff_type==='part');
  const fSlots=daySlots.filter(s=>s.staff_type==='full');

  function slotCard(slot,cls){
    const ents=em[slot.id]||[];
    const isFull=ents.length>=slot.max_staff;
    const myE=ents.find(e=>e.staff_id===me?.id);
    const mems=ents.map(e=>{
      const sc=staffColorMap[e.staff_id]||'#5a6b7a';
      const isMe=e.staff_id===me?.id;
      return '<span class="mtag'+(isMe?' me':'')+'" style="'+(isMe?'':'border-color:'+sc+';color:'+sc+';')+'">'+(e.shift_staff?.name||'?')+'</span>';
    }).join('');
    let acts='';
    // 自分がこの枠にいる場合は、管理者でも自分用の操作（代班・取消/休暇）を表示
    const iAmIn=myE&&me.id!=='admin';
    if(iAmIn){
      if(me.isPart){
        acts+='<button class="bsm bgold" onclick="openSwapReq(\''+myE.id+'\',\''+slot.id+'\',\''+ds+'\',\''+slot.slot_name+'\')">代わりを探す</button> ';
        acts+='<button class="bsm br" onclick="openCancelReq(\''+myE.id+'\',\''+slot.id+'\',\''+ds+'\',\''+slot.slot_name+'\')">取消申請</button>';
      }else{
        acts+='<button class="bsm bgold" onclick="openSwapReq(\''+myE.id+'\',\''+slot.id+'\',\''+ds+'\',\''+slot.slot_name+'\')">代わりを探す</button>';
      }
    }
    if(isAdmin){
      // 管理者自身がこの枠に入れる場合（未参加・タイプ一致・空きあり）
      const adminCanJoin=!myE&&me.id!=='admin'&&!isFull&&((slot.staff_type==='part'&&me.isPart)||(slot.staff_type==='full'&&!me.isPart));
      if(adminCanJoin){
        acts+='<button class="joinbtn" onclick="joinSlot(\''+slot.id+'\',\''+ds+'\')">自分が参加</button> ';
      }
      if(iAmIn||adminCanJoin)acts+='<div style="height:6px;"></div>';
      acts+='<button class="bsm bd" onclick="openManageSlot(\''+slot.id+'\',\''+ds+'\')">割当</button> ';
      acts+='<button class="bsm bg" onclick="openEditSlot(\''+slot.id+'\')">編集</button> ';
      acts+='<button class="bsm br" onclick="delSlot(\''+slot.id+'\',\''+ds+'\')">削除</button>';
    } else {
      const canJoin=(slot.staff_type==='part'&&me.isPart)||(slot.staff_type==='full'&&!me.isPart);
      if(canJoin&&!myE){
        if(!isFull)acts='<button class="joinbtn" onclick="joinSlot(\''+slot.id+'\',\''+ds+'\')">参加する</button>';
        else acts='<span style="font-size:11px;color:#888;">満員</span>';
      }
    }
    return '<div class="scard '+cls+'">'
      +'<div class="shed"><span class="sname">'+slot.slot_name+'</span><span class="stime">'+slot.start_time.slice(0,5)+'〜'+slot.end_time.slice(0,5)+'</span></div>'
      +'<div class="scap">定員'+slot.max_staff+'人　残り'+Math.max(0,slot.max_staff-ents.length)+'人</div>'
      +'<div class="smems">'+(mems||'<span style="color:#bbb;font-size:11px;font-style:italic;">まだ誰もいません</span>')+'</div>'
      +'<div class="sacts">'+acts+'</div></div>';
  }

  if(pSlots.length>0){
    html+='<div class="slabel" style="color:#6b8268;">🟩 アルバイト枠</div>';
    pSlots.forEach(s=>html+=slotCard(s,'part-s'));
  }
  if(fSlots.length>0){
    html+='<div class="slabel" style="color:#2471a3;'+(pSlots.length>0?'margin-top:12px;':'')+'">🟦 正社員枠</div>';
    fSlots.forEach(s=>html+=slotCard(s,'full-s'));
  }
  if(daySlots.length===0&&!isAdmin)html+='<p class="empty">この日のシフト枠はありません</p>';

  if(isAdmin){
    html+='<div style="margin-top:12px;"><button class="btn" onclick="openAddSlot(\''+ds+'\')">＋ シフト枠を追加</button></div>';
  }
  html+='</div>';
  return html;
}

// ── 週ビュー（連続ブロック・個人別カラー）──
function buildWeek(sm,em){
  const today=new Date();
  const diffToMon=(today.getDay()+6)%7;
  const sw=new Date(today);sw.setDate(today.getDate()-diffToMon+wOff*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sw);d.setDate(d.getDate()+i);return d;});
  const ts=fd(today);
  const START_H=6,END_H=23,HOUR_H=40;
  const totalH=(END_H-START_H)*HOUR_H;

  // 選択中スタッフ（デフォルト：誰も選択しない＝全員同じ色）
  if(window._wkSel===undefined)window._wkSel=null;
  const selId=window._wkSel;

  let html='<div class="mnav">';
  html+='<button class="arr" onclick="chW(-1)">‹</button>';
  html+='<span style="font-size:13px;font-weight:700;color:#5a6b7a;">'+fd(days[0]).slice(5)+' 〜 '+fd(days[6]).slice(5)+'</span>';
  html+='<div style="display:flex;gap:4px;"><button class="tbtn2" onclick="wOff=0;renderCal()">今週</button><button class="arr" onclick="chW(1)">›</button></div></div>';

  // ── スタッフ色チップ選択器 ──
  // この週にシフトがあるスタッフを集める
  const weekStaffIds=new Set();
  days.forEach(d=>{
    const ds=fd(d);
    (sm[ds]||[]).forEach(slot=>{(em[slot.id]||[]).forEach(e=>weekStaffIds.add(e.staff_id));});
  });
  const chipStaff=me.canManage?staff.filter(s=>weekStaffIds.has(s.id)):staff.filter(s=>s.id===me.id);
  if(chipStaff.length>0){
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;">';
    html+='<span style="font-size:11px;color:#888;">表示：</span>';
    html+='<button onclick="window._wkSel=null;renderCal()" style="padding:4px 10px;border-radius:99px;border:1.5px solid '+(selId===null?'#5a6b7a':'#ddd')+';background:'+(selId===null?'#5a6b7a':'#fff')+';color:'+(selId===null?'#fff':'#666')+';font-size:11px;font-weight:700;cursor:pointer;">全員</button>';
    chipStaff.forEach(s=>{
      const sc=staffColorMap[s.id]||'#5a6b7a';
      const on=selId===s.id;
      html+='<button onclick="window._wkSel=\''+s.id+'\';renderCal()" style="display:flex;align-items:center;gap:4px;padding:4px 10px 4px 4px;border-radius:99px;border:1.5px solid '+(on?sc:'#ddd')+';background:'+(on?sc:'#fff')+';color:'+(on?'#fff':'#666')+';font-size:11px;font-weight:700;cursor:pointer;">';
      html+='<span style="width:16px;height:16px;border-radius:50%;background:'+(on?'#fff':sc)+';color:'+(on?sc:'#fff')+';display:inline-flex;align-items:center;justify-content:center;font-size:9px;">'+s.name[0]+'</span>'+s.name+'</button>';
    });
    html+='</div>';
  }
  html+='<p class="hint" style="margin-bottom:8px;">スタッフを選ぶとその人のシフトが強調されます。「全員」で全表示に戻ります。枠をタップで詳細。</p>';

  html+='<div class="wk-scroll"><div style="min-width:340px;">';
  html+='<div style="display:flex;">';
  html+='<div style="width:34px;flex-shrink:0;background:#5a6b7a;"></div>';
  days.forEach((d,i)=>{
    const isT=fd(d)===ts;
    const dow=d.getDay();
    const tcol=isT?'#5a6b7a':dow===0?'#e8b4b4':dow===6?'#b4c4e8':'#fff';
    html+='<div style="flex:1;text-align:center;padding:5px 1px;background:'+(isT?'#c9b896':'#5a6b7a')+';color:'+tcol+';border-left:1px solid #6b7d8c;">';
    html+='<div style="font-size:10px;">'+DJP_MON[i]+'</div><div style="font-size:13px;font-weight:700;">'+d.getDate()+'</div></div>';
  });
  html+='</div>';
  html+='<div style="display:flex;position:relative;">';
  html+='<div style="width:34px;flex-shrink:0;">';
  for(let h=START_H;h<END_H;h++){
    html+='<div style="height:'+HOUR_H+'px;border-top:1px solid #eee;font-size:8px;color:#aaa;text-align:center;padding-top:1px;">'+String(h).padStart(2,'0')+'</div>';
  }
  html+='</div>';
  days.forEach(d=>{
    const ds=fd(d),daySlots=(sm[ds]||[]).slice().sort((a,b)=>a.start_time.localeCompare(b.start_time));
    const isT=ds===ts;
    html+='<div style="flex:1;position:relative;border-left:1px solid #eee;background:'+(isT?'#fffdf5':'#fff')+';height:'+totalH+'px;" data-ds="'+ds+'" onclick="wkEmptyClick(this)">';
    for(let h=0;h<END_H-START_H;h++){
      html+='<div style="position:absolute;top:'+(h*HOUR_H)+'px;left:0;right:0;height:1px;background:#f2f2f2;"></div>';
    }
    const cols=[];
    daySlots.forEach(slot=>{
      const ss=(parseInt(slot.start_time.slice(0,2))*60+parseInt(slot.start_time.slice(3,5)));
      const se=(parseInt(slot.end_time.slice(0,2))*60+parseInt(slot.end_time.slice(3,5)));
      let placed=false;
      for(const col of cols){if(col.every(x=>x.se<=ss||x.ss>=se)){col.push({slot,ss,se});placed=true;break;}}
      if(!placed)cols.push([{slot,ss,se}]);
    });
    const nCol=Math.max(1,cols.length);
    cols.forEach((col,ci)=>{
      col.forEach(({slot,ss,se})=>{
        const topPx=((ss/60)-START_H)*HOUR_H;
        const hPx=((se-ss)/60)*HOUR_H;
        if(topPx<-5||topPx>totalH)return;
        const ents=em[slot.id]||[];
        const isFull=ents.length>=slot.max_staff;
        const isEmpty=ents.length===0;
        // 選択スタッフがこの枠にいるか
        const hasSel=selId&&ents.some(e=>e.staff_id===selId);
        let bg,bord='',op='1',star='',extraStyle='';
        if(isEmpty){
          // 空き枠：色なし・破線枠
          bg='transparent';extraStyle='border:1.5px dashed #c0c0c0;color:#aaa;';
          if(selId)op='0.4';
        }else if(hasSel){
          // 選択された人がいる枠：その人の色で強調・維持
          bg=staffColorMap[selId]||'#c9b896';bord='border:2px solid #5a4a2a;';star='★';
        }else{
          // 平常：先頭メンバーの個人カラー（全員ハイライト）
          bg=staffColorMap[ents[0].staff_id]||'#8aa085';
          if(selId)op='0.3'; // 誰か選択中なら非該当を薄く
        }
        const w=Math.floor(100/nCol);
        const left=ci*w;
        // 狭い格子（重なりが多い）は名前の先頭1文字、広い格子はフルネーム
        const isNarrow=nCol>=2;
        let memHtml='';
        if(ents.length===0){
          memHtml=isNarrow?'':'<span style="opacity:.7;">空き</span>';
        }else{
          memHtml=ents.map(e=>{
            const nm=e.shift_staff?.name||'?';
            const isSelMem=selId&&e.staff_id===selId;
            const disp=isNarrow?nm[0]:nm;
            return '<div style="background:rgba(255,255,255,.25);border-radius:2px;padding:0 '+(isNarrow?'0':'2')+'px;margin-bottom:1px;text-align:'+(isNarrow?'center':'left')+';'+(isSelMem?'font-weight:800;':'')+'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+disp+'</div>';
          }).join('');
        }
        const fontPx=isNarrow?8:9;
        html+='<div data-sid="'+slot.id+'" data-ds="'+ds+'" onclick="event.stopPropagation();wkSlotClick(this)" style="position:absolute;top:'+topPx+'px;left:'+left+'%;width:'+(w-1)+'%;height:'+Math.max(hPx-1,16)+'px;background:'+bg+';opacity:'+op+';color:'+(isEmpty?'#aaa':'#fff')+';border-radius:3px;padding:2px 1px;font-size:'+fontPx+'px;font-weight:600;overflow:hidden;cursor:pointer;line-height:1.2;'+bord+extraStyle+'z-index:'+(hasSel?'2':'1')+';">';
        html+=(star?'<span style="font-size:8px;">'+star+'</span>':'')+memHtml+'</div>';
      });
    });
    html+='</div>';
  });
  html+='</div></div></div>';
  return html;
}

async function joinSlot(slotId,ds){
  // 既に参加済みかチェック
  const{data:exist}=await sb.from('slot_entries').select('id').eq('slot_id',slotId).eq('staff_id',me.id);
  if(exist&&exist.length>0){toast('既に参加しています','err');return;}
  // アルバイト：週上限チェック（その人の設定値を使用）
  if(me.isPart){
    const k=calY+'-'+calM;
    let slot=null;
    Object.values(SC[k]||{}).forEach(slots=>slots.forEach(s=>{if(s.id===slotId)slot=s;}));
    if(slot){
      const slotH=chft(slot.start_time,slot.end_time);
      const slotDate=new Date(ds+'T00:00:00');
      const diffToMon=(slotDate.getDay()+6)%7;
      const wkStart=new Date(slotDate);wkStart.setDate(slotDate.getDate()-diffToMon);wkStart.setHours(0,0,0,0);
      const wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+6);wkEnd.setHours(23,59,59,999);
      // その週の既存シフト時間を集計
      let weekH=0;const counted=new Set();
      Object.entries(SC[k]||{}).forEach(([date,slots])=>{
        const dd=new Date(date+'T00:00:00');if(dd<wkStart||dd>wkEnd)return;
        slots.forEach(s=>{
          if(!(EC[k]?.[s.id]||[]).find(e=>e.staff_id===me.id))return;
          const key=date+'_'+s.start_time+'_'+s.end_time;
          if(counted.has(key))return;counted.add(key);
          weekH+=chft(s.start_time,s.end_time);
        });
      });
      const myS=staff.find(s=>s.id===me.id);
      const maxWk=myS?.max_hours_per_week||20;
      if(weekH+slotH>maxWk){
        toast('この週は最大'+maxWk+'時間までです（現在'+Math.round(weekH*10)/10+'h＋今回'+slotH+'h）','err');
        return;
      }
    }
  }
  const{error}=await sb.from('slot_entries').insert({slot_id:slotId,staff_id:me.id,status:'confirmed'});
  if(error){toast('参加できませんでした','err');return;}
  await logAction('シフト参加',ds,me.name+'が参加');
  toast('シフトに参加しました！');await loadMonth(calY,calM);renderCal();
}

  toast('削除しました');await loadMonth(calY,calM);renderCal();

async function adminAddEnt(slotId,ds){
  const sid=document.getElementById('addsel').value;if(!sid)return;
  const{data:exist}=await sb.from('slot_entries').select('id').eq('slot_id',slotId).eq('staff_id',sid);
  if(exist&&exist.length>0){toast('既に割り当てられています','err');return;}
  // アルバイトの週上限チェック（管理者には警告のみ。DBから直接集計）
  const targetS=staff.find(s=>s.id===sid);
  if(targetS&&targetS.staff_type==='part'){
    // 対象枠の情報
    const{data:thisSlot}=await sb.from('shift_slots').select('*').eq('id',slotId).single();
    if(thisSlot){
      const slotH=chft(thisSlot.start_time,thisSlot.end_time);
      const slotDate=new Date(ds+'T00:00:00');
      const diffToMon=(slotDate.getDay()+6)%7;
      const wkStart=new Date(slotDate);wkStart.setDate(slotDate.getDate()-diffToMon);
      const wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+6);
      const wkStartStr=fd(wkStart),wkEndStr=fd(wkEnd);
      // その週の枠を取得
      const{data:wkSlots}=await sb.from('shift_slots').select('*').gte('date',wkStartStr).lte('date',wkEndStr);
      // この人のエントリを取得
      const{data:myEnts}=await sb.from('slot_entries').select('slot_id').eq('staff_id',sid);
      const myslotIds=new Set((myEnts||[]).map(e=>e.slot_id));
      let weekH=0;const counted=new Set();
      (wkSlots||[]).forEach(s=>{
        if(!myslotIds.has(s.id))return;
        const key=s.date+'_'+s.start_time+'_'+s.end_time;
        if(counted.has(key))return;counted.add(key);
        weekH+=chft(s.start_time,s.end_time);
      });
      const maxWk=targetS.max_hours_per_week||20;
      if(weekH+slotH>maxWk){
        const ok=confirm(targetS.name+'さんは今週'+maxWk+'時間を超えます。\n（現在'+Math.round(weekH*10)/10+'h ＋ 今回'+slotH+'h ＝ '+Math.round((weekH+slotH)*10)/10+'h）\n\n雇用保険の加入義務が発生する可能性があります。\nそれでも割り当てますか？');

  const sName=staff.find(s=>s.id===sid)?.name||'';
  await logAction('割当追加',ds,sName+'を枠に追加');
  toast('追加しました');closeM();await loadMonth(calY,calM);renderCal();

// ════════════════════════════════════════════════════════════
// 代班（シフト交代）
// ════════════════════════════════════════════════════════════
// A：代わりを探す → 候補者を絞り込んで選択
async function openSwapReq(entryId,slotId,ds,slotName){
  openM('<div class="mtit">代わりを探す</div><div class="loading"><span class="spin"></span>候補を確認中…</div>');
  // 対象枠の情報
  const{data:slot}=await sb.from('shift_slots').select('*').eq('id',slotId).single();
  if(!slot){toast('枠が見つかりません','err');closeM();return;}
  const slotH=chft(slot.start_time,slot.end_time);
  // 同タイプのスタッフ（自分以外）
  const sameType=staff.filter(s=>s.staff_type===slot.staff_type&&s.id!==me.id);
  // その日に既にこの人が別の枠に入っていないか＆週上限チェック
  const slotDate=new Date(ds+'T00:00:00');
  const diffToMon=(slotDate.getDay()+6)%7;
  const wkStart=new Date(slotDate);wkStart.setDate(slotDate.getDate()-diffToMon);
  const wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+6);
  const wkStartStr=fd(wkStart),wkEndStr=fd(wkEnd);
  const{data:wkSlots}=await sb.from('shift_slots').select('*').gte('date',wkStartStr).lte('date',wkEndStr);
  const{data:allEnts}=await sb.from('slot_entries').select('slot_id,staff_id');
  // 候補を絞る
  const candidates=[];
  for(const cand of sameType){
    const candSlotIds=new Set((allEnts||[]).filter(e=>e.staff_id===cand.id).map(e=>e.slot_id));
    // 既にこの枠にいる人は除外
    if(candSlotIds.has(slotId))continue;
    // その日に既に別の枠に入っている人は除外（ダブルブッキング防止）
    const sameDaySlot=(wkSlots||[]).find(s=>s.date===ds&&candSlotIds.has(s.id));
    if(sameDaySlot)continue;
    // 週上限チェック
    let weekH=0;const counted=new Set();
    (wkSlots||[]).forEach(s=>{
      if(!candSlotIds.has(s.id))return;
      const key=s.date+'_'+s.start_time+'_'+s.end_time;
      if(counted.has(key))return;counted.add(key);
      weekH+=chft(s.start_time,s.end_time);
    });
    const maxWk=cand.staff_type==='part'?(cand.max_hours_per_week||20):9999;
    if(weekH+slotH>maxWk)continue; // 超える人は除外
    candidates.push({...cand,weekH});
  }
  window._swap={entryId,slotId,ds,slotName,slotH};
  let html='<div class="mtit">代わりを探す（'+ds.slice(5)+' '+slotName+'）</div>';
  html+='<div style="font-size:12px;color:#666;margin-bottom:12px;line-height:1.6;">この時間に代われるスタッフ（その日空いている＆上限以内）から選んでください。相手が同意し、管理者が承認すると交代が成立します。</div>';
  if(candidates.length===0){
    html+='<p class="empty">代われるスタッフがいません<br><span style="font-size:11px;">（全員その日に予定あり、または上限超過）</span></p>';
  }else{
    html+='<div style="font-size:12px;font-weight:700;margin-bottom:8px;">代わってもらう人を選ぶ：</div>';
    candidates.forEach(c=>{
      const sc=staffColorMap[c.id]||'#5a6b7a';
      html+='<button onclick="doSwapReq(\''+c.id+'\',\''+c.name+'\')" style="display:flex;align-items:center;gap:8px;width:100%;background:#f8f6f2;border:1px solid #e0e0e0;border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:pointer;text-align:left;">';
      html+='<span class="av" style="background:'+sc+';">'+c.name[0]+'</span>';
      html+='<span style="font-weight:600;font-size:13px;">'+c.name+'</span>';
      html+='<span style="font-size:11px;color:#888;margin-left:auto;">今週'+(Math.round(c.weekH*10)/10)+'h</span></button>';
    });
  }
  html+='<div class="mbtns"><button class="bsm bgr" onclick="closeM()">閉じる</button></div>';
  openM(html);
}

async function doSwapReq(targetId,targetName){
  const{entryId,slotId,ds,slotName}=window._swap;
  const reason=prompt(targetName+'さんに代わりを依頼します。\n理由を入力してください（任意）：')||'';
  const{error}=await sb.from('swap_requests').insert({
    slot_id:slotId,slot_entry_id:entryId,date:ds,
    requester_id:me.id,requester_name:me.name,
    target_id:targetId,target_name:targetName,
    reason,status:'waiting_b'
  });
  if(error){toast('依頼に失敗しました','err');return;}
  toast(targetName+'さんに代班を依頼しました');closeM();
}

// B：自分宛ての代班依頼を確認・同意
async function renderMySwaps(){
  // 自分が「代わってほしい」と頼まれている依頼
  const{data}=await sb.from('swap_requests').select('*,shift_slots(slot_name,date,start_time,end_time)').eq('target_id',me.id).eq('status','waiting_b').order('created_at',{ascending:false});
  return data||[];
}

async function agreeSwap(swapId,agree){
  if(!agree){
    await sb.from('swap_requests').update({status:'rejected'}).eq('id',swapId);
    toast('依頼を辞退しました');renderMyCancel();return;
  }
  // B同意：上限を再チェック
  const{data:sw}=await sb.from('swap_requests').select('*,shift_slots(*)').eq('id',swapId).single();
  if(!sw){toast('依頼が見つかりません','err');return;}
  const slot=sw.shift_slots;
  const slotH=chft(slot.start_time,slot.end_time);
  const slotDate=new Date(sw.date+'T00:00:00');
  const diffToMon=(slotDate.getDay()+6)%7;
  const wkStart=new Date(slotDate);wkStart.setDate(slotDate.getDate()-diffToMon);
  const wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+6);
  const{data:wkSlots}=await sb.from('shift_slots').select('*').gte('date',fd(wkStart)).lte('date',fd(wkEnd));
  const{data:myEnts}=await sb.from('slot_entries').select('slot_id').eq('staff_id',me.id);
  const mySlotIds=new Set((myEnts||[]).map(e=>e.slot_id));
  let weekH=0;const counted=new Set();
  (wkSlots||[]).forEach(s=>{
    if(!mySlotIds.has(s.id))return;
    const key=s.date+'_'+s.start_time+'_'+s.end_time;
    if(counted.has(key))return;counted.add(key);
    weekH+=chft(s.start_time,s.end_time);
  });
  const myS=staff.find(s=>s.id===me.id);
  const maxWk=myS?.staff_type==='part'?(myS.max_hours_per_week||20):9999;
  if(weekH+slotH>maxWk){
    toast('この週は最大'+maxWk+'時間までです。代われません','err');return;
  }
  await sb.from('swap_requests').update({status:'waiting_admin',b_agreed:true,b_agreed_at:new Date().toISOString()}).eq('id',swapId);
  toast('同意しました。管理者の承認待ちです');renderMyCancel();refreshPendingCount();
}

async function doLeave(){
  const date=document.getElementById('lvdate').value;
  const type=document.getElementById('lvtype').value;
  const dur=document.getElementById('lvdur').value;
  const reason=document.getElementById('lvreason').value;
  if(!date){toast('日付を選択してください','err');return;}

}

  const[lr,cr,sr]=await Promise.all([

      html+='<span class="av" style="background:'+stColor+';">'+(l.shift_staff?.name?.[0]||'?')+'</span>';
      html+='<div><div style="font-weight:700;font-size:13px;">'+(l.shift_staff?.name||'?')+' <span style="font-size:10px;color:#7a9b76;font-weight:600;">休暇申請</span></div>';
      html+='<div style="font-size:11px;color:#666;">'+l.date+'　'+(LT[l.leave_type]||l.leave_type)+'　'+durStr+'</div></div>';
      html+='<span class="badge '+sc+'" style="margin-left:auto;">'+sl+'</span></div>';
      if(l.reason)html+='<div style="font-size:12px;color:#666;margin-bottom:8px;">理由：'+l.reason+'</div>';
      if(l.status==='pending'){
        html+='<div style="display:flex;gap:7px;"><button class="bsm bg" onclick="appLeave(\''+l.id+'\')">承認</button><button class="bsm br" onclick="rejLeave(\''+l.id+'\')">却下</button></div>';
      }else if(l.approved_by){
        html+='<div style="font-size:11px;color:#999;margin-top:4px;">'+(l.status==='approved'?'承認':'却下')+'：'+l.approved_by+'</div>';
      }
      html+='</div>';
    }
  });
  wrap.innerHTML=html;
}

async function appSwap(swapId){
  const{data:sw}=await sb.from('swap_requests').select('*').eq('id',swapId).single();
  if(!sw){toast('依頼が見つかりません','err');return;}
  // A を枠から外す
  if(sw.slot_entry_id){await sb.from('slot_entries').delete().eq('id',sw.slot_entry_id);}
  // B を枠に入れる（重複チェック）
  const{data:exist}=await sb.from('slot_entries').select('id').eq('slot_id',sw.slot_id).eq('staff_id',sw.target_id);
  if(!exist||exist.length===0){
    await sb.from('slot_entries').insert({slot_id:sw.slot_id,staff_id:sw.target_id,status:'confirmed'});
  }
  await sb.from('swap_requests').update({status:'approved',approved_by:me.name,approved_at:new Date().toISOString()}).eq('id',swapId);
  await logAction('代班承認',sw.date,sw.requester_name+'→'+sw.target_name+'の交代を承認');
  toast('交代を承認しました');renderRequests();refreshPendingCount();await loadMonth(calY,calM);
}

}

// ── 週シフト表を画像出力（横向き・名前のみ・LINE共有用）──
async function exportWeekImage(){
  toast('画像を作成中…');
  const today=new Date();
  const diffToMon=(today.getDay()+6)%7;
  const sw=new Date(today);sw.setDate(today.getDate()-diffToMon+wOff*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sw);d.setDate(d.getDate()+i);return d;});
  const ts=fd(today);
  const months=new Set();
  days.forEach(d=>months.add(d.getFullYear()+'-'+d.getMonth()));
  for(const mk of months){const[yy,mm]=mk.split('-').map(Number);await loadMonth(yy,mm);}

  const START_H=8,END_H=22,HOUR_H=42;
  // 出力専用の大きな横向きDOMを生成
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-99999px;top:0;width:1400px;background:#fff;padding:24px;font-family:\'Hiragino Kaku Gothic ProN\',sans-serif;';
  let html='<div style="font-size:24px;font-weight:800;color:#5a6b7a;margin-bottom:4px;">Café La Petite Haku　シフト表</div>';
  html+='<div style="font-size:15px;color:#888;margin-bottom:16px;">'+fd(days[0])+'　〜　'+fd(days[6])+'</div>';
  html+='<div style="display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;">';
  // 時間軸列
  html+='<div style="width:54px;flex-shrink:0;">';
  html+='<div style="height:44px;background:#5a6b7a;"></div>';
  for(let h=START_H;h<END_H;h++){
    html+='<div style="height:'+HOUR_H+'px;border-top:1px solid #eee;font-size:12px;color:#999;text-align:center;padding-top:2px;">'+String(h).padStart(2,'0')+':00</div>';
  }
  html+='</div>';
  // 各曜日列
  const k=calY+'-'+calM;
  days.forEach(d=>{
    const ds=fd(d);
    const mk=d.getFullYear()+'-'+d.getMonth();
    const sm2=SC[mk]||{},em2=EC[mk]||{};
    const dow=d.getDay();
    const isT=ds===ts;
    const headBg=isT?'#c9b896':(dow===0?'#c98a8a':dow===6?'#8a9ec9':'#5a6b7a');
    html+='<div style="flex:1;border-left:1px solid #eee;position:relative;">';
    html+='<div style="height:44px;background:'+headBg+';color:#fff;text-align:center;display:flex;flex-direction:column;justify-content:center;">';
    html+='<div style="font-size:13px;">'+DJP_MON[(dow+6)%7]+'</div><div style="font-size:17px;font-weight:800;">'+(d.getMonth()+1)+'/'+d.getDate()+'</div></div>';
    html+='<div style="position:relative;height:'+((END_H-START_H)*HOUR_H)+'px;">';
    for(let h=0;h<END_H-START_H;h++){
      html+='<div style="position:absolute;top:'+(h*HOUR_H)+'px;left:0;right:0;height:1px;background:#f0f0f0;"></div>';
    }
    const daySlots=(sm2[ds]||[]).slice().sort((a,b)=>a.start_time.localeCompare(b.start_time));
    const cols=[];
    daySlots.forEach(slot=>{
      const ss=parseInt(slot.start_time.slice(0,2))*60+parseInt(slot.start_time.slice(3,5));
      const se=parseInt(slot.end_time.slice(0,2))*60+parseInt(slot.end_time.slice(3,5));
      let placed=false;
      for(const c of cols){if(c.every(x=>x.se<=ss||x.ss>=se)){c.push({slot,ss,se});placed=true;break;}}
      if(!placed)cols.push([{slot,ss,se}]);
    });
    const nCol=Math.max(1,cols.length);
    cols.forEach((col,ci)=>{
      col.forEach(({slot,ss,se})=>{
        const topY=((ss/60)-START_H)*HOUR_H;
        const hH=((se-ss)/60)*HOUR_H;
        if(topY<-5||topY>(END_H-START_H)*HOUR_H)return;
        const w=100/nCol;
        const left=ci*w;
        const isFull=slot.staff_type==='full';
        const baseBg=isFull?'#a3b5c4':'#aec0a8';
        const ents=em2[slot.id]||[];
        let mem='';
        if(ents.length===0)mem='<span style="opacity:.6;font-size:11px;">空き</span>';
        else mem=ents.map(e=>'<div style="background:rgba(255,255,255,.3);border-radius:3px;padding:1px 4px;margin-bottom:2px;font-size:13px;font-weight:700;">'+(e.shift_staff?.name||'?')+'</div>').join('');
        html+='<div style="position:absolute;top:'+topY+'px;left:'+left+'%;width:'+(w-1)+'%;height:'+Math.max(hH-2,20)+'px;background:'+baseBg+';color:#fff;border-radius:4px;padding:3px 3px;overflow:hidden;border-left:3px solid rgba(0,0,0,.2);">';
        html+='<div style="font-size:10px;opacity:.9;margin-bottom:2px;">'+slot.start_time.slice(0,5)+'-'+slot.end_time.slice(0,5)+'</div>'+mem+'</div>';
      });
    });
    html+='</div></div>';
  });
  html+='</div>';
  html+='<div style="margin-top:12px;font-size:12px;color:#aaa;">🟦 正社員　🟩 アルバイト</div>';
  wrap.innerHTML=html;
  document.body.appendChild(wrap);

  try{
    const canvas=await html2canvas(wrap,{scale:2,backgroundColor:'#fff',logging:false});
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='haku-shift-'+fd(days[0])+'.png';
      document.body.appendChild(a);a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('シフト表を画像で保存しました');
    },'image/png');
  }catch(e){
    toast('画像の作成に失敗しました','err');
  }finally{
    document.body.removeChild(wrap);
  }
}

async function doEditStaff(id){
  const name=document.getElementById('esn').value.trim(),stype=document.getElementById('est').value;
  if(!name){toast('名前を入力してください','err');return;}
  const roleV=stype==='owner'?'owner':stype==='manager'?'manager':stype==='full'?'full':'part';
  const stypeV=(stype==='manager'||stype==='owner')?'full':stype;
  const isPart=stype==='part';
  const maxWeek=isPart?(parseInt(document.getElementById('eswk').value)||20):0;
  const maxH=!isPart?(parseInt(document.getElementById('esm').value)||0):0;
  const{error}=await sb.from('shift_staff').update({name,staff_type:stypeV,role:roleV,max_hours:maxH,max_hours_per_week:maxWeek}).eq('id',id);
  if(error){toast('更新に失敗しました','err');return;}
  staff=staff.map(s=>s.id===id?{...s,name,staff_type:stypeV,role:roleV,max_hours:maxH,max_hours_per_week:maxWeek}:s);
  allStaff=allStaff.map(s=>s.id===id?{...s,name,staff_type:stypeV,role:roleV,max_hours:maxH,max_hours_per_week:maxWeek}:s);
  buildStaffColorMap();closeM();toast('更新しました');renderAdmin();
}
async function togglePerm(id,val){
  val=val==='true'||val===true;
  const{error}=await sb.from('shift_staff').update({can_manage_shift:val}).eq('id',id);
  if(error){toast('更新に失敗しました','err');return;}
  staff=staff.map(s=>s.id===id?{...s,can_manage_shift:val}:s);
  allStaff=allStaff.map(s=>s.id===id?{...s,can_manage_shift:val}:s);
  const sName=staff.find(s=>s.id===id)?.name||'';
  await logAction('権限変更',null,sName+'の管理権限を'+(val?'ON':'OFF'));
  toast('権限を更新しました');renderAdmin();
}
async function delStaff(id,name){
  if(!confirm(name+' を完全に削除します。\n\n⚠ 過去のシフト表からもこの人の名前が消えます。\n履歴を残したい場合は「離職」を使ってください。\n\n本当に完全削除しますか？'))return;
  await sb.from('shift_staff').delete().eq('id',id);
  allStaff=allStaff.filter(s=>s.id!==id);
  staff=staff.filter(s=>s.id!==id);buildStaffColorMap();
  toast(name+' を完全に削除しました');renderAdmin();
}
// 離職：データは残す（過去のシフト表に名前が残る）。現役名簿・ログイン・排班候補から外れる
async function retireStaff(id,name){
  if(!confirm(name+' を離職にします。\n\n・登録済みのシフト表（過去・未来とも）には名前が残ります\n・今後あたらしく排班する際の選択肢には出てきません\n・ログインできなくなります\n・あとで「復職」できます\n\nよろしいですか？'))return;
  const{error}=await sb.from('shift_staff').update({is_active:false}).eq('id',id);
  if(error){toast('処理に失敗しました','err');return;}
  allStaff=allStaff.map(s=>s.id===id?{...s,is_active:false}:s);
  staff=staff.filter(s=>s.id!==id);
  await logAction('スタッフ離職',null,name+'を離職に設定');
  toast(name+' を離職にしました');renderAdmin();
}
async function reactivateStaff(id,name){
  if(!confirm(name+' を復職させますか？'))return;
  const{error}=await sb.from('shift_staff').update({is_active:true}).eq('id',id);
  if(error){toast('処理に失敗しました','err');return;}
  allStaff=allStaff.map(s=>s.id===id?{...s,is_active:true}:s);
  staff=allStaff.filter(s=>s.is_active!==false);
  buildStaffColorMap();
  await logAction('スタッフ復職',null,name+'を復職');
  toast(name+' を復職しました');window._showRetired=false;renderAdmin();
}
function openSetPW(id){
  const s=staff.find(x=>x.id===id);
  window._pwId=id;
  openM('<div class="mtit">'+(s?.name||'')+' のパスワード設定</div><div class="fcol">'
    +'<div><span class="flabel">新しいパスワード</span><input type="password" id="spn"/></div>'
    +'<div><span class="flabel">確認</span><input type="password" id="spc"/></div>'
    +'</div><div class="mbtns"><button class="bsm bg" onclick="doSetPW(window._pwId)">設定</button><button class="bsm bgr" onclick="closeM()">キャンセル</button></div>');
}
async function doSetPW(id){
  const nw=document.getElementById('spn').value,cnf=document.getElementById('spc').value;
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_staff').update({password:nw}).eq('id',id);
  staff=staff.map(s=>s.id===id?{...s,password:nw}:s);allStaff=allStaff.map(s=>s.id===id?{...s,password:nw}:s);closeM();toast('設定しました');renderAdmin();
}
function openSelfPW(){
  openM('<div class="mtit">パスワード変更</div><div class="fcol">'
    +'<div><span class="flabel">現在のパスワード</span><input type="password" id="mpc"/></div>'
    +'<div><span class="flabel">新しいパスワード</span><input type="password" id="mpn"/></div>'
    +'<div><span class="flabel">確認</span><input type="password" id="mpcf"/></div>'
    +'</div><div class="mbtns"><button class="bsm bg" onclick="doSelfPW()">変更</button><button class="bsm bgr" onclick="closeM()">キャンセル</button></div>');
}
async function doSelfPW(){
  const cur=document.getElementById('mpc').value,nw=document.getElementById('mpn').value,cnf=document.getElementById('mpcf').value;
  const myS=staff.find(s=>s.id===me.id);
  if(cur!==(myS?.password||'0000')){toast('現在のパスワードが違います','err');return;}
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_staff').update({password:nw}).eq('id',me.id);
  staff=staff.map(s=>s.id===me.id?{...s,password:nw}:s);closeM();toast('変更しました');
}
async function saveSettings(){
  const ins=parseInt(document.getElementById('sins').value)||20;
  await sb.from('shift_settings').upsert({id:1,insurance_threshold_weekly:ins,admin_password:APW});
  settings={...settings,insurance_threshold_weekly:ins};
  toast('保存しました');
}
async function changeAdminPW(){
  const cur=document.getElementById('pwcur').value,nw=document.getElementById('pwnew').value,cnf=document.getElementById('pwcnf').value;
  if(cur!==APW){toast('現在のパスワードが違います','err');return;}
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_settings').upsert({id:1,admin_password:nw,insurance_threshold_weekly:settings.insurance_threshold_weekly||20});
  APW=nw;['pwcur','pwnew','pwcnf'].forEach(id=>document.getElementById(id).value='');
  toast('変更しました');
}

// ── 初期化 ──
document.getElementById('admpw').addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin();});
loadAll();
