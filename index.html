<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#222;background:#f5f3ef;}
.page{position:fixed;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;background:#f5f3ef;}
.page.show{display:block;}
#p-login{background:linear-gradient(135deg,#5a6b7a 0%,#7a8b73 100%);display:none;align-items:center;justify-content:center;padding:20px;z-index:30;}
#p-login.show{display:flex;}
#p-cal,#p-leave,#p-mycancel,#p-requests,#p-admin{top:52px;}
#hdr{position:fixed;top:0;left:0;right:0;height:52px;background:#5a6b7a;color:#fff;display:none;align-items:center;justify-content:space-between;padding:0 10px;z-index:100;}
#hdr.show{display:flex;}
.hlogo{font-weight:800;font-size:10px;color:#c9b896;line-height:1.25;max-width:78px;flex-shrink:0;}
.huser{font-size:10px;color:rgba(255,255,255,.7);margin-left:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hnav{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.hbtn{padding:5px 7px;background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:6px;color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;position:relative;}
.hbtn.on{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.5);}
.hout{padding:4px 6px;background:transparent;border:none;color:rgba(255,255,255,.4);font-size:11px;cursor:pointer;}
.ndot{position:absolute;top:-3px;right:-3px;background:#b5654a;color:#fff;font-size:8px;font-weight:700;min-width:14px;height:14px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.lcard{background:#fff;border-radius:18px;padding:28px 22px;width:100%;max-width:370px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.lwrap{text-align:center;margin-bottom:22px;}
.lmark{display:block;width:50px;height:50px;line-height:50px;border-radius:50%;background:#5a6b7a;color:#c9b896;font-size:22px;font-weight:800;margin:0 auto 10px;}
.lname{font-weight:700;font-size:15px;color:#5a6b7a;display:block;}
.lsub{font-size:11px;color:#888;margin-top:3px;letter-spacing:2px;display:block;}
.tbar{display:flex;border-radius:8px;overflow:hidden;border:1px solid #e0e0e0;margin-bottom:16px;}
.tbtn{flex:1;padding:9px 0;background:#f8f6f2;border:none;cursor:pointer;font-size:13px;color:#666;font-weight:600;}
.tbtn.on{background:#5a6b7a;color:#fff;}
.tpane{display:none;}
.tpane.on{display:block;}
.wrap{max-width:520px;margin:0 auto;padding:14px 12px 90px;}
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px;}
.stitle{font-weight:800;font-size:14px;color:#5a6b7a;margin-bottom:12px;}
.fcol{display:flex;flex-direction:column;gap:10px;}
input,select,textarea{padding:9px 11px;border-radius:8px;border:1px solid #d0d0d0;font-size:14px;outline:none;background:#fafafa;color:#222;width:100%;font-family:inherit;}
textarea{resize:vertical;min-height:60px;}
.flabel{font-size:12px;color:#666;margin-bottom:3px;display:block;font-weight:600;}
.btn{padding:11px 0;background:#5a6b7a;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;width:100%;}
.bsm{padding:5px 11px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:700;}
.bg{background:#6b8268;color:#fff;}
.br{background:#a8584a;color:#fff;}
.bd{background:#5a6b7a;color:#fff;}
.bgr{background:#ddd;color:#555;}
.bgold{background:#c9b896;color:#5a6b7a;}
.empty{text-align:center;color:#999;font-size:13px;padding:18px 0;line-height:1.8;}
.av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0;color:#fff;}
.prog{height:6px;border-radius:99px;background:#eee;overflow:hidden;margin:5px 0;}
.progf{height:100%;border-radius:99px;}
.warn{background:#fdecea;border:1px solid #b5654a;border-radius:8px;padding:8px 11px;font-size:11px;color:#922b21;margin-top:8px;font-weight:600;}
.hint{font-size:11px;color:#888;line-height:1.6;}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;}
.bp{background:#fef3cd;color:#856404;}
.ba{background:#d4edda;color:#155724;}
.brej{background:#f8d7da;color:#721c24;}
.perm-badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;}
.perm-on{background:#d4edda;color:#155724;}
.perm-off{background:#f1f1f1;color:#aaa;}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mtitle{font-weight:800;font-size:17px;color:#5a6b7a;cursor:pointer;border-bottom:1px dashed #aaa;}
.arr{background:#fff;border:1px solid #ddd;border-radius:6px;font-size:18px;cursor:pointer;color:#5a6b7a;padding:3px 10px;line-height:1.4;}
.tbtn2{padding:4px 11px;background:#c9b896;color:#5a6b7a;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;}
.vtabs{display:flex;gap:4px;margin-bottom:10px;}
.vt{flex:1;padding:8px 0;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:13px;font-weight:600;color:#666;cursor:pointer;text-align:center;}
.vt.on{background:#5a6b7a;color:#fff;border-color:#5a6b7a;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:10px;}
.dh{text-align:center;font-size:10px;font-weight:700;padding:4px 0;}
.cd{border:1px solid #e8e8e8;border-radius:6px;padding:3px 2px 2px;min-height:64px;cursor:pointer;display:flex;flex-direction:column;background:#fff;overflow:hidden;}
.cd.sel{border-color:#5a6b7a;box-shadow:0 0 0 2px #5a6b7a;}
.cd.tod{background:#fef9e7;}
.cdn{font-size:11px;font-weight:700;line-height:1;margin-bottom:2px;}
.chip{font-size:8px;padding:1px 3px;border-radius:3px;margin-bottom:1px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;}
.dp{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.dptitle{font-weight:800;font-size:15px;color:#5a6b7a;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #f0ede8;}
.slabel{font-size:12px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.scard{border-radius:10px;padding:11px 13px;margin-bottom:8px;border:1px solid #e0e0e0;}
.scard.part-s{background:#eef2ec;border-color:#cdd9c8;}
.scard.full-s{background:#ecf0f3;border-color:#c4d0db;}
.shed{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.sname{font-weight:700;font-size:14px;color:#5a6b7a;}
.stime{font-size:12px;color:#555;font-weight:600;}
.scap{font-size:11px;color:#888;margin-bottom:7px;}
.smems{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;min-height:24px;}
.mtag{display:flex;align-items:center;gap:4px;background:#fff;border:1.5px solid #ddd;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;}
.mtag.me{background:#c9b896;border-color:#c9b896;color:#5a6b7a;}
.sacts{display:flex;gap:6px;flex-wrap:wrap;}
.joinbtn{padding:6px 15px;background:#6b8268;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;}
.leg{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.legitem{display:flex;align-items:center;gap:4px;font-size:10px;color:#555;}
.legdot{width:11px;height:11px;border-radius:3px;}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.mbg.show{display:flex;}
.mbox{background:#fff;border-radius:18px 18px 0 0;padding:22px 18px 40px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
.mtit{font-weight:800;font-size:15px;color:#5a6b7a;margin-bottom:14px;}
.mbtns{display:flex;gap:8px;margin-top:16px;}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;color:#fff;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none;white-space:nowrap;max-width:90vw;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#5a6b7a;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
.loading{text-align:center;color:#aaa;font-size:13px;padding:30px 0;}
.reqcard{background:#fff;border-radius:12px;padding:13px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #c9b896;}
.reqcard.leave-r{border-left-color:#7a9b76;}
.reqcard.cancel-r{border-left-color:#c08552;}
.seg{display:flex;gap:4px;margin-bottom:12px;}
.segb{flex:1;padding:7px 0;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:12px;font-weight:600;color:#666;cursor:pointer;text-align:center;}
.segb.on{background:#5a6b7a;color:#fff;border-color:#5a6b7a;}
.wk-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #e8e8e8;border-radius:10px;}
.logrow{font-size:11px;color:#666;padding:7px 0;border-bottom:1px solid #f0f0f0;line-height:1.5;}
.logrow:last-child{border-bottom:none;}
</style>
</head>
<body>
<div id="toast"></div>

<div id="hdr">
  <div style="display:flex;align-items:center;gap:4px;min-width:0;flex:1;overflow:hidden;">
    <span class="hlogo">Café La<br>Petite Haku</span>
    <span class="huser" id="huser"></span>
  </div>
  <div class="hnav">
    <button class="hbtn on" id="nb-cal" onclick="nav('cal')" title="シフト表">📅</button>
    <button class="hbtn" id="nb-leave" onclick="nav('leave')" title="休暇申請" style="display:none;">🌿</button>
    <button class="hbtn" id="nb-mycancel" onclick="nav('mycancel')" title="申請状況" style="display:none;">↩️</button>
    <button class="hbtn" id="nb-requests" onclick="nav('requests')" title="申請確認" style="display:none;">📋<span class="ndot" id="reqdot" style="display:none;">0</span></button>
    <button class="hbtn" id="nb-admin" onclick="nav('admin')" title="管理" style="display:none;">⚙</button>
    <button class="hout" onclick="logout()">退出</button>
  </div>
</div>

<div id="p-login" class="page show">
  <div class="lcard">
    <div class="lwrap">
      <span class="lmark">H</span>
      <span class="lname">Café La Petite Haku</span>
      <span class="lsub">シフト管理</span>
    </div>
    <div class="tbar">
      <button class="tbtn on" onclick="ltab('staff')">スタッフ</button>
      <button class="tbtn" onclick="ltab('admin')">管理者</button>
    </div>
    <div id="lt-staff" class="tpane on">
      <div id="slogin"><div class="loading"><span class="spin"></span>読み込み中…</div></div>
    </div>
    <div id="lt-admin" class="tpane">
      <div class="fcol">
        <input type="password" id="admpw" placeholder="管理者パスワード"/>
        <button class="btn" onclick="doAdminLogin()">ログイン</button>
      </div>
    </div>
  </div>
</div>

<div id="p-cal" class="page"><div class="wrap" id="wcal"></div></div>
<div id="p-leave" class="page"><div class="wrap" id="wleave"></div></div>
<div id="p-mycancel" class="page"><div class="wrap" id="wmycancel"></div></div>
<div id="p-requests" class="page"><div class="wrap" id="wrequests"></div></div>
<div id="p-admin" class="page"><div class="wrap" id="wadmin"></div></div>

<div id="mbg" class="mbg" onclick="if(event.target===this)closeM()">
  <div class="mbox" id="mbox"></div>
</div>

<script>
// ── 設定 ──
const SBU='https://hqddrswyqmammuwwrvna.supabase.co';
const SBK='sb_publishable_766-Q62xxyGNiARJhTg13A_lb7YxuEQ';
const sb=supabase.createClient(SBU,SBK);
const STAFF_COLORS=['#7a8b73','#6e8a9a','#9a7d8c','#a8847a','#8a9a7d','#7d8a9a',
  '#8c9a8a','#9a8c7d','#7a7d8c','#9a8a9a','#6b8a82','#a8927d','#82967a',
  '#8a7d9a','#7d8a82','#6b8278','#8a7a82','#7a8278','#82887a','#788290'];
const DJP_MON=['月','火','水','木','金','土','日'];
const LT={paid:'有給休暇',sick:'病欠',mourning:'忌引き',unpaid:'無給休暇'};
const DUR={full:'全日',half_am:'午前半休',half_pm:'午後半休',custom:'時間指定'};

// ── 状態 ──
let APW='haku2026';
let me=null;
let staff=[],settings={insurance_threshold_weekly:20};
let calY=new Date().getFullYear(),calM=new Date().getMonth(),selDay=null,calView='month',wOff=0;
let SC={},EC={};
let staffColorMap={};
let pendingCount=0;

// ── ユーティリティ ──
function toast(m,t='ok'){
  const e=document.getElementById('toast');
  e.textContent=m;e.style.background=t==='err'?'#a8584a':'#6b8268';
  e.style.display='block';clearTimeout(window._tt);
  window._tt=setTimeout(()=>e.style.display='none',2800);
}
function openM(h){document.getElementById('mbox').innerHTML=h;document.getElementById('mbg').classList.add('show');}
function closeM(){document.getElementById('mbg').classList.remove('show');}
function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function chft(s,e){const[sh,sm]=s.split(':').map(Number);const[eh,em]=e.split(':').map(Number);return Math.max(0,(eh*60+em-sh*60-sm)/60);}
function roleLabel(s){return s.role==='owner'?'オーナー':s.role==='manager'?'店長':s.staff_type==='full'?'正社員':'アルバイト';}
function buildStaffColorMap(){staffColorMap={};staff.forEach((s,i)=>staffColorMap[s.id]=STAFF_COLORS[i%STAFF_COLORS.length]);}

// ── ページナビ ──
function showP(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.hbtn').forEach(b=>b.classList.remove('on'));
  if(name==='login'){
    document.getElementById('p-login').classList.add('show');
    document.getElementById('hdr').classList.remove('show');
  } else {
    document.getElementById('p-'+name).classList.add('show');
    document.getElementById('hdr').classList.add('show');
    const nb=document.getElementById('nb-'+name);if(nb)nb.classList.add('on');
  }
}
function nav(name){
  showP(name);
  if(name==='cal')renderCal();
  else if(name==='leave')renderLeave();
  else if(name==='mycancel')renderMyCancel();
  else if(name==='requests')renderRequests();
  else if(name==='admin')renderAdmin();
}
function ltab(n){
  document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('on',['staff','admin'][i]===n));
  document.querySelectorAll('.tpane').forEach(p=>p.classList.remove('on'));
  document.getElementById('lt-'+n).classList.add('on');
}

// ── データ読み込み ──
async function loadAll(){
  const{data,error}=await sb.from('shift_staff').select('*').order('created_at');
  if(error){document.getElementById('slogin').innerHTML='<p style="color:red;font-size:12px;padding:10px;">読み込みエラー: '+error.message+'</p>';return;}
  staff=data||[];
  buildStaffColorMap();
  renderSlogin();
  const{data:sd}=await sb.from('shift_settings').select('*').eq('id',1).single();
  if(sd){settings=sd;if(sd.admin_password)APW=sd.admin_password;}
}

async function loadMonth(y,m){
  const from=y+'-'+String(m+1).padStart(2,'0')+'-01';
  const to=y+'-'+String(m+1).padStart(2,'0')+'-'+new Date(y,m+1,0).getDate();
  const k=y+'-'+m;
  const[sr,er]=await Promise.all([
    sb.from('shift_slots').select('*').gte('date',from).lte('date',to).order('start_time'),
    sb.from('slot_entries').select('*,shift_staff(id,name,staff_type,role)')
  ]);
  const sm={};(sr.data||[]).forEach(s=>{if(!sm[s.date])sm[s.date]=[];sm[s.date].push(s);});
  SC[k]=sm;
  const em={};(er.data||[]).forEach(e=>{if(!em[e.slot_id])em[e.slot_id]=[];em[e.slot_id].push(e);});
  EC[k]=em;
}

// 週合計時数（月曜始まり）
function getWeeklyH(staffId){
  const k=calY+'-'+calM,sm=SC[k]||{},em=EC[k]||{};
  const today=new Date();
  const diffToMon=(today.getDay()+6)%7;
  const ws=new Date(today);ws.setDate(today.getDate()-diffToMon+wOff*7);ws.setHours(0,0,0,0);
  const we=new Date(ws);we.setDate(ws.getDate()+6);we.setHours(23,59,59,999);
  let total=0;
  Object.entries(sm).forEach(([date,slots])=>{
    const d=new Date(date+'T00:00:00');if(d<ws||d>we)return;
    slots.forEach(slot=>{
      if((em[slot.id]||[]).find(e=>e.staff_id===staffId))total+=chft(slot.start_time,slot.end_time);
    });
  });
  return Math.round(total*10)/10;
}
// 月合計時数
function getMonthlyH(staffId){
  const k=calY+'-'+calM,sm=SC[k]||{},em=EC[k]||{};
  let total=0;
  Object.values(sm).forEach(slots=>slots.forEach(slot=>{
    if((em[slot.id]||[]).find(e=>e.staff_id===staffId))total+=chft(slot.start_time,slot.end_time);
  }));
  return Math.round(total*10)/10;
}

// 監査ログ記録
async function logAction(action,targetDate,detail){
  if(!me)return;
  await sb.from('audit_log').insert({
    actor_id:me.id==='admin'?null:me.id,
    actor_name:me.name,
    actor_role:me.srole==='owner'?'Owner':'Manager',
    action,target_date:targetDate||null,detail
  });
}

// ── 認証 ──
function renderSlogin(){
  const el=document.getElementById('slogin');if(!el)return;
  if(staff.length===0){el.innerHTML='<p class="empty">スタッフが登録されていません<br>管理者がスタッフを追加してください</p>';return;}
  let html='<div class="fcol">';
  html+='<select id="ssel" style="font-size:14px;padding:11px;"><option value="">スタッフを選択…</option>';
  staff.forEach(s=>{
    const lbl=s.role==='owner'?' 【オーナー】':s.role==='manager'?' 【店長】':s.staff_type==='full'?' 【正社員】':'';
    html+='<option value="'+s.id+'">'+s.name+lbl+'</option>';
  });
  html+='</select><input type="password" id="spw" placeholder="パスワード（初期：0000）"/>';
  html+='<button class="btn" onclick="doStaffLogin()">ログイン</button></div>';
  el.innerHTML=html;
  const spwEl=document.getElementById('spw');
  if(spwEl)spwEl.addEventListener('keydown',e=>{if(e.key==='Enter')doStaffLogin();});
}

function doStaffLogin(){
  const id=document.getElementById('ssel').value,pw=document.getElementById('spw').value;
  if(!id){toast('スタッフを選択してください','err');return;}
  const s=staff.find(x=>x.id===id);
  if(!s||pw!==(s.password||'0000')){toast('パスワードが違います','err');return;}
  const isOwnerRole=s.role==='owner';
  const isManagerRole=s.role==='manager';
  const canManage=s.can_manage_shift||isManagerRole||isOwnerRole;
  const _isPart=s.staff_type==='part';
  me={id:s.id,name:s.name,stype:s.staff_type||'part',srole:s.role||'part',
      canManage,isPart:_isPart};
  const roleDisp=isOwnerRole?'・オーナー':isManagerRole?'・店長':s.staff_type==='full'?'・正社員':'・バイト';
  document.getElementById('huser').textContent=s.name+roleDisp;
  applyNav();
  showP('cal');renderCal();
  refreshPendingCount();
}

function doAdminLogin(){
  const pw=document.getElementById('admpw').value;
  if(pw!==APW){toast('パスワードが違います','err');return;}
  me={id:'admin',name:'管理者',stype:'full',srole:'owner',canManage:true,isPart:false};
  document.getElementById('huser').textContent='管理者';
  applyNav();
  showP('cal');renderCal();
  refreshPendingCount();
}

// ナビ表示制御：管理権限者は全員と同じ画面＋申請確認
function applyNav(){
  document.getElementById('nb-admin').style.display=me.canManage?'block':'none';
  document.getElementById('nb-requests').style.display=me.canManage?'block':'none';
  // 休暇申請：正社員のみ（管理者でない一般正社員も）。アルバイトは表示しない
  document.getElementById('nb-leave').style.display=(!me.isPart&&me.id!=='admin')?'block':'none';
  // アルバイト：取消申請状況
  document.getElementById('nb-mycancel').style.display=(me.isPart&&me.id!=='admin')?'block':'none';
}

async function refreshPendingCount(){
  if(!me||!me.canManage){return;}
  const[lr,cr]=await Promise.all([
    sb.from('leave_requests').select('id').eq('status','pending'),
    sb.from('cancel_requests').select('id').eq('status','pending')
  ]);
  pendingCount=((lr.data||[]).length)+((cr.data||[]).length);
  const dot=document.getElementById('reqdot');
  if(dot){
    if(pendingCount>0){dot.style.display='flex';dot.textContent=pendingCount;}
    else dot.style.display='none';
  }
}

async function renderCal(){
  const wrap=document.getElementById('wcal');
  wrap.innerHTML='<div class="loading"><span class="spin"></span>読み込み中…</div>';
  await loadMonth(calY,calM);
  const k=calY+'-'+calM,sm=SC[k]||{},em=EC[k]||{};
  let html='';

  // 自分のサマリー（管理者ログイン以外）
  if(me.id!=='admin'){
    const myMH=getMonthlyH(me.id);
    if(me.isPart){
      const wkH=getWeeklyH(me.id);
      const myS=staff.find(s=>s.id===me.id);
      const maxWk=myS?.max_hours_per_week||settings.insurance_threshold_weekly||20;
      const pct=Math.min(wkH/maxWk*100,100);
      const over=wkH>=maxWk;
      const near=wkH>=maxWk*0.85;
      const fc=over?'#a8584a':near?'#c08552':'#6b8268';
      const wkLabel=wOff===0?'今週':wOff===1?'来週':wOff===-1?'先週':(wOff>0?wOff+'週後':Math.abs(wOff)+'週前');
      html+='<div class="card">';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:12px;color:#666;">'+wkLabel+'のシフト時間</span><span style="font-size:13px;font-weight:700;color:'+fc+';">'+wkH+'h / '+maxWk+'h</span></div>';
      html+='<div class="prog"><div class="progf" style="width:'+pct+'%;background:'+fc+';"></div></div>';
      html+='<div style="display:flex;justify-content:space-between;"><span style="font-size:12px;color:#666;">今月のシフト合計</span><span style="font-size:13px;font-weight:600;color:#5a6b7a;">'+myMH+'h</span></div>';
      if(over)html+='<div class="warn">⚠ 今週'+wkH+'h — 週'+maxWk+'時間を超えています。雇用保険の加入義務が発生する可能性があります。</div>';
      else if(near)html+='<div class="warn" style="background:#fef9e7;border-color:#f0c040;color:#7d6608;">今週'+wkH+'h — 週'+maxWk+'時間の上限に近づいています。</div>';
      html+='<div style="text-align:right;margin-top:6px;"><button onclick="openSelfPW()" style="background:none;border:none;color:#aaa;font-size:10px;cursor:pointer;text-decoration:underline;">🔑 パスワード変更</button></div>';
      html+='</div>';
    } else {
      const myFS=staff.find(s=>s.id===me.id);
      const wkH40=getWeeklyH(me.id);
      const maxMon=(myFS?.max_hours)||160;
      html+='<div class="card">';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:12px;color:#666;">今週のシフト時間</span><span style="font-size:13px;font-weight:700;color:'+(wkH40>40?'#a8584a':'#5a6b7a')+';">'+wkH40+'h / 40h</span></div>';
      const pctW=Math.min(wkH40/40*100,100);
      html+='<div class="prog"><div class="progf" style="width:'+pctW+'%;background:'+(wkH40>40?'#a8584a':'#7a8b73')+';"></div></div>';
      html+='<div style="display:flex;justify-content:space-between;"><span style="font-size:12px;color:#666;">今月のシフト合計</span><span style="font-size:13px;font-weight:600;color:#5a6b7a;">'+myMH+'h / '+maxMon+'h</span></div>';
      html+='<div style="text-align:right;margin-top:6px;"><button onclick="openSelfPW()" style="background:none;border:none;color:#aaa;font-size:10px;cursor:pointer;text-decoration:underline;">🔑 パスワード変更</button></div>';
      html+='</div>';
    }
  }

  // ビュー切替
  html+='<div class="vtabs"><button class="vt'+(calView==='month'?' on':'')+'" onclick="swView(\'month\')">月表示</button><button class="vt'+(calView==='week'?' on':'')+'" onclick="swView(\'week\')">週表示</button></div>';

  if(calView==='week'){html+=buildWeek(sm,em);wrap.innerHTML=html;return;}

  // 凡例
  html+='<div class="leg">';
  html+='<div class="legitem"><div class="legdot" style="background:#cdd9c8;border:1px solid #b5c4b0;"></div>アルバイト枠</div>';
  html+='<div class="legitem"><div class="legdot" style="background:#c4d0db;border:1px solid #aebccb;"></div>正社員枠</div>';
  html+='<div class="legitem"><div class="legdot" style="background:#b5654a;"></div>満員</div>';
  html+='</div>';

  // 月ナビ
  html+='<div class="mnav"><button class="arr" onclick="chM(-1)">‹</button>';
  html+='<span class="mtitle" onclick="openJump()">'+calY+'年'+(calM+1)+'月</span>';
  html+='<div style="display:flex;gap:4px;"><button class="tbtn2" onclick="goToday()">今日</button><button class="arr" onclick="chM(1)">›</button></div></div>';

  // グリッド（月曜始まり）
  const dim=new Date(calY,calM+1,0).getDate();
  const fdow=new Date(calY,calM,1).getDay();
  const fdowMon=(fdow+6)%7;
  const ts=fd(new Date());
  let g=DJP_MON.map((d,i)=>'<div class="dh" style="color:'+(i===5?'#2471a3':i===6?'#a8584a':'#555')+'">'+d+'</div>').join('');
  for(let i=0;i<fdowMon;i++)g+='<div></div>';
  for(let day=1;day<=dim;day++){
    const thisDate=new Date(calY,calM,day);
    const dow=thisDate.getDay();
    const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const isSel=selDay===day,isToday=ds===ts;
    const daySlots=sm[ds]||[];
    let chips='';
    daySlots.forEach(slot=>{
      const ents=em[slot.id]||[];
      const isFull=ents.length>=slot.max_staff;
      const isMine=ents.some(e=>e.staff_id===me?.id);
      let bg=isMine?(staffColorMap[me.id]||'#c9b896'):isFull?'#b5654a':slot.staff_type==='full'?'#7d92a8':'#8aa085';
      chips+='<div class="chip" style="background:'+bg+';">'+slot.slot_name+' '+ents.length+'/'+slot.max_staff+'</div>';
    });
    const numColor=dow===6?'#a8584a':dow===0?'#2471a3':'#222';
    g+='<button class="cd'+(isSel?' sel':'')+(isToday?' tod':'')+'" onclick="selD('+day+')">';
    g+='<span class="cdn" style="color:'+(isSel?'#5a6b7a':numColor)+'">'+day+'</span>';
    g+=chips+'</button>';
  }
  html+='<div class="cgrid">'+g+'</div>';

  if(selDay)html+=buildDayPanel(selDay,sm,em);

  // 管理者・店長：スタッフ時間一覧
  if(me.canManage){
    html+='<div class="card"><div class="stitle">今月のスタッフ時間</div>';
    staff.forEach(s=>{
      const h=getMonthlyH(s.id);
      const isPart=s.staff_type==='part';
      const wkH=isPart?getWeeklyH(s.id):0;
      const maxWk=s.max_hours_per_week||settings.insurance_threshold_weekly||20;
      const sc=staffColorMap[s.id]||'#5a6b7a';
      const over=isPart&&wkH>=maxWk;
      let timeStr=isPart?'今週'+wkH+'h / 今月'+h+'h':'今月'+h+'h';
      html+='<div style="margin-bottom:9px;">';
      html+='<div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;">';
      html+='<span class="av" style="background:'+sc+';">'+s.name[0]+'</span>'+s.name;
      html+='<span style="font-size:10px;color:#888;">'+roleLabel(s)+'</span>';
      html+='<span style="margin-left:auto;font-size:11px;color:'+(over?'#a8584a':'#555')+';font-weight:'+(over?'700':'400')+';">'+timeStr+(over?' ⚠':'')+'</span></div>';
      if(isPart){const pct=Math.min(wkH/maxWk*100,100);html+='<div class="prog" style="margin-top:3px;"><div class="progf" style="width:'+pct+'%;background:'+(over?'#a8584a':'#6b8268')+';"></div></div>';}
      html+='</div>';
    });
    html+='</div>';
    // PDF出力
    html+='<div class="card"><div class="stitle">📄 週シフト表PDF出力</div>';
    html+='<p class="hint" style="margin-bottom:10px;">現在表示中の週をA4横向きで出力します。週表示で見たい週に移動してから出力してください。</p>';
    html+='<button class="btn" onclick="exportWeekPDF()">今表示中の週のシフト表を出力</button></div>';
  }
  wrap.innerHTML=html;
}

function buildDayPanel(day,sm,em){
  const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  const daySlots=sm[ds]||[];
  const isAdmin=me.canManage;
  const dateObj=new Date(calY,calM,day);
  const dowName=DJP_MON[(dateObj.getDay()+6)%7];
  let html='<div class="dp"><div class="dptitle">'+(calM+1)+'月'+day+'日（'+dowName+'）</div>';
  const pSlots=daySlots.filter(s=>s.staff_type==='part');
  const fSlots=daySlots.filter(s=>s.staff_type==='full');

  function slotCard(slot,cls){
    const ents=em[slot.id]||[];
    const isFull=ents.length>=slot.max_staff;
    const myE=ents.find(e=>e.staff_id===me?.id);
    const mems=ents.map(e=>{
      const sc=staffColorMap[e.staff_id]||'#5a6b7a';
      const isMe=e.staff_id===me?.id;
      return '<span class="mtag'+(isMe?' me':'')+'" style="'+(isMe?'':'border-color:'+sc+';color:'+sc+';')+'">'+(e.shift_staff?.name||'?')+'</span>';
    }).join('');
    let acts='';
    if(isAdmin){
      acts+='<button class="bsm bd" onclick="openManageSlot(\''+slot.id+'\',\''+ds+'\')">割当</button> ';
      acts+='<button class="bsm bg" onclick="openEditSlot(\''+slot.id+'\')">編集</button> ';
      acts+='<button class="bsm br" onclick="delSlot(\''+slot.id+'\',\''+ds+'\')">削除</button>';
    } else {
      const canJoin=(slot.staff_type==='part'&&me.isPart)||(slot.staff_type==='full'&&!me.isPart);
      if(canJoin){
        if(myE)acts='<button class="bsm br" onclick="openCancelReq(\''+myE.id+'\',\''+slot.id+'\',\''+ds+'\',\''+slot.slot_name+'\')">取消申請</button>';
        else if(!isFull)acts='<button class="joinbtn" onclick="joinSlot(\''+slot.id+'\',\''+ds+'\')">参加する</button>';
        else acts='<span style="font-size:11px;color:#888;">満員</span>';
      }
    }
    return '<div class="scard '+cls+'">'
      +'<div class="shed"><span class="sname">'+slot.slot_name+'</span><span class="stime">'+slot.start_time.slice(0,5)+'〜'+slot.end_time.slice(0,5)+'</span></div>'
      +'<div class="scap">定員'+slot.max_staff+'人　残り'+Math.max(0,slot.max_staff-ents.length)+'人</div>'
      +'<div class="smems">'+(mems||'<span style="color:#bbb;font-size:11px;font-style:italic;">まだ誰もいません</span>')+'</div>'
      +'<div class="sacts">'+acts+'</div></div>';
  }

  if(pSlots.length>0){
    html+='<div class="slabel" style="color:#6b8268;">🟩 アルバイト枠</div>';
    pSlots.forEach(s=>html+=slotCard(s,'part-s'));
  }
  if(fSlots.length>0){
    html+='<div class="slabel" style="color:#2471a3;'+(pSlots.length>0?'margin-top:12px;':'')+'">🟦 正社員枠</div>';
    fSlots.forEach(s=>html+=slotCard(s,'full-s'));
  }
  if(daySlots.length===0&&!isAdmin)html+='<p class="empty">この日のシフト枠はありません</p>';

  if(isAdmin){
    html+='<div style="margin-top:12px;"><button class="btn" onclick="openAddSlot(\''+ds+'\')">＋ シフト枠を追加</button></div>';
  }
  html+='</div>';
  return html;
}

// ── 週ビュー（連続ブロック・個人別カラー）──
function buildWeek(sm,em){
  const today=new Date();
  const diffToMon=(today.getDay()+6)%7;
  const sw=new Date(today);sw.setDate(today.getDate()-diffToMon+wOff*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sw);d.setDate(d.getDate()+i);return d;});
  const ts=fd(today);
  const START_H=6,END_H=23,HOUR_H=40;
  const totalH=(END_H-START_H)*HOUR_H;

  // 選択中スタッフ（デフォルト：自分。管理者ログインはnull）
  if(window._wkSel===undefined)window._wkSel=(me.id!=='admin')?me.id:null;
  const selId=window._wkSel;

  let html='<div class="mnav">';
  html+='<button class="arr" onclick="chW(-1)">‹</button>';
  html+='<span style="font-size:13px;font-weight:700;color:#5a6b7a;">'+fd(days[0]).slice(5)+' 〜 '+fd(days[6]).slice(5)+'</span>';
  html+='<div style="display:flex;gap:4px;"><button class="tbtn2" onclick="wOff=0;renderCal()">今週</button><button class="arr" onclick="chW(1)">›</button></div></div>';

  // ── スタッフ色チップ選択器 ──
  // この週にシフトがあるスタッフを集める
  const weekStaffIds=new Set();
  days.forEach(d=>{
    const ds=fd(d);
    (sm[ds]||[]).forEach(slot=>{(em[slot.id]||[]).forEach(e=>weekStaffIds.add(e.staff_id));});
  });
  const chipStaff=me.canManage?staff.filter(s=>weekStaffIds.has(s.id)):staff.filter(s=>s.id===me.id);
  if(chipStaff.length>0){
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;">';
    html+='<span style="font-size:11px;color:#888;">表示：</span>';
    if(me.canManage){
      html+='<button onclick="window._wkSel=null;renderCal()" style="padding:4px 10px;border-radius:99px;border:1.5px solid '+(selId===null?'#5a6b7a':'#ddd')+';background:'+(selId===null?'#5a6b7a':'#fff')+';color:'+(selId===null?'#fff':'#666')+';font-size:11px;font-weight:700;cursor:pointer;">全員</button>';
    }
    chipStaff.forEach(s=>{
      const sc=staffColorMap[s.id]||'#5a6b7a';
      const on=selId===s.id;
      html+='<button onclick="window._wkSel=\''+s.id+'\';renderCal()" style="display:flex;align-items:center;gap:4px;padding:4px 10px 4px 4px;border-radius:99px;border:1.5px solid '+(on?sc:'#ddd')+';background:'+(on?sc:'#fff')+';color:'+(on?'#fff':'#666')+';font-size:11px;font-weight:700;cursor:pointer;">';
      html+='<span style="width:16px;height:16px;border-radius:50%;background:'+(on?'#fff':sc)+';color:'+(on?sc:'#fff')+';display:inline-flex;align-items:center;justify-content:center;font-size:9px;">'+s.name[0]+'</span>'+s.name+'</button>';
    });
    html+='</div>';
  }
  html+='<p class="hint" style="margin-bottom:8px;">'+(me.canManage?'スタッフを選ぶとその人のシフトが強調されます。':'あなたのシフトが強調表示されます。')+'枠をタップで詳細。</p>';

  html+='<div class="wk-scroll"><div style="min-width:340px;">';
  html+='<div style="display:flex;">';
  html+='<div style="width:34px;flex-shrink:0;background:#5a6b7a;"></div>';
  days.forEach((d,i)=>{
    const isT=fd(d)===ts;
    const dow=d.getDay();
    const tcol=isT?'#5a6b7a':dow===0?'#e8b4b4':dow===6?'#b4c4e8':'#fff';
    html+='<div style="flex:1;text-align:center;padding:5px 1px;background:'+(isT?'#c9b896':'#5a6b7a')+';color:'+tcol+';border-left:1px solid #6b7d8c;">';
    html+='<div style="font-size:10px;">'+DJP_MON[i]+'</div><div style="font-size:13px;font-weight:700;">'+d.getDate()+'</div></div>';
  });
  html+='</div>';
  html+='<div style="display:flex;position:relative;">';
  html+='<div style="width:34px;flex-shrink:0;">';
  for(let h=START_H;h<END_H;h++){
    html+='<div style="height:'+HOUR_H+'px;border-top:1px solid #eee;font-size:8px;color:#aaa;text-align:center;padding-top:1px;">'+String(h).padStart(2,'0')+'</div>';
  }
  html+='</div>';
  days.forEach(d=>{
    const ds=fd(d),daySlots=(sm[ds]||[]).slice().sort((a,b)=>a.start_time.localeCompare(b.start_time));
    const isT=ds===ts;
    html+='<div style="flex:1;position:relative;border-left:1px solid #eee;background:'+(isT?'#fffdf5':'#fff')+';height:'+totalH+'px;" data-ds="'+ds+'" onclick="wkEmptyClick(this)">';
    for(let h=0;h<END_H-START_H;h++){
      html+='<div style="position:absolute;top:'+(h*HOUR_H)+'px;left:0;right:0;height:1px;background:#f2f2f2;"></div>';
    }
    const cols=[];
    daySlots.forEach(slot=>{
      const ss=(parseInt(slot.start_time.slice(0,2))*60+parseInt(slot.start_time.slice(3,5)));
      const se=(parseInt(slot.end_time.slice(0,2))*60+parseInt(slot.end_time.slice(3,5)));
      let placed=false;
      for(const col of cols){if(col.every(x=>x.se<=ss||x.ss>=se)){col.push({slot,ss,se});placed=true;break;}}
      if(!placed)cols.push([{slot,ss,se}]);
    });
    const nCol=Math.max(1,cols.length);
    cols.forEach((col,ci)=>{
      col.forEach(({slot,ss,se})=>{
        const topPx=((ss/60)-START_H)*HOUR_H;
        const hPx=((se-ss)/60)*HOUR_H;
        if(topPx<-5||topPx>totalH)return;
        const ents=em[slot.id]||[];
        const isFull=ents.length>=slot.max_staff;
        // 選択スタッフがこの枠にいるか
        const hasSel=selId&&ents.some(e=>e.staff_id===selId);
        let bg,bord='',op='1',star='';
        if(hasSel){
          bg=staffColorMap[selId]||'#c9b896';bord='border:2px solid #5a4a2a;';star='★';
        }else if(ents.length>0){
          bg=staffColorMap[ents[0].staff_id]||'#888';
          if(selId)op='0.35'; // 選択中は他を薄く
        }else{
          bg=slot.staff_type==='full'?'#a3b5c4':'#aec0a8';
          if(selId)op='0.35';
        }
        const w=Math.floor(100/nCol);
        const left=ci*w;
        html+='<div data-sid="'+slot.id+'" data-ds="'+ds+'" onclick="event.stopPropagation();wkSlotClick(this)" style="position:absolute;top:'+topPx+'px;left:'+left+'%;width:'+(w-1)+'%;height:'+Math.max(hPx-1,16)+'px;background:'+bg+';opacity:'+op+';color:#fff;border-radius:3px;padding:1px 2px;font-size:8px;font-weight:700;overflow:hidden;cursor:pointer;line-height:1.1;'+bord+'z-index:'+(hasSel?'2':'1')+';">';
        html+=star+slot.slot_name+'<br><span style="opacity:.85;">'+ents.length+'/'+slot.max_staff+'</span></div>';
      });
    });
    html+='</div>';
  });
  html+='</div></div></div>';
  return html;
}

function wkEmptyClick(el){
  const ds=el.dataset.ds;if(!ds)return;
  const d=new Date(ds+'T00:00:00');calY=d.getFullYear();calM=d.getMonth();selDay=d.getDate();
  calView='month';renderCal();
  setTimeout(()=>{const dp=document.querySelector('.dp');if(dp)dp.scrollIntoView({behavior:'smooth',block:'start'});},250);
}
function wkSlotClick(el){
  const slotId=el.dataset.sid,ds=el.dataset.ds;if(!slotId||!ds)return;
  const k=calY+'-'+calM,em=EC[k]||{};
  let slot=null;
  Object.values(SC[k]||{}).forEach(slots=>slots.forEach(s=>{if(s.id===slotId)slot=s;}));
  if(!slot){wkEmptyClick(el);return;}
  window._wk={sid:slotId,ds,sn:slot.slot_name};
  const ents=em[slotId]||[];
  const isFull=ents.length>=slot.max_staff;
  const myE=ents.find(e=>e.staff_id===me?.id);
  window._wk.eid=myE?.id||'';
  const mems=ents.map(e=>{
    const sc=staffColorMap[e.staff_id]||'#5a6b7a';
    return '<span class="mtag" style="border-color:'+sc+';color:'+sc+';">'+(e.shift_staff?.name||'?')+'</span>';
  }).join('');
  const typeLabel=slot.staff_type==='full'?'🟦 正社員枠':'🟩 アルバイト枠';
  let acts='';
  if(me.canManage){
    acts='<button class="bsm bd" onclick="closeM();openManageSlot(window._wk.sid,window._wk.ds)">割当</button> ';
    acts+='<button class="bsm bg" onclick="closeM();openEditSlot(window._wk.sid)">編集</button>';
  } else {
    const canJoin=(slot.staff_type==='part'&&me.isPart)||(slot.staff_type==='full'&&!me.isPart);
    if(canJoin){
      if(myE)acts='<button class="bsm br" onclick="closeM();openCancelReq(window._wk.eid,window._wk.sid,window._wk.ds,window._wk.sn)">取消申請</button>';

async function doAddSlot(ds){
  const name=document.getElementById('sln').value.trim();
  const stype=document.getElementById('sltype').value;
  const start=document.getElementById('sls').value;
  const end=document.getElementById('sle').value;
  const max=parseInt(document.getElementById('slmax').value)||2;
  const rep=document.getElementById('slrep').checked;
  if(!name){toast('枠名を入力してください','err');return;}
  let dates=[ds];
  if(rep){
    const base=new Date(ds+'T00:00:00'),dow=base.getDay(),dim=new Date(calY,calM+1,0).getDate();
    dates=[];
    for(let d=1;d<=dim;d++){const dd=new Date(calY,calM,d);if(dd.getDay()===dow)dates.push(fd(dd));}
  }
  const ins=dates.map(d=>({date:d,slot_name:name,staff_type:stype,start_time:start,end_time:end,max_staff:max}));
  const{error}=await sb.from('shift_slots').insert(ins);
  if(error){toast('追加に失敗しました','err');return;}
  await logAction('シフト枠追加',ds,name+'（'+start+'〜'+end+'）'+ins.length+'件');
  toast(ins.length+'件追加しました');closeM();await loadMonth(calY,calM);renderCal();
}

// ════════════════════════════════════════════════════════════
let reqTab='pending';
async function renderRequests(){
  const wrap=document.getElementById('wrequests');
  wrap.innerHTML='<div class="loading"><span class="spin"></span>読み込み中…</div>';
  const[lr,cr]=await Promise.all([
    sb.from('leave_requests').select('*,shift_staff(name,staff_type)').order('created_at',{ascending:false}),
    sb.from('cancel_requests').select('*,shift_staff(name),shift_slots(slot_name,date,start_time,end_time)').order('created_at',{ascending:false})
  ]);
  const allLeaves=lr.data||[],allCancels=cr.data||[];
  const isPending=reqTab==='pending';
  const leaves=isPending?allLeaves.filter(l=>l.status==='pending'):allLeaves;
  const cancels=isPending?allCancels.filter(c=>c.status==='pending'):allCancels;

  let html='<div style="font-weight:800;font-size:17px;color:#5a6b7a;margin-bottom:12px;">📋 申請確認</div>';
  html+='<div class="seg">';
  html+='<button class="segb'+(isPending?' on':'')+'" onclick="reqTab=\'pending\';window._reqSearch=\'\';renderRequests()">審査中'+( (allLeaves.filter(l=>l.status==='pending').length+allCancels.filter(c=>c.status==='pending').length)>0?'（'+(allLeaves.filter(l=>l.status==='pending').length+allCancels.filter(c=>c.status==='pending').length)+'）':'')+'</button>';
  html+='<button class="segb'+(!isPending?' on':'')+'" onclick="reqTab=\'all\';renderRequests()">すべて</button></div>';
  // 日付検索（すべてタブのみ）
  if(!isPending){
    const sv=window._reqSearch||'';
    html+='<div class="card" style="padding:10px 12px;margin-bottom:10px;"><div style="display:flex;gap:8px;align-items:center;">';
    html+='<input type="date" id="reqsearch" value="'+sv+'" style="flex:1;"/>';
    html+='<button class="bsm bd" onclick="window._reqSearch=document.getElementById(\'reqsearch\').value;renderRequests()">検索</button>';
    if(sv)html+='<button class="bsm bgr" onclick="window._reqSearch=\'\';renderRequests()">解除</button>';
    html+='</div>';
    html+='<div style="margin-top:8px;text-align:right;"><button class="bsm br" onclick="cleanOldRequests()">6ヶ月以上前の処理済み申請を削除</button></div>';
    html+='</div>';
  }

  let items=[];
  cancels.forEach(c=>items.push({type:'cancel',data:c,time:c.created_at,date:c.date}));
  leaves.forEach(l=>items.push({type:'leave',data:l,time:l.created_at,date:l.date}));
  // 日付検索フィルター
  const searchDate=window._reqSearch||'';
  if(searchDate)items=items.filter(it=>it.date===searchDate);
  items.sort((a,b)=>new Date(b.time)-new Date(a.time));

  if(items.length===0){html+='<p class="empty">'+(isPending?'審査中の申請はありません':'申請記録がありません')+'</p>';wrap.innerHTML=html;return;}

  items.forEach(it=>{
    if(it.type==='cancel'){
      const c=it.data;
      window._cId=c.id;
      const sc=c.status==='pending'?'bp':c.status==='approved'?'ba':'brej';
      const sl=c.status==='pending'?'審査中':c.status==='approved'?'承認済':'却下';
      const stColor=staffColorMap[c.staff_id]||'#5a6b7a';
      const slot=c.shift_slots;
      html+='<div class="reqcard cancel-r">';
      html+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;">';
      html+='<span class="av" style="background:'+stColor+';">'+(c.shift_staff?.name?.[0]||'?')+'</span>';
      html+='<div><div style="font-weight:700;font-size:13px;">'+(c.shift_staff?.name||'?')+' <span style="font-size:10px;color:#c08552;font-weight:600;">取消申請</span></div>';
      html+='<div style="font-size:11px;color:#666;">'+(slot?.date||c.date)+' '+(slot?.slot_name||'')+' '+(slot?.start_time?.slice(0,5)||'')+'〜'+(slot?.end_time?.slice(0,5)||'')+'</div></div>';
      html+='<span class="badge '+sc+'" style="margin-left:auto;">'+sl+'</span></div>';
      if(c.reason)html+='<div style="font-size:12px;color:#666;margin-bottom:8px;">理由：'+c.reason+'</div>';
      if(c.status==='pending'){
        html+='<div style="display:flex;gap:7px;"><button class="bsm bg" onclick="appCancel(\''+c.id+'\',\''+(c.slot_entry_id||'')+'\',\''+(c.date||'')+'\')">承認（シフトから外す）</button><button class="bsm br" onclick="rejCancel(\''+c.id+'\')">却下</button></div>';
      }else if(c.approved_by){
        html+='<div style="font-size:11px;color:#999;margin-top:4px;">'+(c.status==='approved'?'承認':'却下')+'：'+c.approved_by+'</div>';
      }
      html+='</div>';
    } else {
      const l=it.data;
      const sc=l.status==='pending'?'bp':l.status==='approved'?'ba':'brej';
      const sl=l.status==='pending'?'審査中':l.status==='approved'?'承認済':'却下';
      const stColor=staffColorMap[l.staff_id]||'#5a6b7a';
      const durStr=l.duration_type==='custom'&&l.start_time?(l.start_time.slice(0,5)+'〜'+(l.end_time||'').slice(0,5)):(DUR[l.duration_type]||'全日');
      html+='<div class="reqcard leave-r">';
      html+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;">';
      html+='<span class="av" style="background:'+stColor+';">'+(l.shift_staff?.name?.[0]||'?')+'</span>';
      html+='<div><div style="font-weight:700;font-size:13px;">'+(l.shift_staff?.name||'?')+' <span style="font-size:10px;color:#7a9b76;font-weight:600;">休暇申請</span></div>';
      html+='<div style="font-size:11px;color:#666;">'+l.date+'　'+(LT[l.leave_type]||l.leave_type)+'　'+durStr+'</div></div>';
      html+='<span class="badge '+sc+'" style="margin-left:auto;">'+sl+'</span></div>';
      if(l.reason)html+='<div style="font-size:12px;color:#666;margin-bottom:8px;">理由：'+l.reason+'</div>';
      if(l.status==='pending'){
        html+='<div style="display:flex;gap:7px;"><button class="bsm bg" onclick="appLeave(\''+l.id+'\')">承認</button><button class="bsm br" onclick="rejLeave(\''+l.id+'\')">却下</button></div>';
      }else if(l.approved_by){
        html+='<div style="font-size:11px;color:#999;margin-top:4px;">'+(l.status==='approved'?'承認':'却下')+'：'+l.approved_by+'</div>';
      }
      html+='</div>';
    }
  });
  wrap.innerHTML=html;
}

let _jpFontLoaded=false;
function loadJPFont(doc){
  try{
    if(!window.HAKU_JP_FONT)return false;
    doc.addFileToVFS('NotoSansJP.ttf',window.HAKU_JP_FONT);
    doc.addFont('NotoSansJP.ttf','NotoSansJP','normal');
    return true;
  }catch(e){return false;}
}

async function exportWeekPDF(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  // 日本語フォント読み込み
  const fontOK=loadJPFont(doc);
  const FONT=fontOK?'NotoSansJP':'helvetica';
  doc.setFont(FONT);
  // 当前表示中の週を計算（月曜始まり）
  const today=new Date();
  const diffToMon=(today.getDay()+6)%7;
  const sw=new Date(today);sw.setDate(today.getDate()-diffToMon+wOff*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sw);d.setDate(d.getDate()+i);return d;});
  const months=new Set();
  days.forEach(d=>months.add(d.getFullYear()+'-'+d.getMonth()));
  for(const mk of months){const[yy,mm]=mk.split('-').map(Number);await loadMonth(yy,mm);}

  const pageW=297,pageH=210,margin=10;
  const colW=(pageW-margin*2-22)/7;
  const headerY=28,gridTop=34;
  const START_H=8,END_H=22,HOUR_H=(pageH-gridTop-margin)/(END_H-START_H);

  doc.setFontSize(15);doc.setTextColor(90,107,122);
  doc.text('Café La Petite Haku　シフト表',margin,16);
  doc.setFontSize(11);doc.setTextColor(100,100,100);
  doc.text(fd(days[0])+'  〜  '+fd(days[6]),margin,23);

  // ヘッダー（曜日・日本語）
  for(let i=0;i<7;i++){
    const x=margin+22+colW*i;
    const d=days[i];
    const dow=d.getDay();
    const isWeekend=dow===0||dow===6;
    if(isWeekend){doc.setFillColor(228,230,235);}else{doc.setFillColor(90,107,122);}
    doc.rect(x,headerY-5,colW,7,'F');
    if(isWeekend){doc.setTextColor(dow===0?168:90,dow===0?88:107,dow===0?74:122);}
    else{doc.setTextColor(255,255,255);}
    doc.setFontSize(9);
    doc.text(DJP_MON[i]+'　'+(d.getMonth()+1)+'/'+d.getDate(),x+colW/2,headerY,{align:'center'});
  }
  // 時間軸＋グリッド線
  doc.setDrawColor(220,220,220);doc.setFontSize(7);doc.setTextColor(150,150,150);
  for(let h=START_H;h<=END_H;h++){
    const y=gridTop+(h-START_H)*HOUR_H;
    doc.line(margin+22,y,pageW-margin,y);
    doc.text(String(h).padStart(2,'0')+':00',margin+20,y+1,{align:'right'});
  }
  for(let i=0;i<=7;i++){
    const x=margin+22+colW*i;
    doc.line(x,gridTop,x,pageH-margin);
  }
  // シフトブロック
  days.forEach((d,di)=>{
    const ds=fd(d);
    const mk=d.getFullYear()+'-'+d.getMonth();
    const sm2=SC[mk]||{},em2=EC[mk]||{};
    const daySlots=(sm2[ds]||[]).slice().sort((a,b)=>a.start_time.localeCompare(b.start_time));
    const cols=[];
    daySlots.forEach(slot=>{
      const ss=parseInt(slot.start_time.slice(0,2))*60+parseInt(slot.start_time.slice(3,5));
      const se=parseInt(slot.end_time.slice(0,2))*60+parseInt(slot.end_time.slice(3,5));
      let placed=false;
      for(const c of cols){if(c.every(x=>x.se<=ss||x.ss>=se)){c.push({slot,ss,se});placed=true;break;}}
      if(!placed)cols.push([{slot,ss,se}]);
    });
    const nCol=Math.max(1,cols.length);
    cols.forEach((col,ci)=>{
      col.forEach(({slot,ss,se})=>{
        const topY=gridTop+((ss/60)-START_H)*HOUR_H;
        const hH=((se-ss)/60)*HOUR_H;
        if(topY<gridTop-2||topY>pageH-margin)return;
        const bw=colW/nCol;
        const bx=margin+22+colW*di+bw*ci;
        const isFull2=slot.staff_type==='full';
        if(isFull2)doc.setFillColor(163,181,196);else doc.setFillColor(174,192,168);
        doc.roundedRect(bx+0.5,topY+0.3,bw-1,Math.max(hH-0.6,5),1,1,'F');
        doc.setTextColor(255,255,255);doc.setFontSize(7);
        const ents=em2[slot.id]||[];
        const names=ents.map(e=>e.shift_staff?.name||'?').join('、');
        doc.text(slot.slot_name,bx+1.5,topY+3.5);
        doc.setFontSize(6);
        doc.text(slot.start_time.slice(0,5)+'-'+slot.end_time.slice(0,5),bx+1.5,topY+6.5);
        if(names&&hH>10){
          const maxChars=Math.floor(bw/2);
          doc.text(names.slice(0,maxChars),bx+1.5,topY+9.5);
        }
      });
    });
  });
  doc.save('haku-week-'+fd(days[0])+'.pdf');
  toast('週シフト表を出力しました');
}

  openM('<div class="mtit">'+(s?.name||'')+' のパスワード設定</div><div class="fcol">'
    +'<div><span class="flabel">新しいパスワード</span><input type="password" id="spn"/></div>'
    +'<div><span class="flabel">確認</span><input type="password" id="spc"/></div>'
    +'</div><div class="mbtns"><button class="bsm bg" onclick="doSetPW(window._pwId)">設定</button><button class="bsm bgr" onclick="closeM()">キャンセル</button></div>');
}
async function doSetPW(id){
  const nw=document.getElementById('spn').value,cnf=document.getElementById('spc').value;
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_staff').update({password:nw}).eq('id',id);
  staff=staff.map(s=>s.id===id?{...s,password:nw}:s);closeM();toast('設定しました');renderAdmin();
}
function openSelfPW(){
  openM('<div class="mtit">パスワード変更</div><div class="fcol">'
    +'<div><span class="flabel">現在のパスワード</span><input type="password" id="mpc"/></div>'
    +'<div><span class="flabel">新しいパスワード</span><input type="password" id="mpn"/></div>'
    +'<div><span class="flabel">確認</span><input type="password" id="mpcf"/></div>'
    +'</div><div class="mbtns"><button class="bsm bg" onclick="doSelfPW()">変更</button><button class="bsm bgr" onclick="closeM()">キャンセル</button></div>');
}
async function doSelfPW(){
  const cur=document.getElementById('mpc').value,nw=document.getElementById('mpn').value,cnf=document.getElementById('mpcf').value;
  const myS=staff.find(s=>s.id===me.id);
  if(cur!==(myS?.password||'0000')){toast('現在のパスワードが違います','err');return;}
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_staff').update({password:nw}).eq('id',me.id);
  staff=staff.map(s=>s.id===me.id?{...s,password:nw}:s);closeM();toast('変更しました');
}
async function saveSettings(){
  const ins=parseInt(document.getElementById('sins').value)||20;
  await sb.from('shift_settings').upsert({id:1,insurance_threshold_weekly:ins,admin_password:APW});
  settings={...settings,insurance_threshold_weekly:ins};
  toast('保存しました');
}
async function changeAdminPW(){
  const cur=document.getElementById('pwcur').value,nw=document.getElementById('pwnew').value,cnf=document.getElementById('pwcnf').value;
  if(cur!==APW){toast('現在のパスワードが違います','err');return;}
  if(!nw||nw!==cnf){toast('パスワードが一致しません','err');return;}
  await sb.from('shift_settings').upsert({id:1,admin_password:nw,insurance_threshold_weekly:settings.insurance_threshold_weekly||20});
  APW=nw;['pwcur','pwnew','pwcnf'].forEach(id=>document.getElementById(id).value='');
  toast('変更しました');
}

// ── 初期化 ──
document.getElementById('admpw').addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin();});
loadAll();
</script>
